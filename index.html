<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Portal de Salas · DUOC UC</title>
  <link rel="icon" type="image/png" href="./assets/duoc-uc-oficial.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>
  <style>
    /* === Design tokens · sistema dual claro/oscuro estilo iOS ===
       El tema se aplica vía atributo [data-theme] en <html>.
       Si no hay data-theme explícito, respeta prefers-color-scheme. */
    :root{
      /* Brand (no cambian entre temas) */
      --brand-primary:#002A5C;
      --brand-primary-2:#003C82;
      --brand-accent:#FFCE00;
      --brand-red:#E30613;

      /* Modo claro (default) */
      --bg:#F4F6FA;
      --surface:#FFFFFF;
      --surface-2:#FBFCFD;
      --sidebar:#0E1A33;
      --sidebar-2:#172649;
      --sidebar-hover:#1F2F58;
      --sidebar-active:#FFCE00;
      --sidebar-text:#C7D0E0;
      --sidebar-text-muted:#7E8AA6;
      --primary:#002A5C;
      --primary-2:#003C82;
      --accent:#FFCE00;
      --red:#E30613;
      --text:#0F1729;
      --text-muted:#5D6B82;
      --text-soft:#8A95AA;
      --border:#E5E9F2;
      --border-soft:#EFF2F7;
      --kpi-bg:#FFFFFF;
      --success:#10B981;
      --success-bg:#E8F8F1;
      --warning:#F59E0B;
      --warning-bg:#FEF5E7;
      --danger:#EF4444;
      --danger-bg:#FDECEC;
      --info:#3B82F6;
      --info-bg:#EAF2FE;
      --shadow-sm:0 1px 2px rgba(15,23,41,.05);
      --shadow:0 1px 3px rgba(15,23,41,.06), 0 4px 12px rgba(15,23,41,.06);
      --shadow-lg:0 10px 30px rgba(15,23,41,.12);
      --radius:10px;
      --radius-sm:6px;
      --radius-lg:16px;
    }

    /* Modo oscuro · iOS-like (negros profundos con grises elevados) */
    :root[data-theme="dark"]{
      --bg:#000000;
      --surface:#1C1C1E;
      --surface-2:#2C2C2E;
      --sidebar:#000000;
      --sidebar-2:#1C1C1E;
      --sidebar-hover:#2C2C2E;
      --sidebar-active:#FFCE00;
      --sidebar-text:#E5E5EA;
      --sidebar-text-muted:#8E8E93;
      --primary:#0A84FF;
      --primary-2:#5AC8FA;
      --accent:#FFD60A;
      --red:#FF453A;
      --text:#FFFFFF;
      --text-muted:#AEAEB2;
      --text-soft:#8E8E93;
      --border:#38383A;
      --border-soft:#2C2C2E;
      --kpi-bg:#1C1C1E;
      --success:#30D158;
      --success-bg:rgba(48,209,88,.16);
      --warning:#FF9F0A;
      --warning-bg:rgba(255,159,10,.16);
      --danger:#FF453A;
      --danger-bg:rgba(255,69,58,.16);
      --info:#0A84FF;
      --info-bg:rgba(10,132,255,.16);
      --shadow-sm:0 1px 2px rgba(0,0,0,.5);
      --shadow:0 1px 3px rgba(0,0,0,.5), 0 4px 12px rgba(0,0,0,.3);
      --shadow-lg:0 10px 30px rgba(0,0,0,.6);
    }

    /* Auto: si prefiere oscuro y no hay override, usar el dark */
    /* (El JS setea siempre data-theme="light|dark" según preferencia del
       usuario o del sistema. No necesitamos @media para auto.) */

    /* Overrides específicos en modo oscuro para elementos con colores
       hardcoded que rompen el contraste o se ven mal. */
    :root[data-theme="dark"] .tbl thead th,
    :root[data-theme="dark"] .week-grid .hdr,
    :root[data-theme="dark"] .week-grid .row-h,
    :root[data-theme="dark"] .upload-zone,
    :root[data-theme="dark"] .filters {
      background:var(--surface-2);
      color:var(--text);
    }
    :root[data-theme="dark"] .tbl tbody td{color:var(--text)}
    :root[data-theme="dark"] .tbl tbody tr:hover td{background:var(--border-soft)}
    :root[data-theme="dark"] .hgrid .cl{background:var(--surface)}
    :root[data-theme="dark"] .hgrid .cl.libre{background:rgba(48,209,88,.06)}
    :root[data-theme="dark"] .hgrid .cl.libre:hover{background:rgba(48,209,88,.14)}
    :root[data-theme="dark"] .hgrid .cl.weekend{background:var(--surface-2)}
    :root[data-theme="dark"] .countdown.ok{background:rgba(48,209,88,.16);color:#30D158;border-color:rgba(48,209,88,.32)}
    :root[data-theme="dark"] .countdown.warning{background:rgba(255,159,10,.16);color:#FF9F0A;border-color:rgba(255,159,10,.32)}
    :root[data-theme="dark"] .countdown.danger,
    :root[data-theme="dark"] .countdown.critical{background:rgba(255,69,58,.16);color:#FF453A;border-color:rgba(255,69,58,.32)}
    :root[data-theme="dark"] .countdown.expired{background:var(--surface-2);color:#FF453A;border-color:rgba(255,69,58,.4)}
    :root[data-theme="dark"] .time-pill.fast{background:rgba(48,209,88,.16);color:#30D158}
    :root[data-theme="dark"] .time-pill.slow{background:rgba(255,159,10,.16);color:#FF9F0A}
    :root[data-theme="dark"] .time-pill.over{background:rgba(255,69,58,.16);color:#FF453A}
    :root[data-theme="dark"] .blk.acad,
    :root[data-theme="dark"] .blk-ac{background:#0A84FF;color:#fff}
    :root[data-theme="dark"] .legend .lib,
    :root[data-theme="dark"] .legend .occ{background:var(--surface-2)}
    :root[data-theme="dark"] *::-webkit-scrollbar-thumb{background:#48484A}
    :root[data-theme="dark"] *::-webkit-scrollbar-thumb:hover{background:#636366}
    /* Inputs en oscuro: bg superficie elevada, no blanco */
    :root[data-theme="dark"] input:not([type="checkbox"]):not([type="radio"]),
    :root[data-theme="dark"] select,
    :root[data-theme="dark"] textarea{
      background:var(--surface-2);color:var(--text);border-color:var(--border);
    }
    :root[data-theme="dark"] input::placeholder{color:var(--text-soft)}
    /* Banners de cards con fondo claro: tonificar a oscuro */
    :root[data-theme="dark"] .card[style*="background: rgb(255, 251, 234)"],
    :root[data-theme="dark"] .card[style*="background:#FFFBEA"]{
      background:rgba(255,159,10,.10) !important;border-color:rgba(255,159,10,.3) !important;
    }
    :root[data-theme="dark"] .card[style*="background: rgb(239, 252, 245)"],
    :root[data-theme="dark"] .card[style*="background:#EFFCF5"],
    :root[data-theme="dark"] .card[style*="background: rgb(246, 252, 248)"],
    :root[data-theme="dark"] .card[style*="background:#F6FCF8"]{
      background:rgba(48,209,88,.10) !important;border-color:rgba(48,209,88,.3) !important;
    }
    :root[data-theme="dark"] .card[style*="background: rgb(234, 242, 254)"],
    :root[data-theme="dark"] .card[style*="background:#EAF2FE"],
    :root[data-theme="dark"] div[style*="background:#EAF2FE"]{
      background:rgba(10,132,255,.10) !important;border-color:rgba(10,132,255,.3) !important;
    }
    /* Bloque celeste del snapshot (Importar LISTA DE RECURSOS) */
    :root[data-theme="dark"] div[style*="C4D2EA"]{border-color:rgba(10,132,255,.3) !important}
    /* Encabezado de impresión (print-header) — solo se ve en impresión, irrelevante en oscuro */

    /* Transición suave al cambiar tema */
    html, body, .app, .card, .kpi, .tbl, input, select, button, .topbar, .sidebar {
      transition: background-color .25s ease, color .25s ease, border-color .25s ease;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%}
    body{
      font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;
      background:var(--bg);
      color:var(--text);
      font-size:14px;
      line-height:1.5;
      -webkit-font-smoothing:antialiased;
    }
    button{font-family:inherit;cursor:pointer;border:none;background:none}
    input,select,textarea{font-family:inherit;font-size:14px}
    a{color:inherit;text-decoration:none}

    /* === Login === */
    .login-wrap{
      min-height:100vh;
      display:grid;
      grid-template-columns:1fr 1.1fr;
      background:var(--bg);
    }
    .login-side{
      background:linear-gradient(135deg,#001F47 0%,#0E1A33 55%,#1B2D5C 100%);
      color:#fff;
      padding:60px 56px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      position:relative;
      overflow:hidden;
    }
    /* Imagen de fondo (campus Duoc Viña). Se ve detrás de los overlays con
       degradado azul para garantizar legibilidad del texto. Se activa con
       la class .login-side.has-img cuando hay URL configurada. */
    .login-side.has-img{
      background:#001F47;
    }
    .login-side .campus-img{
      position:absolute;inset:0;
      background-size:cover;background-position:center;
      filter:saturate(1.05);
    }
    .login-side .campus-overlay{
      position:absolute;inset:0;
      background:
        linear-gradient(180deg, rgba(0,31,71,.55) 0%, rgba(14,26,51,.85) 100%),
        linear-gradient(135deg, rgba(0,42,92,.4) 0%, transparent 60%);
    }
    .login-side::before{
      content:"";
      position:absolute;
      width:520px;height:520px;
      right:-180px;top:-120px;
      background:radial-gradient(circle, rgba(255,206,0,.18), transparent 60%);
      border-radius:50%;
    }
    .login-side::after{
      content:"";
      position:absolute;
      width:380px;height:380px;
      left:-120px;bottom:-120px;
      background:radial-gradient(circle, rgba(227,6,19,.18), transparent 60%);
      border-radius:50%;
    }
    .login-side.has-img::before,
    .login-side.has-img::after{opacity:.5}
    .login-side .brand{position:relative;display:flex;align-items:center;gap:14px;z-index:3}
    .login-side .brand{background:var(--surface);padding:14px 22px;border-radius:10px;align-self:flex-start;box-shadow:0 4px 14px rgba(0,0,0,.18)}
    .login-side .brand img{height:48px;width:auto;display:block}
    .login-hero{position:relative;z-index:3}
    .login-hero h1{font-size:38px;font-weight:800;line-height:1.15;margin-bottom:16px;text-shadow:0 2px 12px rgba(0,0,0,.4)}
    .login-hero p{color:#E5E9F2;font-size:15px;max-width:440px;text-shadow:0 1px 8px rgba(0,0,0,.4)}
    .login-meta{position:relative;z-index:3;color:#B8C2D8;font-size:12px}
    .login-form-wrap{
      display:flex;align-items:center;justify-content:center;padding:40px;
    }
    .login-card{
      width:100%;max-width:420px;
      background:var(--surface);
      border-radius:var(--radius-lg);
      padding:40px;
      box-shadow:var(--shadow);
    }
    .login-card h2{font-size:24px;margin-bottom:6px}
    .login-card .sub{color:var(--text-muted);margin-bottom:28px;font-size:13px}

    .field{margin-bottom:16px}
    .field label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
    .field input,.field select,.field textarea{
      width:100%;padding:11px 14px;border:1px solid var(--border);
      border-radius:var(--radius-sm);background:var(--surface);color:var(--text);
      transition:border-color .15s, box-shadow .15s;
    }
    .field input:focus,.field select:focus,.field textarea:focus{
      outline:none;border-color:var(--primary-2);
      box-shadow:0 0 0 3px rgba(0,60,130,.12);
    }
    .field textarea{min-height:80px;resize:vertical}

    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
      padding:10px 18px;border-radius:var(--radius-sm);font-weight:600;font-size:14px;
      transition:transform .05s ease, background .15s, color .15s, box-shadow .15s;
      white-space:nowrap;
    }
    .btn:active{transform:translateY(1px)}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-primary:hover{background:var(--primary-2)}
    .btn-accent{background:var(--accent);color:#1A1A1A}
    .btn-accent:hover{background:#FFD835}
    .btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
    .btn-ghost:hover{background:var(--border-soft)}
    .btn-danger{background:var(--danger);color:#fff}
    .btn-danger:hover{background:#DC2C2C}
    .btn-success{background:var(--success);color:#fff}
    .btn-success:hover{background:#0FA46E}
    .btn-icon{padding:8px;width:34px;height:34px;border-radius:var(--radius-sm);color:var(--text-muted)}
    .btn-icon:hover{background:var(--border-soft);color:var(--text)}
    .btn-sm{padding:6px 12px;font-size:12.5px}
    .btn-block{width:100%}

    .role-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
    .role-chip{
      padding:7px 12px;border-radius:999px;font-size:12px;font-weight:600;
      background:var(--border-soft);color:var(--text-muted);cursor:pointer;border:1px solid transparent;
    }
    .role-chip.active{background:#E8EEF8;color:var(--primary);border-color:#C4D2EA}

    .login-hint{margin-top:18px;padding:12px 14px;background:var(--surface-2);border:1px dashed var(--border);border-radius:var(--radius-sm);font-size:12px;color:var(--text-muted)}
    .login-hint b{color:var(--text)}

    /* === App layout === */
    .app{display:grid;grid-template-columns:248px 1fr;height:100vh;overflow:hidden}
    .sidebar{
      background:var(--sidebar);color:var(--sidebar-text);
      display:flex;flex-direction:column;overflow-y:auto;
    }
    .sb-brand{
      display:flex;align-items:center;justify-content:center;padding:18px 16px;
      border-bottom:1px solid rgba(255,255,255,.06);background:var(--surface);
    }
    .sb-brand img{height:46px;width:auto;display:block;max-width:100%}
    .sb-sub{
      padding:10px 20px;border-bottom:1px solid rgba(255,255,255,.06);
      color:var(--sidebar-text-muted);font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;text-align:center;
    }
    .sb-section{padding:20px 14px 6px;font-size:10.5px;color:var(--sidebar-text-muted);font-weight:700;letter-spacing:1.2px;text-transform:uppercase}
    .sb-nav{padding:0 10px;display:flex;flex-direction:column;gap:2px}
    .sb-item{
      display:flex;align-items:center;gap:12px;
      padding:10px 12px;border-radius:8px;color:var(--sidebar-text);
      font-weight:500;font-size:13.5px;cursor:pointer;transition:background .12s;
    }
    .sb-item:hover{background:var(--sidebar-hover);color:#fff}
    .sb-item.active{background:var(--sidebar-2);color:#fff;font-weight:600}
    .sb-item.active .sb-bullet{background:var(--accent)}
    .sb-bullet{
      width:6px;height:6px;border-radius:50%;background:transparent;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.18);
    }
    .sb-icon{width:18px;height:18px;flex-shrink:0;opacity:.9}
    .sb-spacer{flex:1}
    .sb-badge{
      display:inline-flex;align-items:center;justify-content:center;
      min-width:22px;height:20px;padding:0 7px;border-radius:10px;
      font-size:11px;font-weight:700;letter-spacing:.2px;margin-right:6px;
      background:rgba(255,255,255,.08);color:var(--sidebar-text-muted);
    }
    .sb-badge.has{background:var(--danger);color:#fff;box-shadow:0 0 0 2px rgba(232,52,52,.18)}
    .sb-user{
      margin:14px 14px 18px;padding:12px;border-radius:var(--radius-sm);
      background:var(--sidebar-2);display:flex;align-items:center;gap:10px;
    }
    .avatar{
      width:36px;height:36px;border-radius:50%;
      background:linear-gradient(135deg,var(--accent),#FFB400);
      color:#1A1A1A;font-weight:700;display:flex;align-items:center;justify-content:center;
      font-size:14px;
    }
    .sb-user .meta{flex:1;min-width:0}
    .sb-user .meta b{display:block;color:#fff;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sb-user .meta small{color:var(--sidebar-text-muted);font-size:11px;text-transform:capitalize}
    .sb-user .logout{color:var(--sidebar-text-muted);width:30px;height:30px;display:grid;place-items:center;border-radius:6px}
    .sb-user .logout:hover{background:rgba(255,255,255,.08);color:#fff}

    /* === Main === */
    .main{display:flex;flex-direction:column;overflow:hidden;min-width:0}
    .topbar{
      height:72px;background:var(--surface);border-bottom:1px solid var(--border);
      display:flex;align-items:center;padding:0 28px;gap:16px;
    }
    .topbar h1{font-size:18px;font-weight:700}
    .topbar .crumbs{font-size:12px;color:var(--text-muted)}
    .topbar .right{margin-left:auto;display:flex;align-items:center;gap:14px}

    /* Theme toggle (estilo iOS pill) */
    .theme-toggle{
      display:inline-flex;align-items:center;gap:6px;
      padding:6px 12px;border-radius:999px;
      background:var(--surface-2);border:1px solid var(--border);
      color:var(--text);font-size:12px;font-weight:600;cursor:pointer;
      transition:transform .12s ease, background .15s ease, border-color .15s ease;
    }
    .theme-toggle:hover{background:var(--border-soft);border-color:var(--border)}
    .theme-toggle:active{transform:scale(0.96)}
    .theme-icon{font-size:14px;line-height:1}
    .theme-label{letter-spacing:.2px}
    @media (max-width:680px){
      .theme-label{display:none}
      .theme-toggle{padding:6px 10px}
    }

    /* Reloj institucional */
    .clock{
      display:flex;flex-direction:column;align-items:flex-end;
      padding:6px 16px;border-left:3px solid var(--accent);
      background:linear-gradient(90deg, rgba(255,206,0,0.06), transparent);
      border-radius:0 8px 8px 0;
    }
    .clock-time{
      font-family:'Inter',monospace;font-size:22px;font-weight:800;
      color:var(--primary);letter-spacing:1.5px;line-height:1;
      font-variant-numeric:tabular-nums;
    }
    .clock-time .sep{color:var(--accent);animation:tick 1s steps(2) infinite}
    @keyframes tick{50%{opacity:.35}}
    .clock-date{
      font-size:11px;color:var(--text-muted);margin-top:5px;
      text-transform:capitalize;font-weight:600;letter-spacing:.3px;
    }
    .search{
      position:relative;display:flex;align-items:center;
      background:var(--border-soft);border-radius:8px;padding:8px 12px;width:280px;
    }
    .search input{background:transparent;border:none;outline:none;width:100%;padding-left:8px}
    .pill{
      padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;
      background:var(--info-bg);color:var(--info);text-transform:uppercase;letter-spacing:.4px;
    }
    .pill.success{background:var(--success-bg);color:var(--success)}
    .pill.warning{background:var(--warning-bg);color:var(--warning)}
    .pill.danger{background:var(--danger-bg);color:var(--danger)}
    .pill.muted{background:#EEF1F6;color:var(--text-muted)}

    .content{
      flex:1;overflow-y:auto;padding:24px 28px 40px;
    }

    /* === Cards / grid === */
    .grid{display:grid;gap:18px}
    .grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}
    .grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}
    @media (max-width:1100px){.grid-4{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:1fr}}

    .card{
      background:var(--surface);border:1px solid var(--border-soft);
      border-radius:var(--radius);box-shadow:var(--shadow-sm);
      padding:20px;
    }
    .card-header{
      display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;
    }
    .card-header h3{font-size:15px;font-weight:700}
    .card-header .sub{font-size:12px;color:var(--text-muted)}

    /* KPI */
    .kpi{
      background:var(--surface);border:1px solid var(--border-soft);
      border-radius:var(--radius);padding:18px 20px;
      display:flex;flex-direction:column;gap:6px;
      position:relative;overflow:hidden;
    }
    .kpi .icon{
      position:absolute;right:14px;top:14px;width:40px;height:40px;
      border-radius:10px;display:grid;place-items:center;font-size:18px;
    }
    .kpi .label{color:var(--text-muted);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
    .kpi .value{font-size:28px;font-weight:800;line-height:1.1}
    .kpi .delta{font-size:11.5px;color:var(--text-muted)}
    .kpi.kpi-blue .icon{background:#E8EEF8;color:var(--primary-2)}
    .kpi.kpi-green .icon{background:var(--success-bg);color:var(--success)}
    .kpi.kpi-amber .icon{background:var(--warning-bg);color:var(--warning)}
    .kpi.kpi-red .icon{background:var(--danger-bg);color:var(--danger)}

    /* Table */
    table.tbl{width:100%;border-collapse:collapse}
    .tbl th{
      text-align:left;padding:10px 12px;font-size:11px;color:var(--text-muted);
      text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border-soft);
      background:var(--surface-2);font-weight:700;
    }
    .tbl td{padding:11px 12px;border-bottom:1px solid var(--border-soft);font-size:13px;vertical-align:middle}
    .tbl tr:last-child td{border-bottom:none}
    .tbl tr:hover td{background:var(--surface-2)}
    .tbl-scroll{overflow:auto;max-height:540px;border:1px solid var(--border-soft);border-radius:var(--radius-sm)}
    .tbl-scroll table{border-collapse:separate;border-spacing:0}
    .tbl-scroll th{position:sticky;top:0;z-index:2}

    /* Filters bar */
    .filters{
      display:flex;flex-wrap:wrap;gap:10px;align-items:center;
      background:var(--surface);border:1px solid var(--border-soft);
      border-radius:var(--radius);padding:14px;margin-bottom:18px;
    }
    .filters .field{margin:0;flex:1;min-width:160px}
    .filters .field label{font-size:10.5px;margin-bottom:4px}
    .filters .field input,.filters .field select{padding:8px 11px;font-size:13px}

    /* Modal */
    .modal-back{
      position:fixed;inset:0;background:rgba(15,23,41,.45);backdrop-filter:blur(2px);
      z-index:50;display:grid;place-items:center;padding:24px;
    }
    .modal{
      background:var(--surface);border-radius:var(--radius-lg);
      width:100%;max-width:560px;box-shadow:var(--shadow-lg);
      max-height:90vh;display:flex;flex-direction:column;
    }
    .modal.modal-wide{max-width:980px}
    .kpi.kpi-click{cursor:pointer;border:none;text-align:left;width:100%;font:inherit;color:inherit;transition:transform .12s,box-shadow .12s}
    .kpi.kpi-click:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
    .kpi.kpi-click:active{transform:translateY(0)}
    .modal-h{padding:20px 24px;border-bottom:1px solid var(--border-soft);display:flex;align-items:center;justify-content:space-between}
    .modal-h h3{font-size:17px;font-weight:700}
    .modal-b{padding:22px 24px;overflow-y:auto}
    .modal-f{padding:14px 24px;border-top:1px solid var(--border-soft);display:flex;gap:10px;justify-content:flex-end}

    /* Misc */
    .stack{display:flex;flex-direction:column;gap:14px}
    .row{display:flex;align-items:center;gap:10px}
    .row.between{justify-content:space-between}
    .col-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .chip{
      display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;
      background:var(--border-soft);font-size:11.5px;font-weight:600;color:var(--text-muted)
    }
    .chip.success{background:var(--success-bg);color:var(--success)}
    .chip.warn{background:var(--warning-bg);color:var(--warning)}
    .chip.danger{background:var(--danger-bg);color:var(--danger)}
    .chip.info{background:var(--info-bg);color:var(--info)}
    .muted{color:var(--text-muted)}
    .empty{
      padding:40px;text-align:center;color:var(--text-muted);
      border:2px dashed var(--border);border-radius:var(--radius);
    }
    .empty .emoji{font-size:32px;margin-bottom:8px;display:block}
    .loader{padding:40px;text-align:center;color:var(--text-muted)}
    .spinner{
      width:32px;height:32px;border:3px solid #E8EEF8;border-top-color:var(--primary-2);
      border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    .scroll-x{overflow-x:auto}
    .nowrap{white-space:nowrap}

    .legend{display:flex;gap:14px;font-size:12px;color:var(--text-muted)}
    .legend i{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:6px;vertical-align:middle}
    .legend .occ{background:var(--primary-2)}
    .legend .res{background:var(--accent)}
    .legend .lib{background:#E5E9F2}

    /* Sala grid */
    .sala-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
    .sala-card{
      background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius);
      padding:16px;display:flex;flex-direction:column;gap:8px;cursor:pointer;
      transition:border-color .15s, box-shadow .15s, transform .15s;
    }
    .sala-card:hover{border-color:#C4D2EA;box-shadow:var(--shadow);transform:translateY(-1px)}
    .sala-card .code{font-weight:800;color:var(--primary);font-size:15px}
    .sala-card .name{font-size:12.5px;color:var(--text-muted);min-height:32px;line-height:1.35}
    .sala-card .stats{display:flex;justify-content:space-between;font-size:11.5px;color:var(--text-soft);border-top:1px solid var(--border-soft);padding-top:8px}

    /* Calendar / week grid */
    .week-grid{
      display:grid;grid-template-columns:90px repeat(6,1fr);
      border:1px solid var(--border-soft);border-radius:var(--radius);overflow:hidden;background:#fff
    }
    .week-grid .hdr{
      padding:10px;background:#F8FAFD;font-weight:700;font-size:12px;
      border-bottom:1px solid var(--border-soft);border-right:1px solid var(--border-soft);text-align:center;
    }
    .week-grid .row-h{padding:8px;font-size:11px;color:var(--text-muted);border-right:1px solid var(--border-soft);border-bottom:1px solid var(--border-soft);text-align:center;background:var(--surface-2);font-weight:600}
    .week-grid .cell{
      min-height:50px;padding:5px;border-right:1px solid var(--border-soft);border-bottom:1px solid var(--border-soft);
      display:flex;flex-direction:column;gap:3px;
    }
    .week-grid .cell .blk{
      padding:5px 7px;border-radius:5px;font-size:11px;line-height:1.25;color:#fff;cursor:default;
    }
    .blk.acad{background:#3B5998}
    .blk.res{background:#E0A800;color:#1A1A1A}

    /* Heat map */
    .heat-tbl{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
    .heat-tbl thead th{
      background:#0E1A33;color:#fff;padding:10px 8px;font-weight:700;font-size:11px;
      text-align:center;letter-spacing:.4px;border-right:1px solid rgba(255,255,255,.06);
    }
    .heat-tbl tbody td{border:1px solid var(--border-soft);min-width:84px}
    .heat-tbl tbody td.lab{
      background:var(--surface-2);color:var(--text-muted);text-align:center;font-size:12px;
      font-weight:600;padding:0;
    }
    .heat-tbl tbody td.lab b{color:var(--primary);font-size:13px}

    /* Print: layout limpio para reportes formales */
    @media print {
      body, html { background:var(--surface); color:#000 }
      .sidebar, .topbar, .sb-user, .toast, .login-hint { display:none !important }
      .main { margin:0; padding:0 }
      .content { padding:20px }
      .card { box-shadow:none; border:1px solid #ddd; break-inside:avoid; page-break-inside:avoid }
      .no-print-actions .card-header > .row:last-child { display:none !important }
      .tbl-scroll { max-height:none !important; overflow:visible !important }
      table { break-inside:auto }
      tr { break-inside:avoid }
      thead { display:table-header-group }
      a[href]:after { content:'' }
      .print-header { display:block !important; margin-bottom:20px; padding-bottom:10px; border-bottom:2px solid var(--primary) }
    }
    .print-header { display:none }

    .toast{
      position:fixed;bottom:24px;right:24px;z-index:80;background:#0E1A33;color:#fff;
      padding:12px 18px;border-radius:var(--radius);box-shadow:var(--shadow-lg);font-size:13px;
      animation:fadeIn .25s ease;
    }
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

    /* === "Sucediendo ahora" — animación corporativa, sin parpadeo agresivo ===
       Pulsación sutil del halo (box-shadow) sincronizada con un destello suave
       en el borde. Frecuencia: 2.2s. Usa color institucional (var(--primary)). */
    @keyframes pulseNow {
      0%,100% { box-shadow:0 0 0 0 rgba(10,132,255,.65), inset 0 0 0 2px rgba(10,132,255,.9); }
      50%     { box-shadow:0 0 0 10px rgba(10,132,255,0),  inset 0 0 0 2px rgba(10,132,255,.4); }
    }
    @keyframes nowDot {
      0%,100% { transform:scale(1);   opacity:1;   }
      50%     { transform:scale(1.7); opacity:.5; }
    }
    @keyframes nowBadge {
      0%,100% { box-shadow:0 0 0 0 rgba(255,69,58,.6); }
      50%     { box-shadow:0 0 0 8px rgba(255,69,58,0); }
    }
    .now-banner{
      display:inline-flex;align-items:center;gap:8px;
      background:linear-gradient(135deg,#FF453A,#D70015);color:#fff;
      padding:8px 14px;border-radius:10px;font-weight:700;font-size:12.5px;letter-spacing:.3px;
      box-shadow:0 2px 8px rgba(255,69,58,.35);
      animation:nowBadge 2s ease-in-out infinite;
    }
    .now-banner .dot{
      display:inline-block;width:9px;height:9px;border-radius:50%;background:#fff;
      animation:nowDot 1.4s ease-in-out infinite;
    }
    .now-banner.off{
      background:var(--surface-2);color:var(--text-muted);border:1px solid var(--border-soft);
      box-shadow:none;animation:none;
    }
    .now-banner.off .dot{background:var(--text-soft);animation:none}
    .now-cell{
      position:relative;
      background:linear-gradient(180deg, rgba(10,132,255,.18), rgba(10,132,255,.06)) !important;
      animation:pulseNow 2s ease-in-out infinite;
      z-index:2;
    }
    .now-cell::after{
      content:'';position:absolute;top:5px;right:5px;width:9px;height:9px;border-radius:50%;
      background:#FF453A;box-shadow:0 0 0 3px rgba(255,69,58,.3);
      animation:nowDot 1.4s ease-in-out infinite;pointer-events:none;z-index:3;
    }
    .blk.now, .blk-ac.now{
      background:linear-gradient(135deg,#0A84FF 0%,#0064D2 100%) !important;
      box-shadow:0 0 0 2px #fff inset, 0 0 0 3px #FF453A, 0 2px 12px rgba(255,69,58,.5);
      position:relative;
      animation:pulseNow 2s ease-in-out infinite;
    }
    .blk.now::before, .blk-ac.now::before{
      content:'● EN CURSO';position:absolute;top:-10px;left:50%;transform:translateX(-50%);
      background:#FF453A;color:#fff;font-size:9px;font-weight:800;letter-spacing:.6px;
      padding:2px 8px;border-radius:10px;line-height:1.4;white-space:nowrap;
      box-shadow:0 1px 4px rgba(255,69,58,.5);
      animation:nowBadge 2s ease-in-out infinite;z-index:5;
    }
    .hgrid .mod.now{
      background:linear-gradient(180deg,#FF453A,#D70015) !important;color:#fff !important;
      box-shadow:inset 4px 0 0 #fff;
    }
    .hgrid .mod.now b{color:#fff !important}
    .week-grid .row-h.now{
      background:linear-gradient(180deg,#FF453A,#D70015) !important;color:#fff !important;
    }
    .heat-tbl tbody tr.now-row td.lab{
      background:linear-gradient(180deg,#FF453A,#D70015) !important;color:#fff !important;
    }
    .heat-tbl tbody tr.now-row td.lab b{color:#fff !important}
    .heat-tbl tbody tr.now-row td.now-cell{
      outline:3px solid #FF453A;outline-offset:-3px;
    }
    :root[data-theme="dark"] .now-cell{
      background:linear-gradient(180deg, rgba(10,132,255,.28), rgba(10,132,255,.10)) !important;
    }
    @media (prefers-reduced-motion: reduce){
      .now-cell, .blk.now::before, .blk-ac.now::before, .now-banner { animation:none !important }
    }

    /* Horario físico */
    .hgrid{
      display:grid;grid-template-columns:120px repeat(7,minmax(120px,1fr));
      border:1px solid var(--border-soft);border-radius:var(--radius);overflow:hidden;background:var(--surface);
      font-size:11.5px;
    }
    .hgrid .hh{
      padding:10px 8px;background:#0E1A33;color:#fff;font-weight:700;font-size:11.5px;
      text-align:center;border-right:1px solid rgba(255,255,255,.06);border-bottom:1px solid var(--border-soft);
    }
    .hgrid .hh.today{background:#172649;border-bottom:3px solid var(--accent)}
    .hgrid .hh small{display:block;color:var(--sidebar-text-muted);font-weight:500;font-size:10.5px;margin-top:2px}
    .hgrid .hh.today small{color:#FFCE00}
    .hgrid .mod{
      padding:8px 6px;background:#F4F7FB;border-right:1px solid var(--border-soft);
      border-bottom:1px solid var(--border-soft);text-align:center;font-weight:700;color:var(--text-muted);
    }
    .hgrid .mod b{display:block;font-size:13px;color:var(--text);margin-bottom:2px}
    .hgrid .cl{
      padding:6px;border-right:1px solid var(--border-soft);border-bottom:1px solid var(--border-soft);
      min-height:54px;display:flex;flex-direction:column;gap:2px;background:var(--surface-2);cursor:default;
      transition:background .12s;
    }
    .hgrid .cl.libre{background:#FBFEFB}
    .hgrid .cl.libre:hover{background:#EEFAF1}
    .hgrid .cl.weekend{background:#FAFAFC}
    .hgrid .cl .blk{
      padding:4px 6px;border-radius:4px;font-size:10.5px;line-height:1.25;color:#fff;
    }
    .hgrid .cl .blk b{font-size:11px}
    .blk-ac{background:#3B5998}
    .blk-rs{background:#D9941A;color:#1A1A1A}
    .blk-pen{background:#F59E0B;color:#1A1A1A}
    .blk-libre{
      display:flex;align-items:center;justify-content:center;height:100%;
      color:#8FBA9A;font-weight:600;font-size:10.5px;letter-spacing:.5px;
    }

    .week-nav{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .week-nav .btn-icon{background:var(--border-soft)}
    .week-nav .label{font-weight:700;font-size:13.5px;padding:0 8px}

    .seg{
      display:inline-flex;background:var(--border-soft);border-radius:8px;padding:3px;gap:2px;
    }
    .seg button{
      padding:6px 14px;font-size:12.5px;font-weight:600;color:var(--text-muted);border-radius:6px;
    }
    .seg button.on{background:var(--surface);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.06)}

    .free-card{
      background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius);
      padding:14px 16px;display:flex;flex-direction:column;gap:8px;cursor:pointer;
      transition:border-color .15s, box-shadow .15s, transform .15s;
    }
    .free-card:hover{border-color:#9CC8A8;box-shadow:0 4px 14px rgba(16,185,129,.15);transform:translateY(-1px)}
    .free-card .top{display:flex;justify-content:space-between;align-items:flex-start}
    .free-card .code{font-weight:800;color:var(--primary);font-size:16px}
    .free-card .name{font-size:12px;color:var(--text-muted);line-height:1.3}
    .free-card .meta{display:flex;gap:8px;flex-wrap:wrap;font-size:11.5px;color:var(--text-soft)}

    .upload-zone{
      border:2px dashed #C4D2EA;border-radius:var(--radius);padding:36px 20px;
      text-align:center;background:#F8FAFD;cursor:pointer;transition:background .15s,border-color .15s;
      margin-top:6px;
    }
    .upload-zone:hover{background:#EEF4FB;border-color:var(--primary-2)}

    /* Chips de filtro por estado */
    .state-chips{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:4px}
    .state-chip{
      display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:999px;
      background:var(--surface);border:1.5px solid var(--border);font-weight:600;font-size:12.5px;
      color:var(--text-muted);cursor:pointer;transition:all .12s;
    }
    .state-chip b{
      padding:2px 8px;border-radius:999px;background:var(--border-soft);color:var(--text-muted);
      font-size:11px;min-width:22px;text-align:center;
    }
    .state-chip:hover{border-color:#C4D2EA}
    .state-chip.sel{background:var(--text);color:#fff;border-color:var(--text)}
    .state-chip.sel b{background:rgba(255,255,255,.18);color:#fff}
    .state-chip.warn.sel{background:var(--warning);border-color:var(--warning);color:#fff}
    .state-chip.success.sel{background:var(--success);border-color:var(--success);color:#fff}
    .state-chip.danger.sel{background:var(--danger);border-color:var(--danger);color:#fff}
    .state-chip.neutral.sel{background:var(--primary);border-color:var(--primary)}

    /* Fila de reserva pendiente: bordes y fondo distintivos */
    tr.row-pending td{background:#FEFAEA !important;border-left:0 solid var(--warning)}
    tr.row-pending td:first-child{border-left:3px solid var(--warning)}

    /* Countdown SLA */
    .countdown{
      display:inline-flex;align-items:center;gap:4px;
      padding:4px 9px;border-radius:6px;
      font-family:'Inter','Segoe UI',monospace;font-size:11.5px;font-weight:700;
      font-variant-numeric:tabular-nums;letter-spacing:.4px;
      border:1px solid transparent;white-space:nowrap;
    }
    .countdown.ok{background:#E8F8F1;color:#10B981;border-color:#B7E8D0}
    .countdown.warning{background:#FEF5E7;color:#B45309;border-color:#F5D680}
    .countdown.critical{
      background:#FDECEC;color:#B91C1C;border-color:#F4B1B1;
      animation:pulse-sla 1.4s ease-in-out infinite;
    }
    .countdown.expired{background:#1F2937;color:#FEE2E2;border-color:#374151}
    @keyframes pulse-sla{50%{opacity:.55}}

    .time-pill{
      display:inline-flex;align-items:center;gap:4px;
      padding:3px 8px;border-radius:6px;background:var(--border-soft);color:var(--text-muted);
      font-family:'Inter',monospace;font-size:11.5px;font-weight:600;
      font-variant-numeric:tabular-nums;
    }
    .time-pill.fast{background:#E8F8F1;color:#10B981}
    .time-pill.slow{background:#FEF5E7;color:#B45309}
    .time-pill.over{background:#FDECEC;color:#B91C1C}

    /* Wizard de nueva reserva */
    .step-num{
      display:inline-flex;align-items:center;justify-content:center;
      width:22px;height:22px;border-radius:50%;background:var(--primary);color:#fff;
      font-size:11px;font-weight:800;margin-right:8px;vertical-align:middle;
    }
    .sala-pick{
      background:var(--surface);border:1.5px solid var(--border-soft);border-radius:var(--radius);
      padding:12px 14px;cursor:pointer;display:flex;flex-direction:column;gap:6px;
      transition:border-color .12s,box-shadow .12s,transform .12s,background .12s;
      position:relative;
    }
    .sala-pick:hover{border-color:var(--success);box-shadow:0 4px 14px rgba(16,185,129,.15);transform:translateY(-1px)}
    .sala-pick.sel{
      border-color:var(--success);background:#F1FBF5;
      box-shadow:0 0 0 3px rgba(16,185,129,.18);
    }
    .sala-pick.sel::after{
      content:'✓';position:absolute;top:8px;right:10px;
      width:22px;height:22px;border-radius:50%;background:var(--success);color:#fff;
      display:grid;place-items:center;font-size:13px;font-weight:800;
    }
    .sala-pick.ocupada{
      cursor:not-allowed;background:#FDF6F6;border-color:#F4D2D2;opacity:.85;
    }
    .sala-pick.ocupada:hover{transform:none;box-shadow:none;border-color:#F4D2D2}
    .sala-pick.ocupada.pendiente{
      background:#FEFAEA;border-color:#F5D680;
    }
    .sala-pick.ocupada.pendiente:hover{border-color:#F5D680}
    .sala-pick .top{display:flex;align-items:center;justify-content:space-between}
    .sala-pick .code{font-weight:800;color:var(--primary);font-size:15px}
    .sala-pick .name{font-size:11.5px;color:var(--text-muted);line-height:1.3;min-height:30px}
    .sala-pick .meta{display:flex;gap:6px;flex-wrap:wrap}
    .sala-pick .meta .chip{font-size:10.5px;padding:2px 8px}

    /* Scrollbars */
    *::-webkit-scrollbar{width:10px;height:10px}
    *::-webkit-scrollbar-thumb{background:#D5DCE7;border-radius:8px}
    *::-webkit-scrollbar-thumb:hover{background:#BAC4D4}

    /* ============================================================
       MOBILE FIRST · responsive depurado
       Breakpoints: 1100 (tablet), 768 (móvil), 480 (móvil chico)
       Sidebar → drawer; topbar simplificado; grids 1 col; padding ajustado.
       ============================================================ */
    .hamburger{display:none}
    .sidebar-backdrop{display:none}

    @media (max-width:1100px){
      .grid-4{grid-template-columns:repeat(2,minmax(0,1fr))}
      .grid-3{grid-template-columns:repeat(2,minmax(0,1fr))}
      .topbar .search{display:none}
    }

    @media (max-width:768px){
      /* Layout: una sola columna */
      .app{grid-template-columns:1fr}
      .content{padding:14px 12px 80px}

      /* Sidebar como drawer */
      .sidebar{
        position:fixed;left:0;top:0;bottom:0;
        width:280px;max-width:86vw;z-index:60;
        transform:translateX(-100%);
        transition:transform .28s cubic-bezier(.4,0,.2,1);
        box-shadow:8px 0 28px rgba(0,0,0,.25);
      }
      .sidebar.open{transform:translateX(0)}
      .sidebar-backdrop{
        display:block;position:fixed;inset:0;background:rgba(0,0,0,.5);
        opacity:0;pointer-events:none;z-index:55;
        transition:opacity .25s ease;backdrop-filter:blur(2px);
      }
      .sidebar-backdrop.open{opacity:1;pointer-events:auto}

      /* Topbar compacto */
      .topbar{height:60px;padding:0 14px;gap:8px}
      .topbar h1{font-size:15px;line-height:1.2}
      .topbar .crumbs{font-size:10px}
      .topbar .right{gap:6px}
      .hamburger{
        display:inline-flex;align-items:center;justify-content:center;
        width:38px;height:38px;border-radius:10px;
        background:var(--surface-2);border:1px solid var(--border);
        color:var(--text);cursor:pointer;flex-shrink:0;
      }
      .hamburger:active{transform:scale(0.94)}
      .topbar .pill{display:none}
      .topbar .btn-icon{display:none}
      .clock{display:none}

      /* KPIs 1 columna en móvil chico, 2 cols tablet */

const { useState, useEffect, useMemo, useCallback, useRef } = React;

/* ========= CONST ========= */
const ROLES = {

  reservador: { label:'Reservador',    badge:'RSV',   desc:'Asistentes de coordinación docente que recepcionan y gestionan solicitudes' },

};

];
const DIA_NOMBRES = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
const DIA_CORTO   = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
const ESCUELAS_FULL = {
  'Adm':'Administración y Negocios','Com':'Comunicación','Dis':'Diseño',
  'Inf':'Informática','Pro':'Programas Transversales','Sal':'Salud y Bienestar','Ext':'Extracurricular'
};

/* ========= UTILS ========= */
const STORE_KEY = 'duoc_portal_v1';
const CFG_KEY   = 'duoc_portal_supabase';
const MODE_KEY  = 'duoc_portal_mode'; // 'cloud' | 'local'
const loadStore = () => {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch(e){ return {}; }
};
const saveStore = (s) => localStorage.setItem(STORE_KEY, JSON.stringify(s));
// Config global del repositorio (config.js) — tiene prioridad sobre localStorage
const getGlobalConfig = () => {
  const g = window.SUPABASE_CONFIG;
  if(g && g.url && g.key && g.url.startsWith('https://')) return g;
  return null;
};
const loadCloudConfig = () => {
  const g = getGlobalConfig();
  if(g) return g;
  try { return JSON.parse(localStorage.getItem(CFG_KEY)) || null; } catch(e){ return null; }
};
const saveCloudConfig = (c) => localStorage.setItem(CFG_KEY, JSON.stringify(c));
const clearCloudConfig = () => { localStorage.removeItem(CFG_KEY); localStorage.removeItem(MODE_KEY); };
const isGlobalConfig = () => !!getGlobalConfig();
const getMode = () => {
  // Si hay config global, siempre arranca en cloud automáticamente
  if(isGlobalConfig()) return 'cloud';
  return localStorage.getItem(MODE_KEY);
};
const setMode = (m) => localStorage.setItem(MODE_KEY, m);

const fechaToDow = (iso) => {
  // iso YYYY-MM-DD → 0 Lun .. 6 Dom
  const d = new Date(iso+'T00:00:00');
  const dw = d.getDay(); // 0 Sun .. 6 Sat
  return dw===0 ? 6 : dw-1;
};

const fmtFecha = (iso) => {
  if(!iso) return '—';
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('es-CL',{day:'2-digit',month:'short',year:'numeric'});
};

const isoDate = (d) => d.toISOString().slice(0,10);
const addDays = (d, n) => { const x = new Date(d); x.setDate(x.getDate()+n); return x; };
const getMonday = (iso) => {
  const d = new Date(iso+'T00:00:00');
  const dw = d.getDay()===0 ? 6 : d.getDay()-1;
  return addDays(d, -dw);
};
const toMin = (h) => { if(!h) return 0; const [H,M] = h.split(':').map(Number); return H*60+(M||0); };
const moduloInfo = (modulos, num) => modulos.find(m=>m.num===Number(num));
const rangeOverlapsModules = (hi, hf, mi, mf, modulos) => {
  const mIni = moduloInfo(modulos, mi);
  const mFin = moduloInfo(modulos, mf);
  if(!mIni || !mFin) return false;
  return toMin(mIni.inicio) < toMin(hf) && toMin(hi) < toMin(mFin.fin);
};
const moduleInTimeRange = (modNum, hi, hf, modulos) => {
  const m = moduloInfo(modulos, modNum);
  if(!m) return false;
  return toMin(m.inicio) < toMin(hf) && toMin(hi) < toMin(m.fin);
};

// "Ahora" — minuto del día actual. Hook que actualiza cada 30s para que el
// indicador de "clase en curso" parpadee y avance solo durante una sesión.
const nowMinutes = () => { const d = new Date(); return d.getHours()*60 + d.getMinutes(); };
function useNowMinutes(){
  const [n, setN] = useState(nowMinutes());
  useEffect(()=>{
    const tick = () => setN(nowMinutes());
    tick();
    const t = setInterval(tick, 30000);
    return ()=> clearInterval(t);
  },[]);
  return n;
}
// ¿La fecha ISO YYYY-MM-DD es hoy?
const isTodayIso = (iso) => iso === isoDate(new Date());
// ¿Un rango horario HH:MM-HH:MM contiene el minuto del día `n`?
const inRangeNow = (hi, hf, n) => {
  if(!hi || !hf) return false;
  const a = toMin(hi), b = toMin(hf);
  return n >= a && n < b;
};
// ¿El módulo `mod` está corriendo ahora? (hoy + hora dentro de inicio-fin)
const moduleRunningNow = (mod, n) => mod && inRangeNow(mod.inicio, mod.fin, n);

/* ========= CONSOLIDACIÓN DE FUENTES =========
   Cruza eventos (LISTA DE RECURSOS, por fecha) con programación (SABANA viejo,
   por patrón semanal) usando el código de sección. Cada evento queda enriquecido
   con escuela / asignatura / jornada / docente / inscritos / plazas si el SABANA
   tiene esa sección. */
const SEC_CODE_RE = /([A-Z]{3,5}\d{3,5}-\d{3})/;
const SIGLA_RE    = /([A-Z]{3,5}\d{3,5})/;
const secCodeFrom = (s) => (s||'').toString().toUpperCase().match(SEC_CODE_RE)?.[1] || null;
// Sigla de la asignatura (sin número de sección): GAA1101-013 → GAA1101
const siglaFrom   = (s) => (s||'').toString().toUpperCase().match(SIGLA_RE)?.[1] || null;
const buildSabanaIndex = (programacion) => {
  const idx = new Map();
  for(const p of programacion||[]){
    const code = secCodeFrom(p.sc);
    if(!code) continue;
    if(!idx.has(code)) idx.set(code, p);
  }
  return idx;
};
const enrichEvento = (ev, sabanaIdx) => {
  const meta = sabanaIdx.get(secCodeFrom(ev.sc));
  if(meta) return { ...ev, a:meta.a, es:meta.es, j:meta.j, n:meta.n, d:meta.d, i:meta.i, p:meta.p };
  // Sin SABANA: provee fallbacks útiles para la UI (que normalmente lee p.a/p.d).
  return { ...ev, a: ev.de || ev.sc || '', d:'', es:'', j:'', n:null, i:null, p:null };
};
// Día de la semana (0=Lun ... 6=Dom) para un ISO YYYY-MM-DD.
const dowFromIso = (iso) => {
  const d = new Date(iso + 'T00:00:00');
  return d.getDay()===0 ? 6 : d.getDay()-1;
};

// ¿Hay eventos (LISTA DE RECURSOS) cargados? — define la fuente de verdad.
const hasEventos = (data) => !!(data?.eventos && data.eventos.length);

// ¿La sala es virtual? Detecta por código o nombre que contenga "VIRTUAL".
// Se usa para excluir virtuales de reportes de subutilización (no tiene
// sentido medir capacidad/ocupación de una sala sin presencialidad).
const isSalaVirtual = (s) => {
  if(!s) return false;
  const txt = `${s.codigo||''} ${s.nombre||''} ${s.tipo||''}`.toUpperCase();
  return /VIRTUAL/.test(txt);
};

// Sesiones académicas en una fecha (ISO YYYY-MM-DD), opcionalmente filtradas
// por sala. Prefiere `eventos` por fecha exacta; cae al patrón semanal del
// SABANA cuando aún no se ha importado LISTA DE RECURSOS. El segundo parámetro
// opcional `sabanaIdx` permite reutilizar un índice ya construido.
const sesionesEnFecha = (data, iso, sala, sabanaIdx) => {
  if(hasEventos(data)){
    const idx = sabanaIdx || buildSabanaIndex(data.programacion);
    return data.eventos
      .filter(e => e.fi === iso && (!sala || e.s === sala))
      .map(e => enrichEvento(e, idx));
  }
  const dow = dowFromIso(iso);
  return (data.programacion||[]).filter(p =>
    (!sala || p.s === sala) && p.dw && p.dw[dow]==='1'
  );
};

// Lista unificada de sesiones (todas las clases). Si hay eventos, los
// enriquece con la metadata semanal del SABANA (escuela, asignatura,
// docente, jornada, inscritos, plazas) cruzando por código de sección.
// Si no hay eventos, retorna programacion tal cual.
const sesionesConsolidadas = (data) => {
  if(hasEventos(data)){
    const idx = buildSabanaIndex(data.programacion);
    return data.eventos.map(e => enrichEvento(e, idx));
  }
  return (data.programacion||[]).map(p => ({...p}));
};

const useToast = () => {
  const [msg, setMsg] = useState(null);
  useEffect(()=>{ if(msg){ const t=setTimeout(()=>setMsg(null),2500); return ()=>clearTimeout(t);} },[msg]);
  return [msg, setMsg];
};

/* ============================================================
   CAPA DE DATOS (db): abstrae Supabase (cloud) o localStorage (local)
   ============================================================ */
function createDb({ mode, supabase }){
  const isCloud = mode === 'cloud' && supabase;

  // Supabase limita las queries REST a 1.000 filas por defecto. Para tablas
  // que pueden ser grandes (programacion ~5K, eventos ~72K, reservas) hay que
  // paginar manualmente con range(from, to). Trae todas las filas concatenando
  // páginas de PAGE filas hasta recibir una página incompleta (= fin).
  const fetchAll = async (table, { order } = {}) => {
    const PAGE = 1000;
    let all = [];
    let from = 0;
    for(;;){
      let q = supabase.from(table).select('*');
      if(order) q = q.order(order);
      q = q.range(from, from + PAGE - 1);
      const { data, error } = await q;
      if(error) throw new Error(`${table}: ${error.message}`);
      if(!data || !data.length) break;
      all = all.concat(data);
      if(data.length < PAGE) break;
      from += PAGE;
    }
    return all;
  };

  // Variante tolerante: si la tabla aún no existe (migración pendiente) o
  // hay un error, retorna [] y loguea. Útil para tablas "opcionales" que
  // no deben tirar abajo todo loadAll.
  const fetchAllSafe = async (table, opts) => {
    try { return await fetchAll(table, opts); }
    catch(e){ console.warn(`fetchAll(${table}) → []:`, e.message); return []; }
  };

  /* ----- CARGA INICIAL =====
     Cargamos PRIMERO lo crítico para que la app se vea rápido. Los eventos
     (~13MB descargados, 71K filas en RAM) los cargamos en BACKGROUND
     después — bloquearlos en el primer render hace que el navegador móvil
     colapse con "Aw snap". El campo eventos arranca como [] y se llena
     cuando termina la carga en background. */
  const loadAll = async () => {
    if(isCloud){
      const [salasR, modulosR, usersR, prog, reservas, jefes, importLog] = await Promise.all([
        supabase.from('salas').select('*').order('codigo'),
        supabase.from('modulos').select('*').order('num'),
        supabase.from('app_users').select('*').order('id'),
        fetchAll('programacion'),
        fetchAll('reservas', { order:'id' }),
        fetchAllSafe('docente_jefes'),  // tolerante (puede no existir)
        fetchAllSafe('import_log'),     // tolerante (puede no existir)
      ]);
      const anyErr = [salasR, modulosR, usersR].find(r=>r.error);
      if(anyErr) throw new Error(anyErr.error.message);
      return {
        salas: salasR.data || [],
        modulos: modulosR.data || [],
        programacion: prog,
        eventos: [],          // ← se llena después por loadEventosBg
        _eventosLoaded: false,
        reservas: reservas.slice().reverse(),
        users: usersR.data || [],
        docente_jefes: jefes,
        import_log: importLog,
      };
    }
    // Modo local: JSON estático + overrides en localStorage
    const [s,p,r,m] = await Promise.all([
      fetch('./data/salas.json').then(r=>r.json()),
      fetch('./data/programacion.json').then(r=>r.json()),
      fetch('./data/reservas.json').then(r=>r.json()),
      fetch('./data/modulos.json').then(r=>r.json()),
    ]);
    const st = loadStore();
    const customSalas = st.customSalas || [];
    const deletedSalas = new Set(st.deletedSalas || []);
    const overrides = st.salaOverrides || {};
    const salasMerged = [
      ...s.filter(x => !deletedSalas.has(x.codigo))
         .map(x => overrides[x.codigo] ? {...x, ...overrides[x.codigo]} : x),
      ...customSalas
    ];
    const custom = st.customReservas || [];
    const estadosMap = new Map((st.reservaEstados||[]).map(e=>[e.id,e]));
    const rWithStates = r.map(x => estadosMap.has(x.id) ? {...x, ...estadosMap.get(x.id)} : x);
    return {
      salas: salasMerged,
      programacion: p,
      eventos: st.eventos || [],
      reservas: [...custom, ...rWithStates],
      modulos: m,
      users: st.users || DEFAULT_USERS,
      docente_jefes: st.docente_jefes || [],
      import_log: st.import_log || [],
      _local: { customSalas, deletedSalas:[...deletedSalas], salaOverrides:overrides },
    };
  };

  /* ----- LOGIN ----- */
  const login = async (username, password) => {
    if(isCloud){
      const { data, error } = await supabase
        .from('app_users')
        .select('*')
        .eq('username', username)
        .eq('password', password)
        .eq('activo', true)
        .maybeSingle();
      if(error) throw new Error(error.message);
      return data;
    }
    const u = (loadStore().users || DEFAULT_USERS).find(x => x.username===username && x.password===password && x.activo);
    return u || null;
  };

  /* ----- RESERVAS ----- */
  const createReserva = async (r) => {
    if(isCloud){
      // En cloud no enviamos id (lo asigna la BD)
      const payload = {...r}; delete payload.id;
      const { data, error } = await supabase.from('reservas').insert(payload).select().single();
      if(error) throw new Error(error.message);
      return data;
    }
    return { ...r, id: Date.now() };
  };
  const updateReservaEstado = async (id, patch) => {
    if(isCloud){
      const { data, error } = await supabase.from('reservas').update(patch).eq('id', id).select().single();
      if(error) throw new Error(error.message);
      return data;
    }
    return { id, ...patch };
  };

  /* ----- SALAS ----- */
  const createSala = async (s) => {
    if(isCloud){
      const { data, error } = await supabase.from('salas').insert(s).select().single();
      if(error) throw new Error(error.message);
      return data;
    }
    return s;
  };
  const updateSala = async (codigo, patch) => {
    if(isCloud){
      const { data, error } = await supabase.from('salas').update(patch).eq('codigo', codigo).select().single();
      if(error) throw new Error(error.message);
      return data;
    }
    return { codigo, ...patch };
  };
  const deleteSala = async (codigo) => {
    if(isCloud){
      const { error } = await supabase.from('salas').delete().eq('codigo', codigo);
      if(error) throw new Error(error.message);
    }
    return true;
  };

  /* ----- USUARIOS ----- */
  const createUser = async (u) => {
    if(isCloud){
      const payload = {...u}; delete payload.id;
      const { data, error } = await supabase.from('app_users').insert(payload).select().single();
      if(error) throw new Error(error.message);
      return data;
    }
    return { ...u, id: Date.now() };
  };
  const updateUser = async (id, patch) => {
    if(isCloud){
      const { data, error } = await supabase.from('app_users').update(patch).eq('id', id).select().single();
      if(error) throw new Error(error.message);
      return data;
    }
    return { id, ...patch };
  };
  const deleteUser = async (id) => {
    if(isCloud){
      const { error } = await supabase.from('app_users').delete().eq('id', id);
      if(error) throw new Error(error.message);
    }
    return true;
  };

  /* ----- SABANA bulk ----- */
  // Inserción resiliente en chunks. Reintenta cada chunk hasta 5 veces con
  // backoff exponencial generoso (2s, 5s, 10s, 20s, 30s) si supabase devuelve
  // error o si fetch colapsa por red. chunkSize=1000 es el máximo razonable
  // antes de hits comunes a límite de payload de PostgREST (~1MB con eventos).
  // Llama onProgress(done, total) entre chunks. opts.startFrom permite
  // reanudar saltando los primeros N elementos.
  const insertChunks = async (table, rows, { onProgress, chunkSize = 1000, startFrom = 0 } = {}) => {
    const total = rows.length;
    let done = startFrom;
    onProgress?.(done, total);
    for(let i = startFrom; i < total; i += chunkSize){
      const slice = rows.slice(i, i + chunkSize).map(x => { const c = {...x}; delete c.id; return c; });
      const backoffs = [2000, 5000, 10000, 20000, 30000];
      let lastErr = null;
      for(let attempt = 0; attempt < backoffs.length + 1; attempt++){
        try {
          const { error } = await supabase.from(table).insert(slice);
          if(error){ lastErr = new Error(error.message); }
          else { lastErr = null; break; }
        } catch(e){ lastErr = e; }
        if(attempt < backoffs.length) await new Promise(r => setTimeout(r, backoffs[attempt]));
      }
      if(lastErr){
        const e = new Error(`${table} chunk ${i} (filas ${i+1}-${Math.min(i+chunkSize, total)} de ${total}): ${lastErr.message}`);
        e.resumeFrom = i;
        throw e;
      }
      done += slice.length;
      onProgress?.(done, total);
    }
  };

  // Cuenta filas actuales en una tabla (head:true = sin traer datos)
  const countRows = async (table) => {
    if(!isCloud) return 0;
    const { count, error } = await supabase.from(table).select('*', { count:'exact', head:true });
    if(error) throw new Error(`Count ${table}: ${error.message}`);
    return count || 0;
  };

  // Registra una entrada en import_log (upsert por tipo). Llamado después
  // de cada subida masiva exitosa. archivo y importado_por son opcionales.
  const logImport = async (tipo, filas, archivo, importado_por) => {
    if(!isCloud) return;
    const row = { tipo, filas, importado_en: new Date().toISOString() };
    if(archivo != null) row.archivo = archivo;
    if(importado_por != null) row.importado_por = importado_por;
    const { error } = await supabase.from('import_log').upsert(row, { onConflict:'tipo' });
    if(error) console.warn('import_log:', error.message);  // no es crítico
  };

  const replaceProgramacion = async (prog, salasNuevas, opts = {}) => {
    if(isCloud){
      if(salasNuevas?.length){
        const { error: e1 } = await supabase.from('salas').upsert(salasNuevas, { onConflict:'codigo', ignoreDuplicates:true });
        if(e1) throw new Error('Error al upsert salas: '+e1.message);
      }
      const { error: eDel } = await supabase.from('programacion').delete().gte('id', 0);
      if(eDel) throw new Error('Error al limpiar programación: '+eDel.message);
      await insertChunks('programacion', prog, opts);
      await logImport('sabana', prog.length, opts.archivo, opts.importado_por);
    }
    return true;
  };

  /* ----- JEFATURAS DOCENTES bulk + CRUD individual ----- */
  const replaceJefes = async (jefes, opts = {}) => {
    if(isCloud){
      const { error: eDel } = await supabase.from('docente_jefes').delete().gte('id', 0);
      if(eDel) throw new Error('Error al limpiar jefaturas: '+eDel.message);
      await insertChunks('docente_jefes', jefes, opts);
      await logImport('jefes', jefes.length, opts.archivo, opts.importado_por);
    }
    return true;
  };
  const createJefe = async (jefe) => {
    if(isCloud){
      const payload = {...jefe}; delete payload.id;
      const { data, error } = await supabase.from('docente_jefes').insert(payload).select().single();
      if(error) throw new Error(error.message);
      return data;
    }
    return { ...jefe, id: Date.now() };
  };
  const updateJefe = async (id, patch) => {
    if(isCloud){
      const { data, error } = await supabase.from('docente_jefes').update(patch).eq('id', id).select().single();
      if(error) throw new Error(error.message);
      return data;
    }
    return { id, ...patch };
  };
  const deleteJefe = async (id) => {
    if(isCloud){
      const { error } = await supabase.from('docente_jefes').delete().eq('id', id);
      if(error) throw new Error(error.message);
    }
    return true;
  };

  /* ----- LISTA DE RECURSOS bulk (eventos por fecha) -----
     opts.resume = true → no borra la tabla y salta los primeros N elementos
     (donde N = filas ya en BD). Permite reintentar un upload caído sin
     perder lo subido. */
  const replaceEventos = async (eventos, salasNuevas, opts = {}) => {
    if(isCloud){
      if(salasNuevas?.length){
        const { error: e1 } = await supabase.from('salas').upsert(salasNuevas, { onConflict:'codigo', ignoreDuplicates:true });
        if(e1) throw new Error('Error al upsert salas: '+e1.message);
      }
      let startFrom = 0;
      if(opts.resume){
        startFrom = await countRows('eventos');
        if(startFrom >= eventos.length) return true;  // ya está todo
      } else {
        const { error: eDel } = await supabase.from('eventos').delete().gte('id', 0);
        if(eDel) throw new Error('Error al limpiar eventos: '+eDel.message);
      }
      await insertChunks('eventos', eventos, { ...opts, startFrom });
      await logImport('recursos', eventos.length, opts.archivo, opts.importado_por);
    }
    return true;
  };

  /* ----- BULK INITIAL SEED (from /data/*.json) ----- */
  const seedFromBundle = async () => {
    if(!isCloud) throw new Error('Seed solo disponible en modo cloud.');
    const [salas, prog, reservas] = await Promise.all([
      fetch('./data/salas.json').then(r=>r.json()),
      fetch('./data/programacion.json').then(r=>r.json()),
      fetch('./data/reservas.json').then(r=>r.json()),
    ]);
    const counts = { salas:0, programacion:0, reservas:0 };

    // SALAS: upsert (no duplica)
    const { error: e1 } = await supabase.from('salas').upsert(salas, { onConflict:'codigo' });
    if(e1) throw new Error('Salas: '+e1.message);
    counts.salas = salas.length;

    // PROGRAMACION: solo si está vacía
    const { count: progCount } = await supabase.from('programacion').select('*', { count:'exact', head:true });
    if((progCount||0)===0){
      const CHUNK = 500;
      for(let i=0;i<prog.length;i+=CHUNK){
        const slice = prog.slice(i, i+CHUNK);
        const { error } = await supabase.from('programacion').insert(slice);
        if(error) throw new Error(`Programación chunk ${i}: `+error.message);
      }
      counts.programacion = prog.length;
    }

    // RESERVAS: solo si está vacía
    const { count: resCount } = await supabase.from('reservas').select('*', { count:'exact', head:true });
    if((resCount||0)===0){
      const CHUNK = 200;
      for(let i=0;i<reservas.length;i+=CHUNK){
        const slice = reservas.slice(i, i+CHUNK).map(x=>{ const c={...x}; delete c.id; return c; });
        const { error } = await supabase.from('reservas').insert(slice);
        if(error) throw new Error(`Reservas chunk ${i}: `+error.message);
      }
      counts.reservas = reservas.length;
    }
    return counts;
  };

  /* ----- REALTIME ----- */
  const subscribe = (table, onChange) => {
    if(!isCloud) return () => {};
    const ch = supabase.channel(`rt-${table}`)
      .on('postgres_changes', { event:'*', schema:'public', table }, payload => onChange(payload))
      .subscribe();
    return () => supabase.removeChannel(ch);
  };

  /* ----- ESTADÍSTICAS DE USO (cloud) ----- */
  const getStats = async () => {
    if(!isCloud) return null;
    const tables = ['salas','modulos','programacion','eventos','reservas','app_users'];
    const results = await Promise.all(tables.map(t =>
      supabase.from(t).select('*', { count:'exact', head:true })
    ));
    const rows = {};
    tables.forEach((t,i)=> { rows[t] = results[i].count || 0; });
    return { rows };
  };

  /* ----- AUDITORÍAS (Gestiones, sólo admin) ----- */
  const loadAuditorias = async () => {
    if(isCloud) return await fetchAllSafe('auditorias', { order:'id' });
    const st = loadStore();
    return st.auditorias || [];
  };
  const saveAuditoria = async (a) => {
    const row = { ...a, updated_at: new Date().toISOString() };
    if(isCloud){
      if(row.id){
        const { id, ...patch } = row;
        const { data, error } = await supabase.from('auditorias').update(patch).eq('id', id).select().single();
        if(error) throw new Error(error.message);
        return data;
      }
      const { data, error } = await supabase.from('auditorias').insert(row).select().single();
      if(error) throw new Error(error.message);
      return data;
    }
    // Local: mantiene su propio array, id basado en timestamp
    const st = loadStore();
    const lista = st.auditorias || [];
    if(row.id){
      const i = lista.findIndex(x => x.id === row.id);
      if(i >= 0) lista[i] = { ...lista[i], ...row };
    } else {
      row.id = Date.now();
      row.created_at = new Date().toISOString();
      lista.push(row);
    }
    saveStore({ ...st, auditorias:lista });
    return row;
  };
  const deleteAuditoria = async (id) => {
    if(isCloud){
      const { error } = await supabase.from('auditorias').delete().eq('id', id);
      if(error) throw new Error(error.message);
      return true;
    }
    const st = loadStore();
    const lista = (st.auditorias || []).filter(x => x.id !== id);
    saveStore({ ...st, auditorias:lista });
    return true;
  };

  return {
    isCloud, mode,
    loadAll, login,
    createReserva, updateReservaEstado,
    createSala, updateSala, deleteSala,
    createUser, updateUser, deleteUser,
    replaceProgramacion, replaceEventos, replaceJefes, seedFromBundle,
    createJefe, updateJefe, deleteJefe, logImport,
    subscribe, getStats, fetchAll, fetchAllSafe,
    loadAuditorias, saveAuditoria, deleteAuditoria,
  };
}

function SetupScreen({ onConfigured }){
  const [tab, setTab] = useState('cloud'); // 'cloud' | 'local'
  const [url, setUrl] = useState('');
  const [key, setKey] = useState('');
  const [testing, setTesting] = useState(false);
  const [err, setErr] = useState('');

  const test = async () => {
    setErr(''); setTesting(true);
    try {
      if(!url || !key) throw new Error('URL y anon key son obligatorias.');
      if(!url.startsWith('https://') || !url.includes('.supabase.co')) throw new Error('URL inválida (formato: https://xxxx.supabase.co).');
      const sb = window.supabase.createClient(url, key);
      const { error } = await sb.from('app_users').select('id').limit(1);
      if(error) throw new Error('No se pudo conectar: '+error.message+'. ¿Ejecutaste el schema.sql?');

      setMode('cloud');
      onConfigured('cloud');
    } catch(e){
      setErr(e.message);

    }

  return (

        </div>
        <div className="login-meta">Duoc UC · Sede Viña del Mar</div>
      </div>
      <div className="login-form-wrap">
        <div className="login-card" style={{maxWidth:480}}>
          <div className="seg" style={{width:'100%',marginBottom:18}}>
            <button className={tab==='cloud'?'on':''} onClick={()=>setTab('cloud')} style={{flex:1}}>☁️ Compartido (Supabase)</button>
            <button className={tab==='local'?'on':''} onClick={()=>setTab('local')} style={{flex:1}}>💾 Solo este equipo</button>

          {tab==='cloud' && <>
            <h2>Conectar a Supabase</h2>
            <div className="sub" style={{marginBottom:18}}>Pega los valores que aparecen en <b>Supabase → Project Settings → API</b>.</div>
            <div className="field"><label>Project URL</label><input value={url} onChange={e=>setUrl(e.target.value.trim())} placeholder="https://xxxxxxxx.supabase.co"/></div>
            <div className="field"><label>Anon key (public)</label><input value={key} onChange={e=>setKey(e.target.value.trim())} placeholder="eyJhbGciOiJIUzI1NiIs…"/></div>
            {err && <div className="chip danger" style={{marginBottom:12,padding:'8px 12px'}}>{err}</div>}
            <button className="btn btn-primary btn-block" onClick={test} disabled={testing}>
              {testing ? 'Conectando…' : 'Conectar y guardar'}
            </button>
            <div className="login-hint" style={{marginTop:14}}>
              <b>¿Aún no has hecho el setup?</b> Sigue las instrucciones en <code>SETUP.md</code> del repo (crear proyecto Supabase + ejecutar <code>db/schema.sql</code>).
            </div>
          </>}

          {tab==='local' && <>
            <h2>Modo local</h2>
            <div className="sub" style={{marginBottom:18}}>Los datos viven solo en este navegador (localStorage). No hay sincronización entre usuarios. Útil para evaluación o si todavía no tienes Supabase configurado.</div>

            <div className="login-hint" style={{marginTop:14}}>Podrás cambiar a modo compartido cuando quieras desde el menú del usuario.</div>
          </>}
        </div>
      </div>
    </div>
  );
}

  const [imgOk, setImgOk] = useState(!!CAMPUS_IMG_URL);
  useEffect(()=>{
    if(!CAMPUS_IMG_URL){ setImgOk(false); return; }
    const im = new Image();
    im.onload = () => setImgOk(true);
    im.onerror = () => setImgOk(false);

  }, []);
  const [role, setRole] = useState('admin');
  const [username, setUsername] = useState('admin');

  const submit = async (e) => {
    e?.preventDefault?.();
    setErr(''); setBusy(true);
    try {
      const u = await db.login(username.trim(), password);

      onLogin(u);

      setErr('Error: '+e.message);

  const quickFill = (r) => {
    const def = DEFAULT_USERS.find(d => d.role===r);
    if(def){ setRole(r); setUsername(def.username); setPassword(def.password); setErr(''); }
  };

  return (
    <div className="login-wrap">
      <div className={`login-side ${imgOk?'has-img':''}`}>
        {imgOk && (
          <>
            <div className="campus-img" style={{backgroundImage:`url("${CAMPUS_IMG_URL}")`}}/>

        <div className="brand">
          <img src="./assets/duoc-uc-oficial.png" alt="Duoc UC · Sede Viña del Mar"/>
        </div>
        <div className="login-hero">
          <h1>Gestión académica<br/>de salas y reservas</h1>
          <p>Plataforma centralizada para administrar la asignación, programación y reservas de espacios académicos en la Sede Viña del Mar.</p>
        </div>
        <div className="login-meta">Duoc UC · Subdirección Académica · 2026</div>
      </div>
      <div className="login-form-wrap">
        <form className="login-card" onSubmit={submit}>
          <h2>Iniciar sesión</h2>
          <div className="sub">Selecciona tu perfil para continuar</div>

          <div className="role-chips">
            {Object.entries(ROLES).map(([k,v]) => (
              <div key={k} className={`role-chip ${role===k?'active':''}`} onClick={()=>{ setRole(k); quickFill(k); }}>
                {v.label}

          </div>

          <div className="field">
            <label>Usuario</label>
            <input value={username} onChange={e=>setUsername(e.target.value)} placeholder="usuario" autoComplete="username"/>
          </div>
          <div className="field">
            <label>Contraseña</label>
            <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••" autoComplete="current-password"/>
          </div>

          {err && <div className="chip danger" style={{marginBottom:12}}>{err}</div>}

          <button className="btn btn-primary btn-block" type="submit" disabled={busy}>{busy?'Verificando…':'Entrar'}</button>

          <div className="login-hint">
            <div className="row between" style={{marginBottom:6}}>
              <span><b>Demo:</b> admin · reservador · usuario · pass <b>010203</b></span>
              <span className={`chip ${mode==='cloud'?'success':'muted'}`}>{mode==='cloud'?'☁ Compartido':'💾 Local'}</span>
            </div>
            <div style={{fontSize:11,opacity:.85}}>{ROLES[role]?.desc}</div>
            <div style={{marginTop:8,fontSize:11}}><a href="#" onClick={e=>{e.preventDefault();onReconfigure();}} style={{color:'var(--primary-2)',textDecoration:'underline'}}>Reconfigurar base de datos</a></div>
          </div>
        </form>
      </div>
    </div>
  );
}

/* ========= THEME TOGGLE (claro/oscuro estilo iOS) =========
   Lee el tema desde localStorage (override del usuario) o cae a la
   preferencia del sistema. Aplica data-theme="light|dark" en <html>.
   3 estados: light | dark | auto (sigue el sistema).
   Persistente entre sesiones. */
const THEME_KEY = 'duoc_portal_theme';
const getStoredTheme = () => { try { return localStorage.getItem(THEME_KEY) || 'auto'; } catch(e){ return 'auto'; } };
const prefersDark = () => typeof window.matchMedia === 'function' && window.matchMedia('(prefers-color-scheme: dark)').matches;
// data-theme siempre tiene el tema EFECTIVO (light/dark). En auto, se
// resuelve a la preferencia del sistema. La preferencia del usuario
// (light/dark/auto) queda en localStorage por separado.
const applyTheme = (theme) => {
  const html = document.documentElement;
  const effective = theme === 'auto' ? (prefersDark() ? 'dark' : 'light') : theme;
  html.setAttribute('data-theme', effective);
  try { localStorage.setItem(THEME_KEY, theme); } catch(e){}
};
applyTheme(getStoredTheme());

function ThemeToggle(){
  const [theme, setTheme] = useState(getStoredTheme());
  // Detectar cambio de preferencia del sistema cuando estamos en auto.
  // matchMedia puede no existir (jsdom / navegadores muy viejos) → no-op.
  useEffect(()=>{
    if(typeof window.matchMedia !== 'function') return;
    const mq = window.matchMedia('(prefers-color-scheme: dark)');
    if(!mq?.addEventListener) return;
    const onChange = () => { if(theme === 'auto') applyTheme('auto'); };
    mq.addEventListener('change', onChange);
    onChange();  // aplica al montar por si el sistema cambió antes
    return () => mq.removeEventListener?.('change', onChange);
  }, [theme]);

  const cycle = () => {
    // light → dark → auto → light…
    const next = theme === 'light' ? 'dark' : theme === 'dark' ? 'auto' : 'light';
    setTheme(next); applyTheme(next);
  };
  const icon = theme === 'light' ? '☀️' : theme === 'dark' ? '🌙' : '🖥️';
  const label = theme === 'light' ? 'Claro' : theme === 'dark' ? 'Oscuro' : 'Auto';
  const titulo = `Tema: ${label} (click para cambiar)`;

  return (
    <button className="theme-toggle" onClick={cycle} title={titulo} aria-label={titulo}>
      <span className="theme-icon">{icon}</span>
      <span className="theme-label">{label}</span>
    </button>
  );
}

/* ========= RELOJ INSTITUCIONAL ========= */
function Clock(){
  const [now, setNow] = useState(new Date());
  useEffect(()=>{
    const t = setInterval(()=> setNow(new Date()), 1000);
    return ()=> clearInterval(t);
  },[]);
  const pad = (n)=> String(n).padStart(2,'0');
  const hh = pad(now.getHours());
  const mm = pad(now.getMinutes());
  const ss = pad(now.getSeconds());
  const fecha = now.toLocaleDateString('es-CL',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  return (
    <div className="clock" title="Hora actual del dispositivo">
      <div className="clock-time">
        {hh}<span className="sep">:</span>{mm}<span className="sep">:</span>{ss}
      </div>
      <div className="clock-date">{fecha}</div>

}

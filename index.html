<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Portal de Salas · DUOC UC</title>
  <link rel="icon" type="image/png" href="./assets/duoc-uc-oficial.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>
  <style>
    /* === Design tokens === */
    :root{
      --bg:#F4F6FA;
      --surface:#FFFFFF;
      --sidebar:#0E1A33;
      --sidebar-2:#172649;
      --sidebar-hover:#1F2F58;
      --sidebar-active:#FFCE00;
      --sidebar-text:#C7D0E0;
      --sidebar-text-muted:#7E8AA6;
      --primary:#002A5C;
      --primary-2:#003C82;
      --accent:#FFCE00;
      --red:#E30613;
      --text:#0F1729;
      --text-muted:#5D6B82;
      --text-soft:#8A95AA;
      --border:#E5E9F2;
      --border-soft:#EFF2F7;
      --success:#10B981;
      --success-bg:#E8F8F1;
      --warning:#F59E0B;
      --warning-bg:#FEF5E7;
      --danger:#EF4444;
      --danger-bg:#FDECEC;
      --info:#3B82F6;
      --info-bg:#EAF2FE;
      --shadow-sm:0 1px 2px rgba(15,23,41,.05);
      --shadow:0 1px 3px rgba(15,23,41,.06), 0 4px 12px rgba(15,23,41,.06);
      --shadow-lg:0 10px 30px rgba(15,23,41,.12);
      --radius:10px;
      --radius-sm:6px;
      --radius-lg:16px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%}
    body{
      font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;
      background:var(--bg);
      color:var(--text);
      font-size:14px;
      line-height:1.5;
      -webkit-font-smoothing:antialiased;
    }
    button{font-family:inherit;cursor:pointer;border:none;background:none}
    input,select,textarea{font-family:inherit;font-size:14px}
    a{color:inherit;text-decoration:none}

    /* === Login === */
    .login-wrap{
      min-height:100vh;
      display:grid;
      grid-template-columns:1fr 1.1fr;
      background:var(--bg);
    }
    .login-side{
      background:linear-gradient(135deg,#001F47 0%,#0E1A33 55%,#1B2D5C 100%);
      color:#fff;
      padding:60px 56px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      position:relative;
      overflow:hidden;
    }
    .login-side::before{
      content:"";
      position:absolute;
      width:520px;height:520px;
      right:-180px;top:-120px;
      background:radial-gradient(circle, rgba(255,206,0,.18), transparent 60%);
      border-radius:50%;
    }
    .login-side::after{
      content:"";
      position:absolute;
      width:380px;height:380px;
      left:-120px;bottom:-120px;
      background:radial-gradient(circle, rgba(227,6,19,.18), transparent 60%);
      border-radius:50%;
    }
    .login-side .brand{position:relative;display:flex;align-items:center;gap:14px}
    .login-side .brand{background:#fff;padding:14px 22px;border-radius:10px;align-self:flex-start;box-shadow:0 4px 14px rgba(0,0,0,.18)}
    .login-side .brand img{height:48px;width:auto;display:block}
    .login-hero{position:relative}
    .login-hero h1{font-size:38px;font-weight:800;line-height:1.15;margin-bottom:16px}
    .login-hero p{color:#B8C2D8;font-size:15px;max-width:440px}
    .login-meta{position:relative;color:#7E8AA6;font-size:12px}
    .login-form-wrap{
      display:flex;align-items:center;justify-content:center;padding:40px;
    }
    .login-card{
      width:100%;max-width:420px;
      background:var(--surface);
      border-radius:var(--radius-lg);
      padding:40px;
      box-shadow:var(--shadow);
    }
    .login-card h2{font-size:24px;margin-bottom:6px}
    .login-card .sub{color:var(--text-muted);margin-bottom:28px;font-size:13px}

    .field{margin-bottom:16px}
    .field label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
    .field input,.field select,.field textarea{
      width:100%;padding:11px 14px;border:1px solid var(--border);
      border-radius:var(--radius-sm);background:#fff;color:var(--text);
      transition:border-color .15s, box-shadow .15s;
    }
    .field input:focus,.field select:focus,.field textarea:focus{
      outline:none;border-color:var(--primary-2);
      box-shadow:0 0 0 3px rgba(0,60,130,.12);
    }
    .field textarea{min-height:80px;resize:vertical}

    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
      padding:10px 18px;border-radius:var(--radius-sm);font-weight:600;font-size:14px;
      transition:transform .05s ease, background .15s, color .15s, box-shadow .15s;
      white-space:nowrap;
    }
    .btn:active{transform:translateY(1px)}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-primary:hover{background:var(--primary-2)}
    .btn-accent{background:var(--accent);color:#1A1A1A}
    .btn-accent:hover{background:#FFD835}
    .btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
    .btn-ghost:hover{background:var(--border-soft)}
    .btn-danger{background:var(--danger);color:#fff}
    .btn-danger:hover{background:#DC2C2C}
    .btn-success{background:var(--success);color:#fff}
    .btn-success:hover{background:#0FA46E}
    .btn-icon{padding:8px;width:34px;height:34px;border-radius:var(--radius-sm);color:var(--text-muted)}
    .btn-icon:hover{background:var(--border-soft);color:var(--text)}
    .btn-sm{padding:6px 12px;font-size:12.5px}
    .btn-block{width:100%}

    .role-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
    .role-chip{
      padding:7px 12px;border-radius:999px;font-size:12px;font-weight:600;
      background:#F2F4F8;color:var(--text-muted);cursor:pointer;border:1px solid transparent;
    }
    .role-chip.active{background:#E8EEF8;color:var(--primary);border-color:#C4D2EA}

    .login-hint{margin-top:18px;padding:12px 14px;background:#FAFBFC;border:1px dashed var(--border);border-radius:var(--radius-sm);font-size:12px;color:var(--text-muted)}
    .login-hint b{color:var(--text)}

    /* === App layout === */
    .app{display:grid;grid-template-columns:248px 1fr;height:100vh;overflow:hidden}
    .sidebar{
      background:var(--sidebar);color:var(--sidebar-text);
      display:flex;flex-direction:column;overflow-y:auto;
    }
    .sb-brand{
      display:flex;align-items:center;justify-content:center;padding:18px 16px;
      border-bottom:1px solid rgba(255,255,255,.06);background:#fff;
    }
    .sb-brand img{height:46px;width:auto;display:block;max-width:100%}
    .sb-sub{
      padding:10px 20px;border-bottom:1px solid rgba(255,255,255,.06);
      color:var(--sidebar-text-muted);font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;text-align:center;
    }
    .sb-section{padding:20px 14px 6px;font-size:10.5px;color:var(--sidebar-text-muted);font-weight:700;letter-spacing:1.2px;text-transform:uppercase}
    .sb-nav{padding:0 10px;display:flex;flex-direction:column;gap:2px}
    .sb-item{
      display:flex;align-items:center;gap:12px;
      padding:10px 12px;border-radius:8px;color:var(--sidebar-text);
      font-weight:500;font-size:13.5px;cursor:pointer;transition:background .12s;
    }
    .sb-item:hover{background:var(--sidebar-hover);color:#fff}
    .sb-item.active{background:var(--sidebar-2);color:#fff;font-weight:600}
    .sb-item.active .sb-bullet{background:var(--accent)}
    .sb-bullet{
      width:6px;height:6px;border-radius:50%;background:transparent;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.18);
    }
    .sb-icon{width:18px;height:18px;flex-shrink:0;opacity:.9}
    .sb-spacer{flex:1}
    .sb-user{
      margin:14px 14px 18px;padding:12px;border-radius:var(--radius-sm);
      background:var(--sidebar-2);display:flex;align-items:center;gap:10px;
    }
    .avatar{
      width:36px;height:36px;border-radius:50%;
      background:linear-gradient(135deg,var(--accent),#FFB400);
      color:#1A1A1A;font-weight:700;display:flex;align-items:center;justify-content:center;
      font-size:14px;
    }
    .sb-user .meta{flex:1;min-width:0}
    .sb-user .meta b{display:block;color:#fff;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sb-user .meta small{color:var(--sidebar-text-muted);font-size:11px;text-transform:capitalize}
    .sb-user .logout{color:var(--sidebar-text-muted);width:30px;height:30px;display:grid;place-items:center;border-radius:6px}
    .sb-user .logout:hover{background:rgba(255,255,255,.08);color:#fff}

    /* === Main === */
    .main{display:flex;flex-direction:column;overflow:hidden;min-width:0}
    .topbar{
      height:72px;background:var(--surface);border-bottom:1px solid var(--border);
      display:flex;align-items:center;padding:0 28px;gap:16px;
    }
    .topbar h1{font-size:18px;font-weight:700}
    .topbar .crumbs{font-size:12px;color:var(--text-muted)}
    .topbar .right{margin-left:auto;display:flex;align-items:center;gap:14px}

    /* Reloj institucional */
    .clock{
      display:flex;flex-direction:column;align-items:flex-end;
      padding:6px 16px;border-left:3px solid var(--accent);
      background:linear-gradient(90deg, rgba(255,206,0,0.06), transparent);
      border-radius:0 8px 8px 0;
    }
    .clock-time{
      font-family:'Inter',monospace;font-size:22px;font-weight:800;
      color:var(--primary);letter-spacing:1.5px;line-height:1;
      font-variant-numeric:tabular-nums;
    }
    .clock-time .sep{color:var(--accent);animation:tick 1s steps(2) infinite}
    @keyframes tick{50%{opacity:.35}}
    .clock-date{
      font-size:11px;color:var(--text-muted);margin-top:5px;
      text-transform:capitalize;font-weight:600;letter-spacing:.3px;
    }
    .search{
      position:relative;display:flex;align-items:center;
      background:#F2F4F8;border-radius:8px;padding:8px 12px;width:280px;
    }
    .search input{background:transparent;border:none;outline:none;width:100%;padding-left:8px}
    .pill{
      padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;
      background:var(--info-bg);color:var(--info);text-transform:uppercase;letter-spacing:.4px;
    }
    .pill.success{background:var(--success-bg);color:var(--success)}
    .pill.warning{background:var(--warning-bg);color:var(--warning)}
    .pill.danger{background:var(--danger-bg);color:var(--danger)}
    .pill.muted{background:#EEF1F6;color:var(--text-muted)}

    .content{
      flex:1;overflow-y:auto;padding:24px 28px 40px;
    }

    /* === Cards / grid === */
    .grid{display:grid;gap:18px}
    .grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}
    .grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}
    @media (max-width:1100px){.grid-4{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:1fr}}

    .card{
      background:var(--surface);border:1px solid var(--border-soft);
      border-radius:var(--radius);box-shadow:var(--shadow-sm);
      padding:20px;
    }
    .card-header{
      display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;
    }
    .card-header h3{font-size:15px;font-weight:700}
    .card-header .sub{font-size:12px;color:var(--text-muted)}

    /* KPI */
    .kpi{
      background:var(--surface);border:1px solid var(--border-soft);
      border-radius:var(--radius);padding:18px 20px;
      display:flex;flex-direction:column;gap:6px;
      position:relative;overflow:hidden;
    }
    .kpi .icon{
      position:absolute;right:14px;top:14px;width:40px;height:40px;
      border-radius:10px;display:grid;place-items:center;font-size:18px;
    }
    .kpi .label{color:var(--text-muted);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
    .kpi .value{font-size:28px;font-weight:800;line-height:1.1}
    .kpi .delta{font-size:11.5px;color:var(--text-muted)}
    .kpi.kpi-blue .icon{background:#E8EEF8;color:var(--primary-2)}
    .kpi.kpi-green .icon{background:var(--success-bg);color:var(--success)}
    .kpi.kpi-amber .icon{background:var(--warning-bg);color:var(--warning)}
    .kpi.kpi-red .icon{background:var(--danger-bg);color:var(--danger)}

    /* Table */
    table.tbl{width:100%;border-collapse:collapse}
    .tbl th{
      text-align:left;padding:10px 12px;font-size:11px;color:var(--text-muted);
      text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border-soft);
      background:#FBFCFD;font-weight:700;
    }
    .tbl td{padding:11px 12px;border-bottom:1px solid var(--border-soft);font-size:13px;vertical-align:middle}
    .tbl tr:last-child td{border-bottom:none}
    .tbl tr:hover td{background:#FAFBFD}
    .tbl-scroll{overflow:auto;max-height:540px;border:1px solid var(--border-soft);border-radius:var(--radius-sm)}
    .tbl-scroll table{border-collapse:separate;border-spacing:0}
    .tbl-scroll th{position:sticky;top:0;z-index:2}

    /* Filters bar */
    .filters{
      display:flex;flex-wrap:wrap;gap:10px;align-items:center;
      background:var(--surface);border:1px solid var(--border-soft);
      border-radius:var(--radius);padding:14px;margin-bottom:18px;
    }
    .filters .field{margin:0;flex:1;min-width:160px}
    .filters .field label{font-size:10.5px;margin-bottom:4px}
    .filters .field input,.filters .field select{padding:8px 11px;font-size:13px}

    /* Modal */
    .modal-back{
      position:fixed;inset:0;background:rgba(15,23,41,.45);backdrop-filter:blur(2px);
      z-index:50;display:grid;place-items:center;padding:24px;
    }
    .modal{
      background:var(--surface);border-radius:var(--radius-lg);
      width:100%;max-width:560px;box-shadow:var(--shadow-lg);
      max-height:90vh;display:flex;flex-direction:column;
    }
    .modal-h{padding:20px 24px;border-bottom:1px solid var(--border-soft);display:flex;align-items:center;justify-content:space-between}
    .modal-h h3{font-size:17px;font-weight:700}
    .modal-b{padding:22px 24px;overflow-y:auto}
    .modal-f{padding:14px 24px;border-top:1px solid var(--border-soft);display:flex;gap:10px;justify-content:flex-end}

    /* Misc */
    .stack{display:flex;flex-direction:column;gap:14px}
    .row{display:flex;align-items:center;gap:10px}
    .row.between{justify-content:space-between}
    .col-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .chip{
      display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;
      background:#F2F4F8;font-size:11.5px;font-weight:600;color:var(--text-muted)
    }
    .chip.success{background:var(--success-bg);color:var(--success)}
    .chip.warn{background:var(--warning-bg);color:var(--warning)}
    .chip.danger{background:var(--danger-bg);color:var(--danger)}
    .chip.info{background:var(--info-bg);color:var(--info)}
    .muted{color:var(--text-muted)}
    .empty{
      padding:40px;text-align:center;color:var(--text-muted);
      border:2px dashed var(--border);border-radius:var(--radius);
    }
    .empty .emoji{font-size:32px;margin-bottom:8px;display:block}
    .loader{padding:40px;text-align:center;color:var(--text-muted)}
    .spinner{
      width:32px;height:32px;border:3px solid #E8EEF8;border-top-color:var(--primary-2);
      border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    .scroll-x{overflow-x:auto}
    .nowrap{white-space:nowrap}

    .legend{display:flex;gap:14px;font-size:12px;color:var(--text-muted)}
    .legend i{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:6px;vertical-align:middle}
    .legend .occ{background:var(--primary-2)}
    .legend .res{background:var(--accent)}
    .legend .lib{background:#E5E9F2}

    /* Sala grid */
    .sala-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
    .sala-card{
      background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius);
      padding:16px;display:flex;flex-direction:column;gap:8px;cursor:pointer;
      transition:border-color .15s, box-shadow .15s, transform .15s;
    }
    .sala-card:hover{border-color:#C4D2EA;box-shadow:var(--shadow);transform:translateY(-1px)}
    .sala-card .code{font-weight:800;color:var(--primary);font-size:15px}
    .sala-card .name{font-size:12.5px;color:var(--text-muted);min-height:32px;line-height:1.35}
    .sala-card .stats{display:flex;justify-content:space-between;font-size:11.5px;color:var(--text-soft);border-top:1px solid var(--border-soft);padding-top:8px}

    /* Calendar / week grid */
    .week-grid{
      display:grid;grid-template-columns:90px repeat(6,1fr);
      border:1px solid var(--border-soft);border-radius:var(--radius);overflow:hidden;background:#fff
    }
    .week-grid .hdr{
      padding:10px;background:#F8FAFD;font-weight:700;font-size:12px;
      border-bottom:1px solid var(--border-soft);border-right:1px solid var(--border-soft);text-align:center;
    }
    .week-grid .row-h{padding:8px;font-size:11px;color:var(--text-muted);border-right:1px solid var(--border-soft);border-bottom:1px solid var(--border-soft);text-align:center;background:#FBFCFD;font-weight:600}
    .week-grid .cell{
      min-height:50px;padding:5px;border-right:1px solid var(--border-soft);border-bottom:1px solid var(--border-soft);
      display:flex;flex-direction:column;gap:3px;
    }
    .week-grid .cell .blk{
      padding:5px 7px;border-radius:5px;font-size:11px;line-height:1.25;color:#fff;cursor:default;
    }
    .blk.acad{background:#3B5998}
    .blk.res{background:#E0A800;color:#1A1A1A}

    .toast{
      position:fixed;bottom:24px;right:24px;z-index:80;background:#0E1A33;color:#fff;
      padding:12px 18px;border-radius:var(--radius);box-shadow:var(--shadow-lg);font-size:13px;
      animation:fadeIn .25s ease;
    }
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

    /* Horario físico */
    .hgrid{
      display:grid;grid-template-columns:120px repeat(7,minmax(120px,1fr));
      border:1px solid var(--border-soft);border-radius:var(--radius);overflow:hidden;background:#fff;
      font-size:11.5px;
    }
    .hgrid .hh{
      padding:10px 8px;background:#0E1A33;color:#fff;font-weight:700;font-size:11.5px;
      text-align:center;border-right:1px solid rgba(255,255,255,.06);border-bottom:1px solid var(--border-soft);
    }
    .hgrid .hh.today{background:#172649;border-bottom:3px solid var(--accent)}
    .hgrid .hh small{display:block;color:var(--sidebar-text-muted);font-weight:500;font-size:10.5px;margin-top:2px}
    .hgrid .hh.today small{color:#FFCE00}
    .hgrid .mod{
      padding:8px 6px;background:#F4F7FB;border-right:1px solid var(--border-soft);
      border-bottom:1px solid var(--border-soft);text-align:center;font-weight:700;color:var(--text-muted);
    }
    .hgrid .mod b{display:block;font-size:13px;color:var(--text);margin-bottom:2px}
    .hgrid .cl{
      padding:6px;border-right:1px solid var(--border-soft);border-bottom:1px solid var(--border-soft);
      min-height:54px;display:flex;flex-direction:column;gap:2px;background:#FBFCFD;cursor:default;
      transition:background .12s;
    }
    .hgrid .cl.libre{background:#FBFEFB}
    .hgrid .cl.libre:hover{background:#EEFAF1}
    .hgrid .cl.weekend{background:#FAFAFC}
    .hgrid .cl .blk{
      padding:4px 6px;border-radius:4px;font-size:10.5px;line-height:1.25;color:#fff;
    }
    .hgrid .cl .blk b{font-size:11px}
    .blk-ac{background:#3B5998}
    .blk-rs{background:#D9941A;color:#1A1A1A}
    .blk-pen{background:#F59E0B;color:#1A1A1A}
    .blk-libre{
      display:flex;align-items:center;justify-content:center;height:100%;
      color:#8FBA9A;font-weight:600;font-size:10.5px;letter-spacing:.5px;
    }

    .week-nav{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .week-nav .btn-icon{background:#EEF2F7}
    .week-nav .label{font-weight:700;font-size:13.5px;padding:0 8px}

    .seg{
      display:inline-flex;background:#F2F4F8;border-radius:8px;padding:3px;gap:2px;
    }
    .seg button{

/* ========= CONST ========= */
const ROLES = {
  admin:      { label:'Administrador', badge:'ADMIN', desc:'Coordinación docente, jefatura de área y subdirección académica' },
  reservador: { label:'Reservador',    badge:'RSV',   desc:'Asistentes de coordinación docente que recepcionan y gestionan solicitudes' },

const ESCUELAS_FULL = {

  'Inf':'Informática','Pro':'Programas Transversales','Sal':'Salud y Bienestar','Ext':'Extracurricular'

/* ========= UTILS ========= */
const STORE_KEY = 'duoc_portal_v1';
const CFG_KEY   = 'duoc_portal_supabase';
const MODE_KEY  = 'duoc_portal_mode'; // 'cloud' | 'local'
const loadStore = () => {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch(e){ return {}; }
};
const saveStore = (s) => localStorage.setItem(STORE_KEY, JSON.stringify(s));
// Config global del repositorio (config.js) — tiene prioridad sobre localStorage
const getGlobalConfig = () => {
  const g = window.SUPABASE_CONFIG;
  if(g && g.url && g.key && g.url.startsWith('https://')) return g;
  return null;
};
const loadCloudConfig = () => {
  const g = getGlobalConfig();
  if(g) return g;
  try { return JSON.parse(localStorage.getItem(CFG_KEY)) || null; } catch(e){ return null; }
};
const saveCloudConfig = (c) => localStorage.setItem(CFG_KEY, JSON.stringify(c));
const clearCloudConfig = () => { localStorage.removeItem(CFG_KEY); localStorage.removeItem(MODE_KEY); };
const isGlobalConfig = () => !!getGlobalConfig();
const getMode = () => {
  // Si hay config global, siempre arranca en cloud automáticamente
  if(isGlobalConfig()) return 'cloud';
  return localStorage.getItem(MODE_KEY);
};
const setMode = (m) => localStorage.setItem(MODE_KEY, m);

const fechaToDow = (iso) => {
  // iso YYYY-MM-DD → 0 Lun .. 6 Dom
  const d = new Date(iso+'T00:00:00');
  const dw = d.getDay(); // 0 Sun .. 6 Sat
  return dw===0 ? 6 : dw-1;
};

const fmtFecha = (iso) => {
  if(!iso) return '—';
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('es-CL',{day:'2-digit',month:'short',year:'numeric'});
};

const isoDate = (d) => d.toISOString().slice(0,10);
const addDays = (d, n) => { const x = new Date(d); x.setDate(x.getDate()+n); return x; };
const getMonday = (iso) => {
  const d = new Date(iso+'T00:00:00');
  const dw = d.getDay()===0 ? 6 : d.getDay()-1;
  return addDays(d, -dw);
};
const toMin = (h) => { if(!h) return 0; const [H,M] = h.split(':').map(Number); return H*60+(M||0); };
const moduloInfo = (modulos, num) => modulos.find(m=>m.num===Number(num));
const rangeOverlapsModules = (hi, hf, mi, mf, modulos) => {
  const mIni = moduloInfo(modulos, mi);
  const mFin = moduloInfo(modulos, mf);
  if(!mIni || !mFin) return false;
  return toMin(mIni.inicio) < toMin(hf) && toMin(hi) < toMin(mFin.fin);
};
const moduleInTimeRange = (modNum, hi, hf, modulos) => {
  const m = moduloInfo(modulos, modNum);
  if(!m) return false;
  return toMin(m.inicio) < toMin(hf) && toMin(hi) < toMin(m.fin);
};

const useToast = () => {

  useEffect(()=>{ if(msg){ const t=setTimeout(()=>setMsg(null),2500); return ()=>clearTimeout(t);} },[msg]);
  return [msg, setMsg];
};

/* ============================================================
   CAPA DE DATOS (db): abstrae Supabase (cloud) o localStorage (local)
   ============================================================ */
function createDb({ mode, supabase }){
  const isCloud = mode === 'cloud' && supabase;

  /* ----- CARGA INICIAL ----- */
  const loadAll = async () => {
    if(isCloud){
      const [salas, modulos, prog, reservas, users] = await Promise.all([
        supabase.from('salas').select('*').order('codigo'),
        supabase.from('modulos').select('*').order('num'),
        supabase.from('programacion').select('*'),
        supabase.from('reservas').select('*').order('id', { ascending:false }).limit(2000),
        supabase.from('app_users').select('*').order('id'),
      ]);
      const anyErr = [salas, modulos, prog, reservas, users].find(r=>r.error);
      if(anyErr) throw new Error(anyErr.error.message);
      return {
        salas: salas.data || [],
        modulos: modulos.data || [],
        programacion: prog.data || [],
        reservas: reservas.data || [],
        users: users.data || [],
      };
    }
    // Modo local: JSON estático + overrides en localStorage
    const [s,p,r,m] = await Promise.all([
      fetch('./data/salas.json').then(r=>r.json()),
      fetch('./data/programacion.json').then(r=>r.json()),
      fetch('./data/reservas.json').then(r=>r.json()),
      fetch('./data/modulos.json').then(r=>r.json()),
    ]);
    const st = loadStore();
    const customSalas = st.customSalas || [];
    const deletedSalas = new Set(st.deletedSalas || []);
    const overrides = st.salaOverrides || {};
    const salasMerged = [
      ...s.filter(x => !deletedSalas.has(x.codigo))
         .map(x => overrides[x.codigo] ? {...x, ...overrides[x.codigo]} : x),
      ...customSalas
    ];
    const custom = st.customReservas || [];
    const estadosMap = new Map((st.reservaEstados||[]).map(e=>[e.id,e]));
    const rWithStates = r.map(x => estadosMap.has(x.id) ? {...x, ...estadosMap.get(x.id)} : x);
    return {
      salas: salasMerged,
      programacion: p,
      reservas: [...custom, ...rWithStates],
      modulos: m,
      users: st.users || DEFAULT_USERS,
      _local: { customSalas, deletedSalas:[...deletedSalas], salaOverrides:overrides },
    };
  };

  /* ----- LOGIN ----- */
  const login = async (username, password) => {
    if(isCloud){
      const { data, error } = await supabase
        .from('app_users')
        .select('*')
        .eq('username', username)
        .eq('password', password)
        .eq('activo', true)
        .maybeSingle();
      if(error) throw new Error(error.message);
      return data;
    }
    const u = (loadStore().users || DEFAULT_USERS).find(x => x.username===username && x.password===password && x.activo);
    return u || null;
  };

  /* ----- RESERVAS ----- */
  const createReserva = async (r) => {
    if(isCloud){
      // En cloud no enviamos id (lo asigna la BD)
      const payload = {...r}; delete payload.id;
      const { data, error } = await supabase.from('reservas').insert(payload).select().single();
      if(error) throw new Error(error.message);
      return data;
    }
    return { ...r, id: Date.now() };
  };
  const updateReservaEstado = async (id, patch) => {
    if(isCloud){
      const { data, error } = await supabase.from('reservas').update(patch).eq('id', id).select().single();
      if(error) throw new Error(error.message);
      return data;
    }
    return { id, ...patch };
  };

  /* ----- SALAS ----- */
  const createSala = async (s) => {
    if(isCloud){
      const { data, error } = await supabase.from('salas').insert(s).select().single();
      if(error) throw new Error(error.message);
      return data;
    }
    return s;
  };
  const updateSala = async (codigo, patch) => {
    if(isCloud){
      const { data, error } = await supabase.from('salas').update(patch).eq('codigo', codigo).select().single();
      if(error) throw new Error(error.message);
      return data;
    }
    return { codigo, ...patch };
  };
  const deleteSala = async (codigo) => {
    if(isCloud){
      const { error } = await supabase.from('salas').delete().eq('codigo', codigo);
      if(error) throw new Error(error.message);
    }
    return true;
  };

  /* ----- USUARIOS ----- */
  const createUser = async (u) => {
    if(isCloud){
      const payload = {...u}; delete payload.id;
      const { data, error } = await supabase.from('app_users').insert(payload).select().single();
      if(error) throw new Error(error.message);
      return data;
    }
    return { ...u, id: Date.now() };
  };
  const updateUser = async (id, patch) => {
    if(isCloud){
      const { data, error } = await supabase.from('app_users').update(patch).eq('id', id).select().single();
      if(error) throw new Error(error.message);
      return data;
    }
    return { id, ...patch };
  };
  const deleteUser = async (id) => {
    if(isCloud){
      const { error } = await supabase.from('app_users').delete().eq('id', id);
      if(error) throw new Error(error.message);
    }
    return true;
  };

  /* ----- SABANA bulk ----- */
  const replaceProgramacion = async (prog, salasNuevas) => {
    if(isCloud){
      if(salasNuevas?.length){
        const { error: e1 } = await supabase.from('salas').upsert(salasNuevas, { onConflict:'codigo', ignoreDuplicates:true });
        if(e1) throw new Error('Error al upsert salas: '+e1.message);
      }
      // Borra programación previa e inserta nueva en chunks
      const { error: eDel } = await supabase.from('programacion').delete().gte('id', 0);
      if(eDel) throw new Error('Error al limpiar programación: '+eDel.message);
      const CHUNK = 500;
      for(let i=0;i<prog.length;i+=CHUNK){
        const slice = prog.slice(i, i+CHUNK).map(x=>{ const c={...x}; delete c.id; return c; });
        const { error } = await supabase.from('programacion').insert(slice);
        if(error) throw new Error(`Error en chunk ${i}: `+error.message);
      }
    }
    return true;
  };

  /* ----- BULK INITIAL SEED (from /data/*.json) ----- */
  const seedFromBundle = async () => {
    if(!isCloud) throw new Error('Seed solo disponible en modo cloud.');
    const [salas, prog, reservas] = await Promise.all([
      fetch('./data/salas.json').then(r=>r.json()),
      fetch('./data/programacion.json').then(r=>r.json()),
      fetch('./data/reservas.json').then(r=>r.json()),
    ]);
    const counts = { salas:0, programacion:0, reservas:0 };

    // SALAS: upsert (no duplica)
    const { error: e1 } = await supabase.from('salas').upsert(salas, { onConflict:'codigo' });
    if(e1) throw new Error('Salas: '+e1.message);
    counts.salas = salas.length;

    // PROGRAMACION: solo si está vacía
    const { count: progCount } = await supabase.from('programacion').select('*', { count:'exact', head:true });
    if((progCount||0)===0){
      const CHUNK = 500;
      for(let i=0;i<prog.length;i+=CHUNK){
        const slice = prog.slice(i, i+CHUNK);
        const { error } = await supabase.from('programacion').insert(slice);
        if(error) throw new Error(`Programación chunk ${i}: `+error.message);
      }
      counts.programacion = prog.length;
    }

    // RESERVAS: solo si está vacía
    const { count: resCount } = await supabase.from('reservas').select('*', { count:'exact', head:true });
    if((resCount||0)===0){
      const CHUNK = 200;
      for(let i=0;i<reservas.length;i+=CHUNK){
        const slice = reservas.slice(i, i+CHUNK).map(x=>{ const c={...x}; delete c.id; return c; });
        const { error } = await supabase.from('reservas').insert(slice);
        if(error) throw new Error(`Reservas chunk ${i}: `+error.message);
      }
      counts.reservas = reservas.length;
    }
    return counts;
  };

  /* ----- REALTIME ----- */
  const subscribe = (table, onChange) => {
    if(!isCloud) return () => {};
    const ch = supabase.channel(`rt-${table}`)
      .on('postgres_changes', { event:'*', schema:'public', table }, payload => onChange(payload))
      .subscribe();
    return () => supabase.removeChannel(ch);
  };

  /* ----- ESTADÍSTICAS DE USO (cloud) ----- */
  const getStats = async () => {
    if(!isCloud) return null;
    const tables = ['salas','modulos','programacion','reservas','app_users'];
    const results = await Promise.all(tables.map(t =>
      supabase.from(t).select('*', { count:'exact', head:true })
    ));
    const rows = {};
    tables.forEach((t,i)=> { rows[t] = results[i].count || 0; });
    return { rows };
  };

  return {
    isCloud, mode,
    loadAll, login,
    createReserva, updateReservaEstado,
    createSala, updateSala, deleteSala,
    createUser, updateUser, deleteUser,
    replaceProgramacion, seedFromBundle,
    subscribe, getStats,
  };
}

/* ========= RELOJ INSTITUCIONAL ========= */
function Clock(){
  const [now, setNow] = useState(new Date());
  useEffect(()=>{
    const t = setInterval(()=> setNow(new Date()), 1000);
    return ()=> clearInterval(t);
  },[]);
  const pad = (n)=> String(n).padStart(2,'0');
  const hh = pad(now.getHours());
  const mm = pad(now.getMinutes());
  const ss = pad(now.getSeconds());
  const fecha = now.toLocaleDateString('es-CL',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  return (
    <div className="clock" title="Hora actual del dispositivo">
      <div className="clock-time">
        {hh}<span className="sep">:</span>{mm}<span className="sep">:</span>{ss}
      </div>
      <div className="clock-date">{fecha}</div>
    </div>
  );
}

/* ========= DASHBOARD ========= */
function Dashboard({ data, reservas, user, db }){
  const today = new Date(); const todayIso = today.toISOString().slice(0,10);
  const dow = today.getDay()===0 ? 6 : today.getDay()-1;

  // Estado de la BD compartida (solo admin + cloud)
  const [dbStats, setDbStats] = useState(null);
  useEffect(()=>{
    if(user.role !== 'admin' || !db?.isCloud) return;
    let cancelled = false;
    const fetch = async () => {
      try {
        const s = await db.getStats();
        if(!cancelled) setDbStats(s);
      } catch(e){ console.error('getStats:', e); }
    };
    fetch();
    const t = setInterval(fetch, 5*60*1000); // refresh cada 5 min
    return () => { cancelled = true; clearInterval(t); };
  },[db, user]);

  const bdUso = useMemo(()=>{
    if(!dbStats) return null;
    // Estimación de bytes por fila (incluye padding, indices, overhead Postgres)
    const SIZE_PER_ROW = { salas:200, modulos:80, programacion:280, reservas:400, app_users:220 };
    const FREE_LIMIT_BYTES = 500 * 1024 * 1024; // 500 MB free tier
    const FREE_EGRESS_GB   = 5;
    const FREE_REALTIME_MSG_M = 2;
    const FREE_REALTIME_CON   = 200;

    let rawBytes = 0;
    Object.entries(dbStats.rows).forEach(([t,n])=> { rawBytes += n * (SIZE_PER_ROW[t]||200); });
    const totalBytes = Math.round(rawBytes * 1.4); // overhead indices+sistema
    const pctUsado = (totalBytes / FREE_LIMIT_BYTES) * 100;
    const pctLibre = 100 - pctUsado;

    // Fecha de reseteo: 1er día del próximo mes
    const now = new Date();
    const nextReset = new Date(now.getFullYear(), now.getMonth()+1, 1);
    const diasParaReset = Math.ceil((nextReset - now) / 86400000);

    return {
      totalBytes, pctUsado, pctLibre, FREE_LIMIT_BYTES,
      nextReset, diasParaReset,
      FREE_EGRESS_GB, FREE_REALTIME_MSG_M, FREE_REALTIME_CON,
      rows: dbStats.rows,
    };
  },[dbStats]);

  // Link directo a la consola Supabase del proyecto (deriva ref desde la URL configurada)
  const supaProjectUrl = useMemo(()=>{
    const url = window.SUPABASE_CONFIG?.url || '';
    const m = url.match(/https:\/\/([a-z0-9]+)\.supabase\.co/);
    return m ? `https://supabase.com/dashboard/project/${m[1]}/settings/usage` : null;
  },[]);

  const stats = useMemo(()=>{
    const totalSalas = data.salas.length;
    const clasesHoy  = data.programacion.filter(p => p.dw[dow]==='1').length;
    const reservasHoy = reservas.filter(r => r.fi===todayIso).length;
    const pendientes  = reservas.filter(r => r.es==='pendiente').length;
    return { totalSalas, clasesHoy, reservasHoy, pendientes };
  },[data, reservas, dow, todayIso]);

  const fmtBytes = (b) => {
    if(b < 1024) return `${b} B`;
    if(b < 1024*1024) return `${(b/1024).toFixed(1)} KB`;
    if(b < 1024*1024*1024) return `${(b/(1024*1024)).toFixed(1)} MB`;
    return `${(b/(1024*1024*1024)).toFixed(2)} GB`;
  };

  const ocupacionPorTipo = useMemo(()=>{
    const m = {};
    data.salas.forEach(s => { m[s.tipo] = (m[s.tipo]||0)+1; });
    return Object.entries(m).sort((a,b)=>b[1]-a[1]);
  },[data]);

  const ocupacionPorEscuela = useMemo(()=>{
    const m = {};
    data.programacion.forEach(p => {
      const k = ESCUELAS_FULL[p.es] || (p.es || 'Otros');
      m[k] = (m[k]||0)+1;
    });
    return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,7);
  },[data]);

  const maxEsc = Math.max(1, ...ocupacionPorEscuela.map(x=>x[1]));
  const proximasReservas = useMemo(()=> reservas
    .filter(r => r.fi >= todayIso)
    .sort((a,b)=> a.fi.localeCompare(b.fi))
    .slice(0,6)
  ,[reservas, todayIso]);

  // Métricas de gestión: visibles para admin (visión equipo) y reservador (visión personal + equipo)
  const metricas = useMemo(()=>{
    if(user.role !== 'admin' && user.role !== 'reservador') return null;
    const decididas = reservas.filter(r => r.decidido_por && r.creado_en && r.decidido_en && r.es !== 'pendiente');
    const byUser = {};
    let totalMs = 0, dentroSla = 0;
    let decididas7d = 0; const cutoff7d = Date.now() - 7*86400*1000;
    for(const r of decididas){
      const cAt = new Date(r.creado_en).getTime();
      const dAt = new Date(r.decidido_en).getTime();
      if(isNaN(cAt) || isNaN(dAt)) continue;
      const elapsed = dAt - cAt;
      if(elapsed < 0) continue;
      totalMs += elapsed;
      if(elapsed <= SLA_MS) dentroSla++;
      if(dAt >= cutoff7d) decididas7d++;
      const u = r.decidido_por;
      if(!byUser[u]) byUser[u] = { count:0, totalMs:0, dentroSla:0, ultima:0, aprobadas:0, rechazadas:0, count7d:0, fastest:Infinity };
      byUser[u].count++;
      byUser[u].totalMs += elapsed;
      if(elapsed <= SLA_MS) byUser[u].dentroSla++;
      if(dAt > byUser[u].ultima) byUser[u].ultima = dAt;
      if(r.es==='aprobada') byUser[u].aprobadas++;
      if(r.es==='rechazada') byUser[u].rechazadas++;
      if(dAt >= cutoff7d) byUser[u].count7d++;
      if(elapsed < byUser[u].fastest) byUser[u].fastest = elapsed;
    }
    const avgMs = decididas.length ? totalMs / decididas.length : 0;
    const slaPct = decididas.length ? (dentroSla / decididas.length) * 100 : 0;
    const ranking = Object.entries(byUser).map(([username, m]) => ({
      username, ...m, avgMs: m.totalMs / m.count,
      slaPct: (m.dentroSla / m.count) * 100,
    })).sort((a,b)=> b.count - a.count);

    // Datos personales del usuario actual (para framing motivacional).
    // Tomamos la fila desde `ranking` (no `byUser`) porque ahí ya está calculado
    // avgMs y slaPct — byUser solo guarda los acumuladores crudos.
    const my = ranking.find(r => r.username === user.username) || null;
    const myRankByVolume = my ? ranking.findIndex(r => r.username === user.username) + 1 : 0;
    const rankingByAvg = [...ranking].sort((a,b)=> a.avgMs - b.avgMs);
    const myRankBySpeed = my ? rankingByAvg.findIndex(r => r.username === user.username) + 1 : 0;
    const rankingBySla = [...ranking].sort((a,b)=> b.slaPct - a.slaPct);
    const myRankBySla = my ? rankingBySla.findIndex(r => r.username === user.username) + 1 : 0;

    // Líderes del equipo
    const lider = {
      volumen:  ranking[0] || null,
      rapidez:  rankingByAvg[0] || null,
      sla:      rankingBySla[0] || null,
    };

    return {
      decididas: decididas.length, decididas7d, avgMs, slaPct, ranking,
      my, myRankByVolume, myRankBySpeed, myRankBySla,
      totalReservadores: ranking.length, lider,
    };
  },[reservas, user]);

  return (
    <div className="stack">
      <div className="grid grid-4">
        <div className="kpi kpi-blue">
          <span className="label">Salas activas</span>
          <span className="value">{stats.totalSalas}</span>
          <span className="delta">Sede Viña del Mar</span>
          <div className="icon">{I.salas}</div>
        </div>
        <div className="kpi kpi-green">
          <span className="label">Clases hoy ({DIA_NOMBRES[dow]})</span>
          <span className="value">{stats.clasesHoy}</span>
          <span className="delta">Desde SABANA académica</span>
          <div className="icon">{I.prog}</div>
        </div>
        <div className="kpi kpi-amber">
          <span className="label">Reservas para hoy</span>
          <span className="value">{stats.reservasHoy}</span>
          <span className="delta">Aprobadas y pendientes</span>
          <div className="icon">{I.cal}</div>
        </div>
        <div className="kpi kpi-red">
          <span className="label">Solicitudes pendientes</span>
          <span className="value">{stats.pendientes}</span>
          <span className="delta">Requieren autorización</span>
          <div className="icon">{I.bell}</div>
        </div>
      </div>

      {user.role==='admin' && db?.isCloud && bdUso && (() => {
        const pct = bdUso.pctUsado;
        const cls  = pct < 50 ? 'success' : pct < 80 ? 'warn' : 'danger';
        const barCol = pct < 50 ? 'var(--success)' : pct < 80 ? 'var(--warning)' : 'var(--danger)';
        const fechaReset = bdUso.nextReset.toLocaleDateString('es-CL', {day:'numeric', month:'long', year:'numeric'});
        return (
          <div className="card">
            <div className="card-header">
              <div>
                <h3>☁️ Estado de la base de datos compartida</h3>
                <div className="sub">Supabase Free tier · resetea recursos mensuales el <b>1 de cada mes</b> ({fechaReset} · faltan {bdUso.diasParaReset} días)</div>
              </div>
              {supaProjectUrl && (
                <a href={supaProjectUrl} target="_blank" rel="noopener noreferrer" className="btn btn-sm btn-ghost">Ver consumo real en Supabase →</a>
              )}
            </div>

            {/* Almacenamiento - permanente */}
            <div style={{marginBottom:18,padding:14,background:'#FBFCFD',borderRadius:8,border:'1px solid var(--border-soft)'}}>
              <div className="row between" style={{marginBottom:8}}>
                <div>
                  <b>💾 Almacenamiento de la base</b>
                  <div className="muted" style={{fontSize:11}}>Persistente · no se resetea</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontWeight:800,fontSize:16,color:barCol}}>{pct.toFixed(2)}% usado</div>
                  <div className="muted" style={{fontSize:11}}>te queda {bdUso.pctLibre.toFixed(2)}% libre</div>
                </div>
              </div>
              <div style={{height:14,background:'#EEF2F7',borderRadius:7,overflow:'hidden',position:'relative'}}>
                <div style={{height:'100%',width:`${Math.min(100,pct)}%`,background:barCol,transition:'width .3s'}}/>
              </div>
              <div className="row between" style={{marginTop:6,fontSize:11}}>

/* ========= HORARIO (físico Lun-Dom × módulos) ========= */
function Horario({ data, reservas, onGoNueva }){
  const today = isoDate(new Date());
  const [fecha, setFecha] = useState(today);
  const [sala, setSala] = useState(data.salas[0]?.codigo || '');

  const monday = useMemo(()=> getMonday(fecha), [fecha]);
  const week = useMemo(()=> [0,1,2,3,4,5,6].map(i => addDays(monday, i)), [monday]);

  const grid = useMemo(()=>{
    return data.modulos.map(mod => {
      return week.map((d, dw) => {
        const dIso = isoDate(d);
        const acads = data.programacion.filter(p =>
          p.s === sala && p.dw[dw] === '1' &&
          moduleInTimeRange(mod.num, p.hi, p.hf, data.modulos)
        );
        const ress = reservas.filter(r =>
          r.r === sala && r.fi === dIso && r.es !== 'rechazada' &&
          mod.num >= Number(r.mi||0) && mod.num <= Number(r.mf||0)
        );
        return { acads, ress };
      });
    });
  },[data, reservas, sala, week]);

  const salaInfo = data.salas.find(s => s.codigo===sala);
  const todayIso = isoDate(new Date());

  return (
    <div className="stack">
      <div className="filters">
        <div className="field" style={{maxWidth:260}}>
          <label>Sala / Recinto</label>
          <select value={sala} onChange={e=>setSala(e.target.value)}>
            {data.salas.map(s=> <option key={s.codigo} value={s.codigo}>{s.codigo} — {(s.nombre||'').slice(0,40)}</option>)}
          </select>
        </div>
        <div className="field" style={{maxWidth:180}}>
          <label>Fecha</label>
          <input type="date" value={fecha} onChange={e=>setFecha(e.target.value)}/>
        </div>
        <div className="week-nav">
          <button className="btn-icon" title="Semana anterior" onClick={()=>setFecha(isoDate(addDays(new Date(fecha+'T00:00:00'), -7)))}>‹</button>
          <span className="label">
            {monday.toLocaleDateString('es-CL',{day:'2-digit',month:'short'})} – {addDays(monday,6).toLocaleDateString('es-CL',{day:'2-digit',month:'short',year:'numeric'})}
          </span>
          <button className="btn-icon" title="Semana siguiente" onClick={()=>setFecha(isoDate(addDays(new Date(fecha+'T00:00:00'), 7)))}>›</button>
          <button className="btn btn-sm btn-ghost" onClick={()=>setFecha(todayIso)}>Hoy</button>
        </div>
        <div style={{marginLeft:'auto'}} className="legend">
          <span><i style={{background:'#3B5998'}}/>Clase</span>
          <span><i style={{background:'#D9941A'}}/>Reserva</span>
          <span><i style={{background:'#FBFEFB',border:'1px solid #C7E0CC'}}/>Libre</span>
        </div>
      </div>

      {salaInfo && (
        <div className="card" style={{padding:'14px 18px'}}>
          <div className="row" style={{gap:18,flexWrap:'wrap'}}>
            <div><div className="muted" style={{fontSize:11,textTransform:'uppercase',letterSpacing:.5}}>Código</div><b style={{color:'var(--primary)',fontSize:16}}>{salaInfo.codigo}</b></div>
            <div><div className="muted" style={{fontSize:11,textTransform:'uppercase',letterSpacing:.5}}>Denominación</div><div style={{fontSize:13}}>{salaInfo.nombre}</div></div>
            <div><div className="muted" style={{fontSize:11,textTransform:'uppercase',letterSpacing:.5}}>Tipo</div><span className="chip info">{salaInfo.tipo}</span></div>
            <div><div className="muted" style={{fontSize:11,textTransform:'uppercase',letterSpacing:.5}}>Capacidad</div><b>{salaInfo.capacidad}</b></div>
            <div><div className="muted" style={{fontSize:11,textTransform:'uppercase',letterSpacing:.5}}>Responsable</div><div style={{fontSize:13}}>{salaInfo.responsable}</div></div>
          </div>
        </div>
      )}

      <div className="card" style={{padding:0,overflow:'auto'}}>
        <div className="hgrid" style={{minWidth:980}}>
          <div className="hh">Módulo</div>
          {week.map((d, i) => {
            const isToday = isoDate(d)===todayIso;
            return (
              <div key={i} className={`hh ${isToday?'today':''}`}>
                {DIA_CORTO[i]}<small>{d.toLocaleDateString('es-CL',{day:'2-digit',month:'2-digit'})}</small>
              </div>
            );
          })}
          {data.modulos.map((mod, mi) => (
            <React.Fragment key={mod.num}>
              <div className="mod"><b>Mód. {mod.num}</b>{mod.inicio}<br/>{mod.fin}</div>
              {grid[mi].map((cell, di) => {
                const isWeekend = di>=5;
                if(cell.acads.length===0 && cell.ress.length===0){
                  return (
                    <div key={di} className={`cl libre ${isWeekend?'weekend':''}`} title="Espacio disponible">
                      <div className="blk-libre">LIBRE</div>
                    </div>
                  );
                }
                return (
                  <div key={di} className={`cl ${isWeekend?'weekend':''}`}>
                    {cell.acads.map((p,i)=>(
                      <div key={'a'+i} className="blk blk-ac" title={`${p.a} · ${p.d||''} · ${p.hi}-${p.hf}`}>
                        <b>{p.sc}</b><div style={{opacity:.85}}>{(p.a||'').slice(0,26)}</div>
                      </div>
                    ))}
                    {cell.ress.map((r,i)=>(
                      <div key={'r'+i} className={`blk ${r.es==='pendiente'?'blk-pen':'blk-rs'}`} title={`${r.mo} · ${r.do||''} · Mód.${r.mi}-${r.mf}`}>
                        <b>{r.es==='pendiente'?'⏳ ':'📌 '}{(r.mo||'').slice(0,24)}</b>
                        <div style={{opacity:.85}}>{r.do||r.co||''}</div>
                      </div>
                    ))}
                  </div>
                );
              })}
            </React.Fragment>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ========= SALAS ========= */
function Salas({ data, user, toast, onCreate, onUpdate, onDelete }){
  const [q, setQ] = useState('');
  const [tipo, setTipo] = useState('');
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({codigo:'',nombre:'',capacidad:'',tipo:'Sala',responsable:''});
  const [busy, setBusy] = useState(false);
  const canEdit = user.role==='admin';

  const tipos = useMemo(()=> [...new Set(data.salas.map(s=>s.tipo))].sort(), [data]);
  const filtered = useMemo(()=> data.salas.filter(s =>
    (!q || s.codigo.toLowerCase().includes(q.toLowerCase()) || (s.nombre||'').toLowerCase().includes(q.toLowerCase())) &&
    (!tipo || s.tipo===tipo)
  ), [data, q, tipo]);

  const resetForm = () => setForm({codigo:'',nombre:'',capacidad:'',tipo:'Sala',responsable:''});

  const add = async () => {
    if(!form.codigo || !form.nombre){ toast('Completa código y nombre.'); return; }
    if(data.salas.some(s => s.codigo===form.codigo)){ toast('Ya existe una sala con ese código.'); return; }
    setBusy(true);
    try {
      await onCreate({...form, capacidad:Number(form.capacidad)||0});
      resetForm(); setModal(null); toast('Sala creada correctamente.');
    } finally { setBusy(false); }
  };
  const startEdit = (sala) => {
    setForm({codigo:sala.codigo, nombre:sala.nombre||'', capacidad:String(sala.capacidad||''), tipo:sala.tipo||'Sala', responsable:sala.responsable||''});
    setModal('edit');
  };
  const update = async () => {
    if(!form.nombre){ toast('La denominación es obligatoria.'); return; }
    setBusy(true);
    try {
      await onUpdate(form.codigo, { nombre:form.nombre, capacidad:Number(form.capacidad)||0, tipo:form.tipo, responsable:form.responsable });
      resetForm(); setModal(null); toast('Sala actualizada.');
    } finally { setBusy(false); }
  };
  const del = async (codigo) => {
    if(!window.confirm(`¿Eliminar la sala ${codigo}? No se puede deshacer.`)) return;
    try { await onDelete(codigo); toast('Sala eliminada.'); } catch(e){}
  };

  return (
    <div className="stack">
      <div className="filters">
        <div className="field">
          <label>Buscar</label>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Código o nombre…"/>
        </div>
        <div className="field">
          <label>Tipo</label>
          <select value={tipo} onChange={e=>setTipo(e.target.value)}>
            <option value="">Todos</option>
            {tipos.map(t=> <option key={t}>{t}</option>)}
          </select>
        </div>
        <div style={{marginLeft:'auto'}}>
          {canEdit && <button className="btn btn-primary" onClick={()=>setModal('add')}>{I.plus}Nueva sala</button>}
        </div>
      </div>

/* ========= PROGRAMACIÓN SABANA ========= */
function Programacion({ data }){
  const [sala, setSala] = useState('');
  const [escuela, setEscuela] = useState('');
  const [jornada, setJornada] = useState('');
  const [dia, setDia] = useState('');

  const filtered = useMemo(()=>{
    return data.programacion.filter(p =>
      (!sala || p.s===sala) &&
      (!escuela || p.es===escuela) &&
      (!jornada || p.j===jornada) &&
      (dia==='' || p.dw[Number(dia)]==='1')
    );
  },[data, sala, escuela, jornada, dia]);

  const escuelas = useMemo(()=> [...new Set(data.programacion.map(p=>p.es).filter(Boolean))].sort(), [data]);
  const jornadas = useMemo(()=> [...new Set(data.programacion.map(p=>p.j).filter(Boolean))].sort(), [data]);

  // Si hay sala seleccionada, mostrar grilla semanal
  const showWeek = !!sala;
  const modulosUsados = useMemo(()=>{
    if(!showWeek) return [];
    const set = new Set();
    filtered.forEach(p=> set.add(p.hi+'|'+p.hf));
    return [...set].sort();
  },[filtered, showWeek]);

  const cellMap = useMemo(()=>{
    if(!showWeek) return {};
    const m = {};
    filtered.forEach(p=>{
      const slot = p.hi+'|'+p.hf;
      for(let d=0;d<7;d++){
        if(p.dw[d]==='1'){
          const k = `${slot}__${d}`;
          (m[k] ||= []).push(p);
        }
      }
    });
    return m;
  },[filtered, showWeek]);

  // Conteo de clases por día de la semana (verifica el mapeo SABANA → dw)
  const diaCount = useMemo(()=>{
    const c = [0,0,0,0,0,0,0];
    data.programacion.forEach(p => {
      for(let i=0;i<7;i++) if(p.dw && p.dw[i]==='1') c[i]++;
    });
    return c;
  },[data.programacion]);
  const maxDiaCount = Math.max(1, ...diaCount);
  const [verifOpen, setVerifOpen] = useState(false);

  return (
    <div className="stack">
      <div className="card" style={{padding:'14px 18px'}}>
        <div className="row between" style={{cursor:'pointer'}} onClick={()=>setVerifOpen(v=>!v)}>
          <div>
            <h3 style={{fontSize:14}}>📘 Cómo se leen las clases desde la SABANA <span style={{color:'var(--text-soft)',fontWeight:500,fontSize:12}}>· Click para {verifOpen?'ocultar':'ver'} detalle</span></h3>

                <div style={{fontSize:13,fontWeight:700,color:i>=5?'var(--text-soft)':'var(--primary)'}}>{diaCount[i]}</div>
              </div>
            ))}
          </div>
        </div>
        {verifOpen && (
          <div style={{marginTop:14,paddingTop:14,borderTop:'1px solid var(--border-soft)',fontSize:13,lineHeight:1.55,color:'var(--text-muted)'}}>
            <p>Cada fila de la SABANA tiene 7 columnas (<b>Lun. · Martes · Miér. · Jueves · Viernes · Sábado · Domingo</b>) marcadas con <b>X</b> en los días que se imparte la clase.
            Al importar, se convierte a 7 bits <code>dw</code> donde <code>dw[0]=Lun</code> y <code>dw[6]=Dom</code>.</p>
            <p style={{marginTop:8}}>Al elegir una fecha en la pestaña <b>Horario semanal</b>, se calcula su día de semana y se buscan todas las clases con ese bit en 1, dentro del rango de fecha del semestre y con el horario activo en el módulo consultado.</p>
            <p style={{marginTop:8}}>Las barras arriba muestran cuántas clases hay registradas por día. <b>Total clases en SABANA: {data.programacion.length.toLocaleString('es-CL')}</b>.</p>
            <div style={{marginTop:10,padding:10,background:'#FBFCFD',borderRadius:8,border:'1px solid var(--border-soft)'}}>
              <div className="row" style={{gap:14,flexWrap:'wrap'}}>
                {DIA_NOMBRES.map((nm,i) => (
                  <div key={i} style={{flex:1,minWidth:90}}>
                    <div style={{fontSize:11,color:'var(--text-muted)',fontWeight:700,marginBottom:3}}>{nm}</div>
                    <div style={{height:6,background:'#EEF2F7',borderRadius:4,overflow:'hidden'}}>
                      <div style={{height:'100%',width:`${(diaCount[i]/maxDiaCount)*100}%`,background:i>=5?'var(--text-soft)':'var(--primary-2)'}}/>
                    </div>
                    <div style={{fontSize:11,marginTop:3}}>{diaCount[i].toLocaleString('es-CL')} clases</div>
                  </div>

              </div>
            </div>
          </div>

      </div>

      <div className="filters">
        <div className="field">
          <label>Sala</label>
          <select value={sala} onChange={e=>setSala(e.target.value)}>
            <option value="">Todas</option>

        </div>
        <div className="field">
          <label>Escuela</label>
          <select value={escuela} onChange={e=>setEscuela(e.target.value)}>
            <option value="">Todas</option>
            {escuelas.map(e=> <option key={e} value={e}>{ESCUELAS_FULL[e]||e}</option>)}

        <div className="field">
          <label>Jornada</label>
          <select value={jornada} onChange={e=>setJornada(e.target.value)}>
            <option value="">Todas</option>
            {jornadas.map(j=> <option key={j} value={j}>{j==='D'?'Diurno':j==='V'?'Vespertino':j}</option>)}
          </select>
        </div>
        <div className="field">
          <label>Día</label>
          <select value={dia} onChange={e=>setDia(e.target.value)}>
            <option value="">Todos</option>

          </select>
        </div>
        <div style={{alignSelf:'flex-end'}} className="chip info">{filtered.length} sesiones</div>
      </div>

      {showWeek ? (
        <div className="card">
          <div className="card-header">
            <div><h3>Programación semanal · {sala}</h3><div className="sub">{data.salas.find(s=>s.codigo===sala)?.nombre}</div></div>
            <div className="legend"><span><i className="occ"/>Clase regular</span></div>
          </div>
          {modulosUsados.length===0 ? (
            <div className="empty"><span className="emoji">📅</span>Sin programación para esta sala con los filtros aplicados.</div>
          ) : (
            <div className="week-grid">
              <div className="hdr">Horario</div>
              {DIA_CORTO.slice(0,6).map(d => <div key={d} className="hdr">{d}</div>)}

                const [hi,hf] = slot.split('|');
                return (
                  <React.Fragment key={slot}>
                    <div className="row-h">{hi}<br/>{hf}</div>

                      const items = cellMap[`${slot}__${d}`] || [];
                      return (
                        <div key={d} className="cell">
                          {items.map((p,i)=>(
                            <div key={i} className="blk acad" title={`${p.a} · ${p.d}`}>

/* ========= SLA · CRONÓMETRO Y HELPERS ========= */
const SLA_MS = 60 * 60 * 1000; // 1 hora

const fmtDuration = (ms) => {
  if(ms < 0) return '0m';
  const min = Math.floor(ms / 60000);
  if(min < 1) return `${Math.floor(ms/1000)}s`;
  if(min < 60) return `${min}m`;
  const h = Math.floor(min/60), m = min % 60;
  return m > 0 ? `${h}h ${m}m` : `${h}h`;
};

function Countdown({ creadoEn, sla = SLA_MS, compact = false }){
  const [now, setNow] = useState(Date.now());
  useEffect(()=>{
    const t = setInterval(()=> setNow(Date.now()), 1000);
    return ()=> clearInterval(t);
  },[]);
  if(!creadoEn) return <span className="muted" style={{fontSize:11}}>—</span>;
  const start = new Date(creadoEn).getTime();
  if(isNaN(start)) return <span className="muted" style={{fontSize:11}}>—</span>;
  const deadline = start + sla;
  const remaining = deadline - now;
  const expired = remaining <= 0;
  const absMs = Math.abs(remaining);
  const mins = Math.floor(absMs / 60000);
  const secs = Math.floor((absMs / 1000) % 60);
  const display = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
  const cls = expired ? 'expired' : (mins < 10 ? 'critical' : (mins < 30 ? 'warning' : 'ok'));
  const label = expired
    ? `Vencida hace ${fmtDuration(absMs)}`
    : `Tiempo restante para decidir (SLA 1 h)`;
  return (
    <span className={`countdown ${cls}`} title={label}>
      {expired ? '⏰ Vencida' : `⏳ ${display}`}
    </span>
  );
}

function Reservas({ reservas, data, user, toast, onGoNueva, onUpdateEstado }){
  const [tab, setTab] = useState('lista');
  const [q, setQ] = useState('');
  const canApprove = user.role==='admin' || user.role==='reservador';
  // Aprobadores arrancan en pendientes (las accionables); usuario ve todas las suyas
  const [estado, setEstado] = useState(canApprove ? 'pendiente' : '');

  // Subconjunto base: si es usuario, solo sus propias reservas
  const ownArr = useMemo(()=>{
    if(user.role==='usuario') return reservas.filter(r => r.co===user.email || r.creado_por===user.username);
    return reservas;
  },[reservas, user]);

  // Contadores por estado para los chips
  const counts = useMemo(()=>({
    pendiente: ownArr.filter(r=>r.es==='pendiente').length,
    aprobada:  ownArr.filter(r=>r.es==='aprobada').length,
    rechazada: ownArr.filter(r=>r.es==='rechazada').length,
    total:     ownArr.length,
  }),[ownArr]);

  const filtered = useMemo(()=>{
    return ownArr.filter(r =>
      (!q || (r.r||'').toLowerCase().includes(q.toLowerCase()) || (r.mo||'').toLowerCase().includes(q.toLowerCase()) || (r.do||'').toLowerCase().includes(q.toLowerCase())) &&
      (!estado || r.es===estado)
    ).sort((a,b)=>{
      // pendientes primero, luego por fecha desc
      if(a.es==='pendiente' && b.es!=='pendiente') return -1;
      if(b.es==='pendiente' && a.es!=='pendiente') return 1;
      return (b.fi||'').localeCompare(a.fi||'');
    });
  },[ownArr, q, estado]);

  const setEstadoReserva = async (id, nuevo) => {
    try {
      await onUpdateEstado(id, { es:nuevo, decidido_por:user.username, decidido_en:new Date().toISOString() });
      toast(`Reserva ${nuevo==='aprobada'?'aprobada':'rechazada'}.`);
    } catch(e){}
  };

  const fmtRel = (iso) => {
    if(!iso) return '';
    const d = new Date(iso);
    const diff = (Date.now() - d.getTime())/1000;
    if(diff < 60) return 'hace un instante';
    if(diff < 3600) return `hace ${Math.floor(diff/60)} min`;
    if(diff < 86400) return `hace ${Math.floor(diff/3600)} h`;
    if(diff < 86400*7) return `hace ${Math.floor(diff/86400)} d`;
    return d.toLocaleDateString('es-CL', {day:'2-digit',month:'short',year:'numeric'});
  };

  const stateChip = (v, count, label, cls) => (
    <button
      onClick={()=>setEstado(v)}
      className={`state-chip ${estado===v?'sel':''} ${cls}`}>
      <span>{label}</span><b>{count}</b>
    </button>
  );

  return (
    <div className="stack">
      <div className="row" style={{justifyContent:'space-between'}}>
        <div className="seg">
          <button className={tab==='lista'?'on':''} onClick={()=>setTab('lista')}>Listado de reservas</button>
          <button className={tab==='libres'?'on':''} onClick={()=>setTab('libres')}>{I.search}&nbsp;Buscar espacios libres</button>
        </div>
        {tab==='lista' && (
          <div className="chip info">{filtered.length} de {counts.total} {user.role==='usuario'?'(tuyas)':'totales'}</div>
        )}
      </div>

      {tab==='lista' && <>
        {/* Filtros chip-style por estado con contadores */}
        <div className="state-chips">
          {stateChip('pendiente', counts.pendiente, '⏳ Pendientes', 'warn')}
          {stateChip('aprobada',  counts.aprobada,  '✓ Aprobadas',  'success')}
          {stateChip('rechazada', counts.rechazada, '✗ Rechazadas', 'danger')}
          {stateChip('',          counts.total,     '📋 Todas',      'neutral')}
          <div style={{flex:1}}/>
          <div className="field" style={{margin:0,minWidth:240,maxWidth:320}}>
            <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar sala, motivo o docente…" style={{padding:'8px 12px'}}/>
          </div>
        </div>

        {/* Aviso para aprobadores cuando ya no hay pendientes */}
        {canApprove && estado==='pendiente' && counts.pendiente===0 && (
          <div className="card" style={{borderColor:'#C7E0CC',background:'#F6FCF8',padding:'16px 20px'}}>
            <div className="row" style={{gap:12}}>
              <span style={{fontSize:22}}>✓</span>
              <div>
                <b style={{color:'var(--success)'}}>No hay solicitudes pendientes</b>
                <div className="muted" style={{fontSize:12}}>Todo al día. Cambia el filtro para ver el historial de reservas decididas.</div>
              </div>
            </div>
          </div>
        )}

        <div className="card" style={{padding:0}}>
          <div className="tbl-scroll">
            <table className="tbl">
              <thead><tr>
                <th>Fecha</th><th>Horario</th><th>Sala</th><th>Motivo</th><th>Solicitante</th>
                <th title="SLA: tiempo para decidir / tiempo que tardó la decisión">⏱ SLA</th>
                <th>Estado</th><th style={{textAlign:'right'}}>Acciones</th>
              </tr></thead>
              <tbody>
                {filtered.map(r => {
                  const decidedMs = (r.decidido_en && r.creado_en) ? (new Date(r.decidido_en) - new Date(r.creado_en)) : null;
                  const timeCls = decidedMs==null ? '' : (decidedMs <= SLA_MS/2 ? 'fast' : (decidedMs <= SLA_MS ? 'slow' : 'over'));
                  return (
                  <tr key={r.id} className={r.es==='pendiente' ? 'row-pending' : ''}>
                    <td className="nowrap">{fmtFecha(r.fi)}{r.ff && r.ff!==r.fi ? ' → '+fmtFecha(r.ff) : ''}</td>
                    <td className="nowrap">{r.hi}–{r.hf}<div className="muted" style={{fontSize:11}}>Mód. {r.mi}–{r.mf}</div></td>
                    <td><b style={{color:'var(--primary)'}}>{r.r}</b></td>
                    <td style={{maxWidth:340}}>{r.mo}</td>
                    <td><div style={{fontSize:13}}>{r.do||'—'}</div><div className="muted" style={{fontSize:11}}>{r.co||r.ru}</div></td>
                    <td className="nowrap">
                      {r.es==='pendiente' && <Countdown creadoEn={r.creado_en}/>}
                      {r.es!=='pendiente' && decidedMs!=null && (
                        <span className={`time-pill ${timeCls}`} title={`Tardó ${fmtDuration(decidedMs)} en ${r.es==='aprobada'?'aprobarse':'rechazarse'}`}>
                          ⏱ {fmtDuration(decidedMs)}

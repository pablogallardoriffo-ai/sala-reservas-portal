<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Portal de Salas DUOC UC</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #002855;
      color: white;
      padding: 20px;
    }

    .container {
      padding: 20px;
      max-width: 1200px;
      margin: auto;
    }

    .roles {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .card {
      background: white;
      padding: 15px;
      border: 1px solid #ddd;
      cursor: pointer;
    }

    .active {
      background: #ffe082;
    }

    input, select {
      margin: 5px;
      padding: 5px;
    }

    button {
      padding: 5px 10px;
      margin: 5px;
      cursor: pointer;
    }

    .panel {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .box {
      background: white;
      padding: 15px;
      border: 1px solid #ccc;
    }

    .item {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #eee;
      padding: 5px 0;
    }
  </style>
</head>

<body>

<header>
  <h1>Portal de Gestión de Salas - DUOC UC</h1>
</header>

<div id="root"></div>

<script type="text/babel">

function App() {
  const [role, setRole] = React.useState("admin");
  const [password, setPassword] = React.useState("010203");
  const [logged, setLogged] = React.useState({ admin: true });

  const [rooms, setRooms] = React.useState([]);
  const [users, setUsers] = React.useState([]);

  const [newRoom, setNewRoom] = React.useState({ name:"", capacity:"", type:"" });
  const [newUser, setNewUser] = React.useState({ name:"", password:"", role:"usuario" });

  const login = () => {
    if(password.length >= 4){
      setLogged({...logged, [role]: true});
    }
  };

  const addRoom = () => {
    if(!newRoom.name) return;
    setRooms([...rooms, {...newRoom, id: Date.now()}]);
    setNewRoom({ name:"", capacity:"", type:"" });
  };

  const deleteRoom = (id) => {
    setRooms(rooms.filter(r => r.id !== id));
  };

  const addUser = () => {
    if(!newUser.name || !newUser.password) return;
    setUsers([...users, {...newUser, id: Date.now()}]);
    setNewUser({ name:"", password:"", role:"usuario" });
  };

  const deleteUser = (id) => {
    setUsers(users.filter(u => u.id !== id));
  };

  return (
    <div className="container">

      <div className="roles">
        {["admin","reservador","usuario","subdireccion"].map(r => (
          <div key={r}
            onClick={() => setRole(r)}
            className={`card ${role===r ? "active":""}`}>
            <b>{r}</b>
          </div>
        ))}
      </div>

      {!logged[role] && (
        <div>
          <h3>Ingreso</h3>
          <input type="password" value={password} onChange={e=>setPassword(e.target.value)} />
          <button onClick={login}>Entrar</button>
        </div>
      )}

      {logged[role] && role === "admin" && (
        <div className="panel">

          <div className="box">
            <h3>Gestionar Salas</h3>

            <input placeholder="Nombre"
              value={newRoom.name}
              onChange={e=>setNewRoom({...newRoom,name:e.target.value})}/>

            <input placeholder="Capacidad"
              value={newRoom.capacity}
              onChange={e=>setNewRoom({...newRoom,capacity:e.target.value})}/>

            <input placeholder="Tipo"
              value={newRoom.type}
              onChange={e=>setNewRoom({...newRoom,type:e.target.value})}/>

            <button onClick={addRoom}>Crear</button>

            {rooms.map(r => (
              <div key={r.id} className="item">
                {r.name}
                <button onClick={()=>deleteRoom(r.id)}>X</button>
              </div>
            ))}
          </div>

          <div className="box">
            <h3>Gestionar Usuarios</h3>

            <input placeholder="Nombre"
              value={newUser.name}
              onChange={e=>setNewUser({...newUser,name:e.target.value})}/>

            <input placeholder="Clave"
              value={newUser.password}
              onChange={e=>setNewUser({...newUser,password:e.target.value})}/>

            <select value={newUser.role}
              onChange={e=>setNewUser({...newUser,role:e.target.value})}>
              <option value="usuario">Usuario</option>
              <option value="reservador">Reservador</option>
              <option value="subdireccion">Subdirección</option>
            </select>

            <button onClick={addUser}>Crear</button>

            {users.map(u => (
              <div key={u.id} className="item">
                {u.name} ({u.role})
                <button onClick={()=>deleteUser(u.id)}>X</button>
              </div>
            ))}
          </div>

        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>

                      )}
                      {r.es!=='pendiente' && decidedMs==null && <span className="muted" style={{fontSize:11}}>—</span>}
                    </td>
                    <td>
                      {r.es==='aprobada' && <span className="chip success">Aprobada</span>}
                      {r.es==='pendiente' && <span className="chip warn">Pendiente</span>}
                      {r.es==='rechazada' && <span className="chip danger">Rechazada</span>}
                      {r.es!=='pendiente' && r.decidido_por && (
                        <div className="muted" style={{fontSize:10.5,marginTop:4,lineHeight:1.3}}>
                          por <b>{r.decidido_por}</b>{r.decidido_en && <> · {fmtRel(r.decidido_en)}</>}
                        </div>
                      )}
                    </td>
                    <td className="nowrap" style={{textAlign:'right'}}>
                      {canApprove && r.es==='pendiente' && <>
                        <button className="btn btn-sm btn-success" onClick={()=>setEstadoReserva(r.id,'aprobada')}>{I.check}Aprobar</button>{' '}
                        <button className="btn btn-sm btn-danger" onClick={()=>setEstadoReserva(r.id,'rechazada')}>{I.x}Rechazar</button>
                      </>}
                      {!canApprove && r.es==='pendiente' && (r.creado_por===user.username || r.co===user.email) && (
                        <button className="btn btn-sm btn-ghost" onClick={()=>{
                          if(window.confirm('¿Cancelar tu solicitud? El recurso quedará libre nuevamente.')) setEstadoReserva(r.id,'rechazada');
                        }}>{I.x}Cancelar</button>
                      )}
                    </td>
                  </tr>
                  );
                })}
                {filtered.length===0 && counts.pendiente!==0 && <tr><td colSpan="8"><div className="empty"><span className="emoji">🗂</span>Sin reservas en este filtro.</div></td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      </>}

      {tab==='libres' && <BuscarLibres data={data} reservas={reservas} onGoNueva={onGoNueva}/>}
    </div>
  );
}

/* ========= BUSCAR ESPACIOS LIBRES ========= */
function BuscarLibres({ data, reservas, onGoNueva }){
  const [fecha, setFecha] = useState(isoDate(new Date()));
  const [mi, setMi] = useState(1);
  const [mf, setMf] = useState(2);
  const [tipo, setTipo] = useState('');
  const [capMin, setCapMin] = useState('');
  const [busqueda, setBusqueda] = useState(false);

  const tipos = useMemo(()=> [...new Set(data.salas.map(s=>s.tipo))].sort(), [data]);
  const dow = fechaToDow(fecha);
  const modIni = moduloInfo(data.modulos, mi);
  const modFin = moduloInfo(data.modulos, mf);

  const libres = useMemo(()=>{
    if(!busqueda) return null;
    const miN = Number(mi), mfN = Number(mf);
    const capN = Number(capMin)||0;
    return data.salas
      .filter(s => !tipo || s.tipo===tipo)
      .filter(s => !capN || (s.capacidad||0) >= capN)
      .map(s => {
        const acadConflict = data.programacion.some(p =>
          p.s===s.codigo && p.dw[dow]==='1' &&
          rangeOverlapsModules(p.hi, p.hf, miN, mfN, data.modulos)
        );
        if(acadConflict) return null;
        const resConflict = reservas.some(r =>
          r.r===s.codigo && r.fi===fecha && r.es!=='rechazada' &&
          miN <= Number(r.mf||0) && Number(r.mi||0) <= mfN
        );
        return resConflict ? null : s;
      })
      .filter(Boolean);
  },[busqueda, fecha, mi, mf, tipo, capMin, data, reservas, dow]);

  const buscar = () => {
    if(Number(mi) > Number(mf)){ alert('El módulo inicio debe ser ≤ módulo fin.'); return; }
    setBusqueda(true);
  };

  return (
    <>
      <div className="filters">
        <div className="field" style={{maxWidth:170}}>
          <label>Fecha</label>
          <input type="date" value={fecha} onChange={e=>{setFecha(e.target.value);setBusqueda(false)}}/>
        </div>
        <div className="field" style={{maxWidth:160}}>
          <label>Mód. inicio</label>
          <select value={mi} onChange={e=>{setMi(e.target.value);setBusqueda(false)}}>
            {data.modulos.map(m=> <option key={m.num} value={m.num}>Mód. {m.num} ({m.inicio})</option>)}
          </select>
        </div>
        <div className="field" style={{maxWidth:160}}>
          <label>Mód. fin</label>
          <select value={mf} onChange={e=>{setMf(e.target.value);setBusqueda(false)}}>
            {data.modulos.map(m=> <option key={m.num} value={m.num}>Mód. {m.num} ({m.fin})</option>)}
          </select>
        </div>
        <div className="field" style={{maxWidth:160}}>
          <label>Tipo</label>
          <select value={tipo} onChange={e=>{setTipo(e.target.value);setBusqueda(false)}}>
            <option value="">Cualquiera</option>
            {tipos.map(t=> <option key={t}>{t}</option>)}
          </select>
        </div>
        <div className="field" style={{maxWidth:140}}>
          <label>Capacidad mín.</label>
          <input type="number" value={capMin} onChange={e=>{setCapMin(e.target.value);setBusqueda(false)}} placeholder="0"/>
        </div>
        <div style={{alignSelf:'flex-end'}}>
          <button className="btn btn-primary" onClick={buscar}>{I.search}Buscar</button>
        </div>
      </div>

      <div className="card" style={{padding:'10px 16px'}}>
        <div className="row" style={{gap:14,flexWrap:'wrap',fontSize:13}}>
          <span className="muted">Consulta:</span>
          <b>{DIA_NOMBRES[dow]}</b>
          <b>{fmtFecha(fecha)}</b>
          <span className="muted">·</span>
          <span>{modIni?`Mód.${modIni.num} (${modIni.inicio})`:''} → {modFin?`Mód.${modFin.num} (${modFin.fin})`:''}</span>
          {tipo && <><span className="muted">·</span><span className="chip">{tipo}</span></>}
          {capMin && <><span className="muted">·</span><span className="chip">≥ {capMin} personas</span></>}
        </div>
      </div>

      {busqueda && libres && (
        libres.length===0 ? (
          <div className="empty"><span className="emoji">🚫</span>No hay salas disponibles para esos criterios.<br/>Prueba con otro horario, día o tipo.</div>
        ) : (
          <>
            <div className="row between"><div className="chip success" style={{fontSize:13,padding:'7px 14px'}}>{libres.length} sala(s) disponibles</div></div>
            <div className="grid" style={{gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:12}}>
              {libres.map(s => (
                <div key={s.codigo} className="free-card" onClick={()=> onGoNueva?.({sala:s.codigo,fecha,mi:Number(mi),mf:Number(mf)})}>
                  <div className="top">
                    <div>
                      <div className="code">{s.codigo}</div>
                      <div className="name">{s.nombre}</div>
                    </div>
                    <span className="chip success">Libre</span>
                  </div>
                  <div className="meta">
                    <span className="chip">{s.tipo}</span>
                    <span className="chip">Cap. {s.capacidad}</span>
                  </div>
                  <div className="muted" style={{fontSize:11.5}}>Resp.: {s.responsable}</div>
                </div>
              ))}
            </div>
          </>
        )
      )}
      {!busqueda && <div className="empty"><span className="emoji">🔎</span>Define los criterios y presiona <b>Buscar</b> para listar las salas libres.</div>}
    </>
  );
}

/* ========= NUEVA RESERVA ========= */
function NuevaReserva({ data, reservas, user, toast, goReservas, prefill, onCreate }){
  const [f, setF] = useState({
    fi: prefill?.fecha || isoDate(new Date()),
    ff: '',
    sala: prefill?.sala || '',
    mi: prefill?.mi || 1, mf: prefill?.mf || 2,
    motivo:'', todoSemestre:'NO', observacion:'',
    docente:user.nombre, correo:user.email, rut:''
  });
  const [filtros, setFiltros] = useState({ tipo:'', capMin:'', mostrarTodas:false });

  const tipos = useMemo(()=> [...new Set(data.salas.map(s=>s.tipo))].sort(), [data]);

  // Cálculo en vivo de salas libres / ocupadas para la fecha + módulos
  const evaluacion = useMemo(()=>{
    const libres = []; const ocupadas = [];
    if(!f.fi){ return { libres, ocupadas }; }
    const dow = fechaToDow(f.fi);
    const miN = Number(f.mi), mfN = Number(f.mf);
    const capN = Number(filtros.capMin)||0;
    for(const s of data.salas){
      if(filtros.tipo && s.tipo!==filtros.tipo) continue;
      if(capN && (s.capacidad||0) < capN) continue;
      const acad = data.programacion.find(p =>
        p.s===s.codigo && p.dw[dow]==='1' &&
        rangeOverlapsModules(p.hi, p.hf, miN, mfN, data.modulos)
      );
      const res = reservas.find(r =>
        r.r===s.codigo && r.fi===f.fi && r.es!=='rechazada' &&
        miN <= Number(r.mf||0) && Number(r.mi||0) <= mfN
      );
      if(acad || res){
        const esPendiente = !!res && res.es==='pendiente';
        ocupadas.push({
          sala: s,
          motivo: acad
            ? `Clase regular: ${(acad.a||'').slice(0,40)} (${acad.hi}–${acad.hf})`
            : `Reserva ${esPendiente?'PENDIENTE de autorización':'aprobada'}: ${(res.mo||'').slice(0,40)} (Mód.${res.mi}–${res.mf})`,
          tipo: acad ? 'académica' : (esPendiente ? 'pendiente' : 'reserva'),
          esPendiente,
          esPropia: !!res && (res.creado_por===user.username || res.co===user.email),
          reservaId: res?.id,
        });
      } else {
        libres.push(s);
      }
    }
    return { libres, ocupadas };
  },[f.fi, f.mi, f.mf, filtros, data, reservas, user]);

  const dow = f.fi ? fechaToDow(f.fi) : 0;
  const modIni = moduloInfo(data.modulos, f.mi);
  const modFin = moduloInfo(data.modulos, f.mf);
  const salaSel = f.sala ? data.salas.find(s => s.codigo===f.sala) : null;
  const conflictoSel = useMemo(()=>{
    if(!f.sala) return null;
    return evaluacion.ocupadas.find(o => o.sala.codigo===f.sala) || null;
  },[f.sala, evaluacion]);

  const submit = () => {
    if(!f.sala) return toast('Selecciona una sala disponible.');
    if(!f.motivo) return toast('Indica el motivo de la reserva.');
    if(Number(f.mi) > Number(f.mf)) return toast('El módulo inicio debe ser ≤ módulo fin.');
    if(conflictoSel){
      // Hard-block para usuario; pendientes bloquean a TODOS los roles para evitar topes
      if(conflictoSel.esPendiente){
        if(conflictoSel.esPropia){
          return toast('Ya tienes una solicitud PENDIENTE para esa sala/horario. Cancélala primero desde Reservas.');
        }
        return toast(`No se puede reservar: existe una solicitud PENDIENTE de autorización para esa sala/horario. Resuélvela primero (aprobar o rechazar) antes de crear otra.`);
      }
      if(user.role==='usuario'){
        return toast(`No se puede reservar: la sala ya tiene un compromiso (${conflictoSel.motivo}).`);
      }
      // admin/reservador: solo conflictos con clase regular o reserva aprobada pueden forzarse
      if(!window.confirm(`⚠ Conflicto detectado: ${conflictoSel.motivo}\n\n¿Deseas forzar la reserva de todas formas? (acción excepcional)`)) return;
    }
    const nuevo = {
      fi: f.fi, ff: f.ff || f.fi,
      hi: modIni?.inicio || '',
      hf: modFin?.fin || '',
      mi: Number(f.mi), mf: Number(f.mf),
      r: f.sala, ts: f.todoSemestre,
      mo: f.motivo, do: f.docente, ru: f.rut, co: f.correo,
      observacion: f.observacion,
      es: user.role==='admin' || user.role==='reservador' ? 'aprobada' : 'pendiente',
      creado_por: user.username, creado_en: new Date().toISOString(),
    };
    (async () => {
      try {
        await onCreate(nuevo);
        toast(nuevo.es==='aprobada' ? 'Reserva creada y aprobada.' : 'Solicitud enviada. Pendiente de autorización.');
        goReservas?.();
      } catch(e){}
    })();
  };

  return (
    <div className="stack">
      {/* PASO 1 — Cuándo */}
      <div className="card">
        <div className="card-header">
          <div>
            <h3><span className="step-num">1</span>¿Cuándo necesitas la sala?</h3>
            <div className="sub">Elige fecha y rango de módulos. El sistema buscará automáticamente los recintos disponibles.</div>
          </div>
        </div>
        <div className="grid" style={{gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:12}}>
          <div className="field"><label>Fecha</label><input type="date" value={f.fi} onChange={e=>setF({...f,fi:e.target.value,sala:''})}/></div>
          <div className="field"><label>Hasta (opcional)</label><input type="date" value={f.ff} onChange={e=>setF({...f,ff:e.target.value})}/></div>
          <div className="field"><label>Módulo inicio</label>
            <select value={f.mi} onChange={e=>setF({...f,mi:Number(e.target.value),sala:''})}>
              {data.modulos.map(m=> <option key={m.num} value={m.num}>Mód. {m.num} ({m.inicio})</option>)}
            </select>
          </div>
          <div className="field"><label>Módulo fin</label>
            <select value={f.mf} onChange={e=>setF({...f,mf:Number(e.target.value),sala:''})}>
              {data.modulos.map(m=> <option key={m.num} value={m.num}>Mód. {m.num} ({m.fin})</option>)}
            </select>
          </div>
          <div className="field"><label>Tipo de recinto</label>
            <select value={filtros.tipo} onChange={e=>setFiltros({...filtros,tipo:e.target.value})}>
              <option value="">Cualquiera</option>
              {tipos.map(t=> <option key={t}>{t}</option>)}
            </select>
          </div>
          <div className="field"><label>Capacidad mínima</label><input type="number" value={filtros.capMin} onChange={e=>setFiltros({...filtros,capMin:e.target.value})} placeholder="Ej: 30"/></div>
        </div>
        <div className="row" style={{gap:12,fontSize:13,marginTop:14,paddingTop:14,borderTop:'1px solid var(--border-soft)',flexWrap:'wrap'}}>
          <span className="muted">Disponibilidad para</span>
          <b>{DIA_NOMBRES[dow]}, {fmtFecha(f.fi)}</b>
          <span className="muted">·</span>
          <b>{modIni?.inicio} – {modFin?.fin}</b>
          <span style={{flex:1}}/>
          <span className="chip success">{evaluacion.libres.length} libres</span>
          <span className="chip danger">{evaluacion.ocupadas.length} ocupadas</span>
        </div>
      </div>

      {/* PASO 2 — Elegir sala */}
      <div className="card">
        <div className="card-header">
          <div>
            <h3><span className="step-num">2</span>Elige una sala disponible</h3>
            <div className="sub">Cards en verde = libres en ese horario. Click para seleccionar.</div>
          </div>
          <div className="seg">
            <button className={!filtros.mostrarTodas?'on':''} onClick={()=>setFiltros({...filtros,mostrarTodas:false})}>Solo libres</button>
            <button className={filtros.mostrarTodas?'on':''} onClick={()=>setFiltros({...filtros,mostrarTodas:true})}>Mostrar ocupadas</button>
          </div>
        </div>

        {evaluacion.libres.length===0 && !filtros.mostrarTodas && (
          <div className="empty"><span className="emoji">🚫</span>No hay salas libres con esos criterios.<br/>Cambia el horario, día o filtros, o activa "Mostrar ocupadas" para ver por qué.</div>
        )}

        {(evaluacion.libres.length>0 || filtros.mostrarTodas) && (
          <div className="grid" style={{gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:10}}>
            {evaluacion.libres.map(s => (
              <div key={s.codigo}
                className={`sala-pick ${f.sala===s.codigo?'sel':''}`}
                onClick={()=>setF({...f,sala:s.codigo})}>
                <div className="top">
                  <div className="code">{s.codigo}</div>
                  <span className="chip success">Libre</span>
                </div>
                <div className="name">{(s.nombre||'').slice(0,60)}</div>
                <div className="meta">
                  <span className="chip">{s.tipo}</span>
                  <span className="chip">Cap. {s.capacidad}</span>
                </div>
              </div>
            ))}
            {filtros.mostrarTodas && evaluacion.ocupadas.map(({sala:s, motivo, tipo, esPendiente, esPropia}) => (
              <div key={s.codigo} className={`sala-pick ocupada ${esPendiente?'pendiente':''}`} title={motivo}>
                <div className="top">
                  <div className="code" style={{color:'var(--text-muted)'}}>{s.codigo}</div>
                  <span className={`chip ${esPendiente?'warn':'danger'}`}>
                    {tipo==='académica' ? 'Clase' : (esPendiente ? '⏳ Pendiente' : '📌 Reserva')}
                  </span>
                </div>
                <div className="name">{(s.nombre||'').slice(0,60)}</div>
                <div className="meta" style={{fontSize:10.5,color:'var(--text-soft)'}}>{motivo.slice(0,70)}{esPropia ? ' · tuya' : ''}</div>
              </div>
            ))}
          </div>
        )}

        <div className="field" style={{marginTop:14,maxWidth:520}}>
          <label>O elige por código (incluso si está ocupada — el admin/reservador podrá forzar)</label>
          <select value={f.sala} onChange={e=>setF({...f,sala:e.target.value})}>
            <option value="">— Selecciona una sala del listado superior o por código —</option>
            {data.salas.map(s=> <option key={s.codigo} value={s.codigo}>{s.codigo} — {(s.nombre||'').slice(0,46)} (cap. {s.capacidad})</option>)}
          </select>
        </div>
      </div>

      {/* PASO 3 — Detalles (solo si hay sala) */}
      {salaSel && (() => {
        const cf = conflictoSel;
        const isPend = cf?.esPendiente;
        const borderCol = !cf ? '#C7E0CC' : (isPend ? '#F5D680' : '#F4D2D2');
        const bgCol    = !cf ? '#F6FCF8' : (isPend ? '#FEFAEA' : '#FDF7F7');
        const textCol  = !cf ? 'var(--success)' : (isPend ? 'var(--warning)' : 'var(--danger)');
        const icon     = !cf ? '✓ ' : (isPend ? '⏳ ' : '⚠ ');
        const titleTxt = !cf ? 'Sala seleccionada' : (isPend ? 'Sala con reserva pendiente' : 'Sala con conflicto');
        return (<>
          <div className="card" style={{borderColor:borderCol, background:bgCol}}>
            <div className="card-header">
              <div>
                <h3 style={{color:textCol}}>
                  {icon}{titleTxt}: <b style={{color:'var(--primary)'}}>{salaSel.codigo}</b>
                </h3>
                <div className="sub">{salaSel.nombre}</div>
              </div>
              <button className="btn-icon" title="Quitar selección" onClick={()=>setF({...f,sala:''})}>{I.x}</button>
            </div>
            <div className="row" style={{gap:18,flexWrap:'wrap',fontSize:13}}>
              <div><div className="muted" style={{fontSize:11,textTransform:'uppercase',letterSpacing:.4}}>Tipo</div><span className="chip">{salaSel.tipo}</span></div>
              <div><div className="muted" style={{fontSize:11,textTransform:'uppercase',letterSpacing:.4}}>Capacidad</div><b>{salaSel.capacidad}</b></div>
              <div><div className="muted" style={{fontSize:11,textTransform:'uppercase',letterSpacing:.4}}>Responsable</div>{salaSel.responsable}</div>
              <div><div className="muted" style={{fontSize:11,textTransform:'uppercase',letterSpacing:.4}}>Horario</div><b>{modIni?.inicio} – {modFin?.fin}</b></div>
            </div>
            {cf && (
              <div className={`chip ${isPend?'warn':'danger'}`} style={{marginTop:12,padding:'10px 14px',fontSize:13}}>
                {cf.motivo}{isPend && cf.esPropia ? ' · Es tu propia solicitud' : ''}
              </div>
            )}
            {cf && isPend && (
              <div className="login-hint" style={{marginTop:10,fontSize:12}}>
                Las solicitudes pendientes <b>bloquean</b> el recurso hasta ser aprobadas o rechazadas para evitar topes.
                {cf.esPropia && ' Puedes cancelarla desde la pestaña Reservas.'}
              </div>
            )}
          </div>

          <div className="card">
            <div className="card-header">
              <div>
                <h3><span className="step-num">3</span>Datos de la solicitud</h3>
                <div className="sub">Información del responsable y motivo de la reserva</div>
              </div>
            </div>
            <div className="field"><label>Motivo *</label><input value={f.motivo} onChange={e=>setF({...f,motivo:e.target.value})} placeholder="Recuperación de clase, reunión, evento…"/></div>
            <div className="field"><label>Observación</label><textarea value={f.observacion} onChange={e=>setF({...f,observacion:e.target.value})}/></div>
            <div className="col-2">
              <div className="field"><label>Docente / Colaborador</label><input value={f.docente} onChange={e=>setF({...f,docente:e.target.value})}/></div>
              <div className="field"><label>RUT / ID</label><input value={f.rut} onChange={e=>setF({...f,rut:e.target.value})}/></div>
            </div>
            <div className="col-2">
              <div className="field"><label>Correo</label><input value={f.correo} onChange={e=>setF({...f,correo:e.target.value})}/></div>
              <div className="field"><label>¿Todo el semestre?</label>
                <select value={f.todoSemestre} onChange={e=>setF({...f,todoSemestre:e.target.value})}>
                  <option>NO</option><option>SI</option>
                </select>
              </div>
            </div>
            <div className="row" style={{justifyContent:'flex-end',marginTop:14,gap:10}}>
              <button className="btn btn-ghost" onClick={()=>setF({...f,sala:''})}>Cambiar sala</button>
              <button className="btn btn-primary" onClick={submit}>{I.check}Enviar solicitud</button>
            </div>
          </div>
        </>);
      })()}
    </div>
  );
}

/* ========= USUARIOS ========= */
function Usuarios({ users, toast, onCreate, onUpdate, onDelete }){
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({id:null,username:'',nombre:'',email:'',password:'',role:'usuario',activo:true});
  const [pwdForm, setPwdForm] = useState({id:null, username:'', password:'', confirm:''});

  const resetForm = () => setForm({id:null,username:'',nombre:'',email:'',password:'',role:'usuario',activo:true});

  const add = async () => {
    if(!form.username||!form.password||!form.nombre) return toast('Completa los campos requeridos.');
    if(users.some(u=>u.username===form.username)) return toast('Ese usuario ya existe.');
    try {
      const { id, ...rest } = form;
      await onCreate(rest);
      resetForm(); setModal(null); toast('Usuario creado.');
    } catch(e){}
  };
  const update = async () => {
    if(!form.nombre) return toast('El nombre es obligatorio.');
    try {
      await onUpdate(form.id, { nombre:form.nombre, email:form.email, role:form.role, activo:form.activo });
      resetForm(); setModal(null); toast('Usuario actualizado.');
    } catch(e){}
  };
  const resetPassword = async () => {
    if(!pwdForm.password || pwdForm.password.length<4) return toast('La contraseña debe tener al menos 4 caracteres.');
    if(pwdForm.password!==pwdForm.confirm) return toast('Las contraseñas no coinciden.');
    try {
      await onUpdate(pwdForm.id, { password:pwdForm.password });
      setPwdForm({id:null,username:'',password:'',confirm:''}); setModal(null);
      toast('Contraseña actualizada.');
    } catch(e){}
  };
  const del = async (id) => {
    if(!window.confirm('¿Eliminar usuario?')) return;
    try { await onDelete(id); toast('Usuario eliminado.'); } catch(e){}
  };
  const toggle = async (id, current) => {
    try { await onUpdate(id, { activo: !current }); } catch(e){}
  };
  const startEdit = (u) => { setForm({...u, password:''}); setModal('edit'); };
  const startPwd = (u) => { setPwdForm({id:u.id, username:u.username, password:'', confirm:''}); setModal('pwd'); };

  return (
    <div className="stack">
      <div className="filters">
        <div className="muted" style={{fontSize:13}}>{users.length} usuarios en el sistema · El administrador puede asignar y resetear contraseñas</div>
        <div style={{marginLeft:'auto'}}>
          <button className="btn btn-primary" onClick={()=>{resetForm();setModal('add')}}>{I.plus}Nuevo usuario</button>
        </div>
      </div>
      <div className="card" style={{padding:0}}>
        <table className="tbl">
          <thead><tr><th>Usuario</th><th>Nombre</th><th>Correo</th><th>Rol</th><th>Estado</th><th style={{textAlign:'right'}}>Acciones</th></tr></thead>
          <tbody>
            {users.map(u=>(
              <tr key={u.id}>
                <td><b>{u.username}</b></td>
                <td>{u.nombre}</td>
                <td className="muted">{u.email}</td>
                <td><span className="chip info">{ROLES[u.role].label}</span></td>
                <td>{u.activo ? <span className="chip success">Activo</span> : <span className="chip danger">Inactivo</span>}</td>
                <td className="nowrap" style={{textAlign:'right'}}>
                  <button className="btn btn-sm btn-ghost" onClick={()=>toggle(u.id, u.activo)}>{u.activo?'Desactivar':'Activar'}</button>{' '}
                  <button className="btn-icon" onClick={()=>startEdit(u)} title="Editar">{I.edit}</button>
                  <button className="btn-icon" onClick={()=>startPwd(u)} title="Asignar contraseña">{I.key}</button>
                  <button className="btn-icon" onClick={()=>del(u.id)} title="Eliminar">{I.trash}</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {(modal==='add' || modal==='edit') && (
        <Modal title={modal==='add'?'Crear usuario':`Editar usuario ${form.username}`} onClose={()=>{setModal(null);resetForm()}} onSave={modal==='add'?add:update}>
          <div className="col-2">
            <div className="field"><label>Usuario</label><input value={form.username} onChange={e=>modal==='add' && setForm({...form,username:e.target.value})} disabled={modal==='edit'}/></div>
            {modal==='add' && <div className="field"><label>Contraseña</label><input type="password" value={form.password} onChange={e=>setForm({...form,password:e.target.value})} placeholder="Mínimo 4 caracteres"/></div>}
            {modal==='edit' && <div className="field"><label>Estado</label>
              <select value={form.activo?'1':'0'} onChange={e=>setForm({...form,activo:e.target.value==='1'})}>
                <option value="1">Activo</option><option value="0">Inactivo</option>
              </select>
            </div>}
          </div>
          <div className="field"><label>Nombre completo</label><input value={form.nombre} onChange={e=>setForm({...form,nombre:e.target.value})}/></div>
          <div className="col-2">
            <div className="field"><label>Correo</label><input value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/></div>
            <div className="field"><label>Rol</label>
              <select value={form.role} onChange={e=>setForm({...form,role:e.target.value})}>
                {Object.entries(ROLES).map(([k,v])=> <option key={k} value={k}>{v.label}</option>)}
              </select>
            </div>
          </div>
        </Modal>
      )}

      {modal==='pwd' && (
        <Modal title={`Asignar contraseña a ${pwdForm.username}`} onClose={()=>setModal(null)} onSave={resetPassword} saveLabel="Guardar contraseña">
          <div className="field"><label>Nueva contraseña</label><input type="password" value={pwdForm.password} onChange={e=>setPwdForm({...pwdForm,password:e.target.value})} placeholder="Mínimo 4 caracteres" autoFocus/></div>
          <div className="field"><label>Confirmar contraseña</label><input type="password" value={pwdForm.confirm} onChange={e=>setPwdForm({...pwdForm,confirm:e.target.value})}/></div>
          <div className="login-hint">El usuario podrá iniciar sesión inmediatamente con esta contraseña.</div>
        </Modal>
      )}
    </div>
  );
}

/* ========= REPORTES ========= */
function Reportes({ data, reservas }){
  const topSalas = useMemo(()=>{
    const m = {};
    data.programacion.forEach(p => { m[p.s] = (m[p.s]||0)+1; });
    reservas.forEach(r => { m[r.r] = (m[r.r]||0)+0.5; });
    return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,15);
  },[data, reservas]);

  const reservasPorEstado = useMemo(()=>{
    const m = {aprobada:0,pendiente:0,rechazada:0};
    reservas.forEach(r => { m[r.es]=(m[r.es]||0)+1; });
    return m;
  },[reservas]);

  const max = Math.max(1, ...topSalas.map(x=>x[1]));

  return (
    <div className="grid grid-2">
      <div className="card">
        <div className="card-header"><div><h3>Salas más utilizadas</h3><div className="sub">SABANA + reservas</div></div></div>
        <div className="stack" style={{gap:8}}>
          {topSalas.map(([k,v])=>(
            <div key={k}>
              <div className="row between" style={{marginBottom:4}}>
                <span style={{fontWeight:600,fontSize:13}}>{k}</span>
                <span className="muted" style={{fontSize:12}}>{Math.round(v)}</span>
              </div>
              <div style={{height:8,background:'#EEF2F7',borderRadius:6,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${(v/max)*100}%`,background:'linear-gradient(90deg,var(--primary-2),#5A8FE0)'}}/>
              </div>
            </div>
          ))}
        </div>
      </div>
      <div className="card">
        <div className="card-header"><div><h3>Estado de reservas</h3></div></div>
        <div className="grid grid-3">
          <div className="kpi kpi-green"><span className="label">Aprobadas</span><span className="value">{reservasPorEstado.aprobada}</span></div>
          <div className="kpi kpi-amber"><span className="label">Pendientes</span><span className="value">{reservasPorEstado.pendiente}</span></div>
          <div className="kpi kpi-red"><span className="label">Rechazadas</span><span className="value">{reservasPorEstado.rechazada}</span></div>
        </div>
      </div>
    </div>
  );
}

/* ========= IMPORTAR SABANA ========= */
function ImportarSabana({ data, toast, onReplace, onSeed, isCloud }){
  const [parsing, setParsing] = useState(false);
  const [preview, setPreview] = useState(null);
  const [archivo, setArchivo] = useState(null);
  const [reemplazar, setReemplazar] = useState(true);

  const findCol = (headers, candidatos) => {
    const norm = (s) => (s||'').toString().toLowerCase().replace(/\s+/g,'').replace(/\./g,'');
    for(const cand of candidatos){
      const c = norm(cand);
      const idx = headers.findIndex(h => norm(h)===c || norm(h).startsWith(c));
      if(idx>=0) return idx;
    }
    return -1;
  };

  const onFile = async (e) => {
    const f = e.target.files?.[0];
    if(!f) return;
    setArchivo(f); setParsing(true); setPreview(null);
    try {
      const ab = await f.arrayBuffer();
      const wb = XLSX.read(ab, { type:'array', cellDates:true });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { header:1, defval:null });
      if(rows.length<2) throw new Error('La hoja está vacía o no tiene encabezados.');

      // Encontrar fila de encabezados (la que contenga "Aula" o "Sala")
      let headerRow = 0;
      for(let i=0;i<Math.min(5,rows.length);i++){
        const h = (rows[i]||[]).map(x => (x||'').toString().toLowerCase());
        if(h.some(x => x.includes('aula')) || h.some(x => x.includes('horinic'))){
          headerRow = i; break;
        }
      }
      const headers = rows[headerRow];
      const dataRows = rows.slice(headerRow+1);

      const cAula = findCol(headers, ['Aula','Sala']);
      const cDen  = findCol(headers, ['Denominación de sala','Denominacion de sala','Denominacion','Den sala']);
      const cCap  = findCol(headers, ['CapÓpt','Cap Opt','Capacidad']);
      const cAsig = findCol(headers, ['Nom. Asignatura','Nombre Asignatura','Asignatura']);
      const cSec  = findCol(headers, ['Nombre Seccion','Seccion','Sección']);
      const cDoc  = findCol(headers, ['Instruct','Docente','Profesor']);
      const cEsc  = findCol(headers, ['Escuela']);
      const cJor  = findCol(headers, ['Nom.Jornada','Nom Jornada','Jornada']);
      const cHi   = findCol(headers, ['HorInic','Hora Inicio','Inicio']);
      const cHf   = findCol(headers, ['Final','Hora Fin','Fin']);
      const cIns  = findCol(headers, ['Cant. ins','Cant ins','Inscritos']);
      const cPla  = findCol(headers, ['Plazas Dis','Plazas','Disponibles']);
      const cLun  = findCol(headers, ['Lun']);
      const cMar  = findCol(headers, ['Martes','Mar']);
      const cMie  = findCol(headers, ['Miér','Mier','Mie','Miercoles']);
      const cJue  = findCol(headers, ['Jueves','Jue']);
      const cVie  = findCol(headers, ['Viernes','Vie']);
      const cSab  = findCol(headers, ['Sábado','Sabado','Sab']);
      const cDom  = findCol(headers, ['Domingo','Dom']);

      if(cAula<0 || cHi<0 || cHf<0) throw new Error('No se encontraron columnas mínimas: Aula, HorInic, Final.');

      const tipoFromDen = (den) => {
        const d = (den||'').toUpperCase();
        if(d.includes('LABORATORIO') || d.includes('LAB')) return 'Laboratorio';
        if(d.includes('TALLER')) return 'Taller';
        if(d.includes('AUDIT')) return 'Auditorio';
        if(d.includes('GIMNASIO') || d.includes('GIM')) return 'Gimnasio';
        if(d.includes('PISC')) return 'Piscina';
        if(d.includes('CANCHA') || d.includes('COMPLEJO') || d.includes('FUT')) return 'Cancha';
        if(d.includes('ESTUDIO')) return 'Estudio';
        if(d.includes('REUNIONES') || d.includes('NEGOCIOS')) return 'Reunion';
        return 'Sala';
      };
      const fmtHora = (v) => {
        if(v==null) return '';
        if(typeof v==='string') return v.slice(0,5);
        if(v instanceof Date){
          const h=String(v.getHours()).padStart(2,'0');
          const m=String(v.getMinutes()).padStart(2,'0');
          return `${h}:${m}`;
        }
        // Excel fraction de día
        if(typeof v==='number'){
          const totalMin = Math.round(v*24*60);
          const h=String(Math.floor(totalMin/60)).padStart(2,'0');
          const m=String(totalMin%60).padStart(2,'0');
          return `${h}:${m}`;
        }
        return String(v).slice(0,5);
      };

      const nuevasSalas = new Map();
      const nuevaProg = [];
      const escuelasSet = new Set();

      for(const row of dataRows){
        if(!row || row.length===0) continue;
        const aula = row[cAula];
        if(!aula) continue;
        const den = cDen>=0 ? row[cDen] : '';
        const cap = cCap>=0 ? Number(row[cCap])||0 : 0;
        if(!nuevasSalas.has(aula)){
          nuevasSalas.set(aula, {
            codigo: String(aula),
            nombre: den ? String(den) : String(aula),
            capacidad: cap,
            tipo: tipoFromDen(den),
            responsable: 'Por asignar',
          });
        }
        const dw = [cLun,cMar,cMie,cJue,cVie,cSab,cDom].map(c => c>=0 && row[c] ? '1':'0').join('');
        if(dw==='0000000') continue;
        const hi = fmtHora(row[cHi]);
        const hf = fmtHora(row[cHf]);
        if(!hi || !hf) continue;
        const escuela = cEsc>=0 ? (row[cEsc]||'') : '';
        if(escuela) escuelasSet.add(escuela);
        nuevaProg.push({
          s: String(aula),
          a: cAsig>=0 ? row[cAsig] : null,
          sc: cSec>=0 ? row[cSec] : null,
          d: cDoc>=0 ? row[cDoc] : null,
          es: String(escuela).slice(0,3),
          j: cJor>=0 ? String(row[cJor]||'').slice(0,1) : '',
          hi, hf, dw,
          i: cIns>=0 ? row[cIns] : null,
          p: cPla>=0 ? row[cPla] : null,
        });
      }

      setPreview({
        nombre: f.name,
        sesiones: nuevaProg.length,
        salasUnicas: nuevasSalas.size,
        escuelas: escuelasSet.size,
        salas: [...nuevasSalas.values()],
        prog: nuevaProg,
        cols: { cAula, cDen, cCap, cAsig, cSec, cDoc, cEsc, cJor, cHi, cHf, cLun, cMar, cMie, cJue, cVie, cSab, cDom },
      });
    } catch(err) {
      console.error(err);
      toast('Error al leer el archivo: '+err.message);
    } finally {
      setParsing(false);
    }
  };

  const aplicar = async () => {
    if(!preview) return;
    if(!window.confirm(`Se ${reemplazar?'REEMPLAZARÁ':'AGREGARÁ a'} la programación con ${preview.sesiones} sesiones. ¿Continuar?`)) return;
    const salasNuevas = preview.salas.filter(s => !data.salas.some(x=>x.codigo===s.codigo));
    const progFinal = reemplazar ? preview.prog : [...data.programacion, ...preview.prog];
    try {
      await onReplace(progFinal, salasNuevas);
      toast(`SABANA importada: ${preview.sesiones} sesiones cargadas.`);
      setPreview(null); setArchivo(null);
    } catch(e){}
  };

  const [seeding, setSeeding] = useState(false);
  const seedNow = async () => {
    if(!window.confirm('Cargar 122 salas, 5.081 sesiones y 620 reservas desde los JSON del repositorio a la base de datos compartida. ¿Continuar?')) return;
    setSeeding(true);
    try { await onSeed(); } finally { setSeeding(false); }
  };

  return (
    <div className="stack">
      {isCloud && (
        <div className="card" style={{borderColor:'#C7E0CC',background:'#F6FCF8'}}>
          <div className="card-header">
            <div><h3 style={{color:'var(--success)'}}>☁️ Datos iniciales del repositorio</h3><div className="sub">Carga las 122 salas, 5.081 sesiones académicas y 620 reservas históricas a tu base de datos Supabase compartida.</div></div>
          </div>
          <div className="row" style={{gap:10}}>
            <button className="btn btn-primary" onClick={seedNow} disabled={seeding}>{seeding?'Cargando…':'Cargar todo'}</button>
            <div className="muted" style={{fontSize:12}}>Solo se insertan tablas vacías; ejecutar de nuevo es seguro (no duplica).</div>
          </div>
        </div>
      )}
      <div className="card">
        <div className="card-header">
          <div><h3>Importar SABANA desde Excel</h3><div className="sub">El archivo debe ser .xlsx o .xls con los encabezados estándar (Aula, HorInic, Final, Lun., Martes, …)</div></div>
          {data._sabanaInfo && <span className="chip success">Última carga: {data._sabanaInfo.archivo || `${data._sabanaInfo.sesiones} sesiones`}</span>}
        </div>

        <div className="upload-zone" onClick={()=>document.getElementById('sabana-file').click()}>
          <div style={{fontSize:36,opacity:.6,marginBottom:6}}>{I.upload}</div>
          <div style={{fontWeight:700,fontSize:14}}>Haz clic para seleccionar un archivo</div>
          <div className="muted" style={{fontSize:12,marginTop:4}}>Acepta .xlsx, .xls (se procesa en tu navegador, no se envía a ningún servidor)</div>
          <input id="sabana-file" type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={onFile}/>
        </div>

        {parsing && <div className="loader"><div className="spinner"/>Procesando archivo…</div>}

        {archivo && !parsing && !preview && (
          <div className="chip danger" style={{marginTop:14}}>No se pudo procesar el archivo. Verifica los encabezados.</div>
        )}
      </div>

      {preview && (
        <div className="card">
          <div className="card-header">
            <div><h3>Vista previa de la importación</h3><div className="sub">{preview.nombre}</div></div>
          </div>
          <div className="grid grid-4" style={{marginBottom:18}}>
            <div className="kpi kpi-blue"><span className="label">Sesiones</span><span className="value">{preview.sesiones.toLocaleString('es-CL')}</span><div className="icon">{I.prog}</div></div>
            <div className="kpi kpi-green"><span className="label">Salas únicas</span><span className="value">{preview.salasUnicas}</span><div className="icon">{I.salas}</div></div>
            <div className="kpi kpi-amber"><span className="label">Escuelas</span><span className="value">{preview.escuelas}</span><div className="icon">{I.reports}</div></div>
            <div className="kpi kpi-red"><span className="label">Salas nuevas</span><span className="value">{preview.salas.filter(s=>!data.salas.some(x=>x.codigo===s.codigo)).length}</span><div className="icon">{I.plus}</div></div>
          </div>

          <div className="field" style={{maxWidth:380}}>
            <label>Modo de carga</label>
            <select value={reemplazar?'1':'0'} onChange={e=>setReemplazar(e.target.value==='1')}>
              <option value="1">Reemplazar toda la programación actual (recomendado)</option>
              <option value="0">Agregar a la programación existente</option>
            </select>
          </div>

          <div className="card-header" style={{marginTop:10}}>
            <div><h3 style={{fontSize:14}}>Primeras 8 sesiones detectadas</h3></div>
          </div>
          <div className="tbl-scroll" style={{maxHeight:260}}>
            <table className="tbl">
              <thead><tr><th>Sala</th><th>Asignatura</th><th>Sección</th><th>Días</th><th>Horario</th><th>Docente</th></tr></thead>
              <tbody>
                {preview.prog.slice(0,8).map((p,i)=>(
                  <tr key={i}>
                    <td><b style={{color:'var(--primary)'}}>{p.s}</b></td>
                    <td style={{maxWidth:240}}>{p.a}</td>
                    <td className="muted">{p.sc}</td>
                    <td>{[...p.dw].map((b,j)=>b==='1'?DIA_CORTO[j]:null).filter(Boolean).join(' · ')}</td>
                    <td>{p.hi}–{p.hf}</td>
                    <td>{p.d}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <div className="row" style={{justifyContent:'flex-end',marginTop:16,gap:10}}>
            <button className="btn btn-ghost" onClick={()=>{setPreview(null);setArchivo(null)}}>Cancelar</button>
            <button className="btn btn-primary" onClick={aplicar}>{I.check}Aplicar importación</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ========= ROOT APP ========= */
function App(){
  // Migración legacy: rol 'subdireccion' → 'admin'
  const migrateUser = (u) => u && u.role==='subdireccion' ? {...u, role:'admin'} : u;
  const migrateUsers = (arr) => (arr||[])
    .filter(u => u.username!=='subdir')
    .map(u => u.role==='subdireccion' ? {...u, role:'admin'} : u);

  const stored = loadStore();
  const [mode, setModeState] = useState(getMode());        // 'cloud' | 'local' | null
  const [supabase, setSupabase] = useState(null);
  const [db, setDbState] = useState(null);
  const [user, setUser] = useState(migrateUser(stored.user) || null);
  const [view, setView] = useState('dashboard');
  const [data, setData] = useState(null);
  const [reservas, setReservas] = useState([]);
  const [users, setUsers] = useState(stored.users ? migrateUsers(stored.users) : DEFAULT_USERS);
  const [loading, setLoading] = useState(true);
  const [loadError, setLoadError] = useState(null);
  const [toast, setToast] = useToast();
  const [prefillNueva, setPrefillNueva] = useState(null);

  // Inicializar Supabase cuando el modo es cloud
  useEffect(()=>{
    if(mode !== 'cloud'){ return; }
    const cfg = loadCloudConfig();
    if(!cfg){ setModeState(null); return; }
    if(!window.supabase){ setLoadError('Cliente Supabase no disponible (revisa conexión).'); return; }
    const sb = window.supabase.createClient(cfg.url, cfg.key, { auth:{ persistSession:false } });
    setSupabase(sb);
  }, [mode]);

  // Construir db cuando hay modo y (si cloud) cliente listo
  useEffect(()=>{
    if(!mode) return;
    if(mode==='cloud' && !supabase) return;
    setDbState(createDb({ mode, supabase }));
  }, [mode, supabase]);

  // Cargar data inicial cuando hay db lista
  useEffect(()=>{
    if(!db) return;
    let cancelled = false;
    (async ()=>{
      setLoading(true); setLoadError(null);
      try {
        const out = await db.loadAll();
        if(cancelled) return;
        setData({
          salas: out.salas,
          programacion: out.programacion,
          modulos: out.modulos,
          _customSalas: out._local?.customSalas || [],
          _deletedSalas: out._local?.deletedSalas || [],
          _salaOverrides: out._local?.salaOverrides || {},
        });
        setReservas(out.reservas);
        setUsers(out.users || []);
      } catch(e){
        if(cancelled) return;
        console.error(e);
        setLoadError(e.message || 'Error al cargar datos');
      } finally {
        if(!cancelled) setLoading(false);
      }
    })();
    return () => { cancelled = true; };
  }, [db]);

  // Realtime: refresca el slice afectado cuando cambian datos en cloud
  useEffect(()=>{
    if(!db || !db.isCloud) return;
    const unsubR = db.subscribe('reservas', async () => {
      const { data: fresh } = await supabase.from('reservas').select('*').order('id',{ascending:false}).limit(2000);
      if(fresh) setReservas(fresh);
    });
    const unsubS = db.subscribe('salas', async () => {
      const { data: fresh } = await supabase.from('salas').select('*').order('codigo');
      if(fresh) setData(d => d ? {...d, salas:fresh} : d);
    });
    const unsubU = db.subscribe('app_users', async () => {
      const { data: fresh } = await supabase.from('app_users').select('*').order('id');
      if(fresh) setUsers(fresh);
    });
    return () => { unsubR(); unsubS(); unsubU(); };
  }, [db, supabase]);

  // Persistencia en modo local (sesión + overrides)
  useEffect(()=>{
    if(!data || !mode) return;
    if(mode==='local'){
      saveStore({
        user, users,
        customReservas: reservas.filter(r=>r.creado_por),
        reservaEstados: reservas.filter(r=>r.decidido_por).map(r=>({id:r.id,es:r.es,decidido_por:r.decidido_por,decidido_en:r.decidido_en})),
        customSalas: data._customSalas || [],
        deletedSalas: data._deletedSalas || [],
        salaOverrides: data._salaOverrides || {},
      });
    } else {
      // En cloud solo persistimos el user logueado
      saveStore({ user });
    }
  }, [user, users, reservas, data, mode]);

  /* =========== OPERACIONES (wrappers async que llaman a db + actualizan state) =========== */
  const reconfigure = () => {
    setUser(null);
    // Si la BD está centralizada (config.js del repo), no se puede cambiar por navegador
    if(isGlobalConfig()) return;
    clearCloudConfig(); setModeState(null); setData(null); setSupabase(null); setDbState(null);
  };

  const createReserva = async (r) => {
    try {
      const saved = await db.createReserva(r);
      setReservas(prev => [saved, ...prev]);
      return saved;
    } catch(e){ setToast('Error al crear reserva: '+e.message); throw e; }
  };
  const updateReservaEstado = async (id, patch) => {
    try {
      const saved = await db.updateReservaEstado(id, patch);
      setReservas(prev => prev.map(r => r.id===id ? {...r, ...saved} : r));
      return saved;
    } catch(e){ setToast('Error al actualizar reserva: '+e.message); throw e; }
  };

  const createSala = async (s) => {
    try {
      const saved = await db.createSala(s);
      setData(d => ({...d, salas:[...d.salas, saved], _customSalas:[...(d._customSalas||[]), saved]}));
      return saved;
    } catch(e){ setToast('Error al crear sala: '+e.message); throw e; }
  };
  const updateSala = async (codigo, patch) => {
    try {
      const saved = await db.updateSala(codigo, patch);
      setData(d => {
        const eraCustom = (d._customSalas||[]).some(s=>s.codigo===codigo);
        return {
          ...d,
          salas: d.salas.map(s => s.codigo===codigo ? {...s, ...saved} : s),
          _customSalas: eraCustom ? (d._customSalas||[]).map(s=>s.codigo===codigo?{...s,...saved}:s) : (d._customSalas||[]),
          _salaOverrides: (eraCustom || db.isCloud) ? (d._salaOverrides||{}) : {...(d._salaOverrides||{}), [codigo]: patch},
        };
      });
      return saved;
    } catch(e){ setToast('Error al actualizar sala: '+e.message); throw e; }
  };
  const deleteSala = async (codigo) => {
    try {
      await db.deleteSala(codigo);
      setData(d => {
        const eraCustom = (d._customSalas||[]).some(s=>s.codigo===codigo);
        const overrides = {...(d._salaOverrides||{})}; delete overrides[codigo];
        return {
          ...d,
          salas: d.salas.filter(s => s.codigo!==codigo),
          _customSalas: (d._customSalas||[]).filter(s=>s.codigo!==codigo),
          _deletedSalas: (eraCustom || db.isCloud) ? (d._deletedSalas||[]) : [...(d._deletedSalas||[]), codigo],
          _salaOverrides: overrides,
        };
      });
    } catch(e){ setToast('Error al eliminar sala: '+e.message); throw e; }
  };

  const createUser = async (u) => {
    try {
      const saved = await db.createUser(u);
      setUsers(prev => [...prev, saved]);
      return saved;
    } catch(e){ setToast('Error al crear usuario: '+e.message); throw e; }
  };
  const updateUser = async (id, patch) => {
    try {
      const saved = await db.updateUser(id, patch);
      setUsers(prev => prev.map(u => u.id===id ? {...u, ...saved} : u));
      return saved;
    } catch(e){ setToast('Error al actualizar usuario: '+e.message); throw e; }
  };
  const deleteUser = async (id) => {
    try {
      await db.deleteUser(id);
      setUsers(prev => prev.filter(u => u.id!==id));
    } catch(e){ setToast('Error al eliminar usuario: '+e.message); throw e; }
  };

  const replaceProgramacionOp = async (prog, salasNuevas) => {
    try {
      await db.replaceProgramacion(prog, salasNuevas);
      // actualizar estado local
      setData(d => {
        const mapSalas = new Map(d.salas.map(s => [s.codigo, s]));
        for(const ns of (salasNuevas||[])){
          if(!mapSalas.has(ns.codigo)) mapSalas.set(ns.codigo, ns);
        }
        return { ...d,
          salas: [...mapSalas.values()].sort((a,b)=>a.codigo.localeCompare(b.codigo)),
          programacion: prog,
          _sabanaInfo: { sesiones: prog.length, importadoEn: new Date().toISOString() },
        };
      });
    } catch(e){ setToast('Error al importar SABANA: '+e.message); throw e; }
  };

  const seedFromBundle = async () => {
    try {
      const counts = await db.seedFromBundle();
      const out = await db.loadAll();
      setData({ salas:out.salas, programacion:out.programacion, modulos:out.modulos });
      setReservas(out.reservas);
      setUsers(out.users);
      setToast(`Carga inicial: ${counts.salas} salas, ${counts.programacion} sesiones, ${counts.reservas} reservas.`);
    } catch(e){ setToast('Error en carga inicial: '+e.message); }
  };

  /* =========== ROUTING DE PANTALLAS =========== */
  if(!mode) return <SetupScreen onConfigured={m => { setModeState(m); }} />;
  if(loadError) return (
    <div className="login-wrap" style={{gridTemplateColumns:'1fr'}}>
      <div className="login-form-wrap">
        <div className="login-card">
          <h2>Error de conexión</h2>
          <div className="sub" style={{marginBottom:14}}>{loadError}</div>
          <button className="btn btn-ghost btn-block" onClick={reconfigure}>Reconfigurar base de datos</button>
        </div>
      </div>
    </div>
  );
  if(!db || loading) return (
    <div className="loader" style={{paddingTop:140}}><div className="spinner"/><div>Conectando…</div></div>
  );
  if(!user) return <Login db={db} mode={mode} onReconfigure={reconfigure} onLogin={u => { setUser(u); setView('dashboard'); }} />;
  if(!data) return (
    <div className="loader" style={{paddingTop:140}}><div className="spinner"/><div>Cargando datos del portal…</div></div>
  );

  const goNueva = (pre) => { setPrefillNueva(pre||null); setView('nueva'); };

  const titles = {
    dashboard:['Dashboard','Panel de control'],
    horario:['Horario semanal','Disponibilidad física Lun-Dom × Módulos'],
    salas:['Catálogo de salas','Salas y recintos'],
    prog:['Programación académica','SABANA · 2026·1'],
    reservas:['Reservas','Gestión y búsqueda de disponibilidad'],
    nueva:['Solicitar reserva','Nueva solicitud'],
    importar:['Importar SABANA','Cargar programación académica desde Excel'],
    usuarios:['Usuarios','Administración de cuentas'],
    reportes:['Reportes','Ocupación y métricas'],
  };
  const [title, crumbs] = titles[view] || ['',''];

  return (
    <>
      <Shell user={user} mode={mode} onReconfigure={reconfigure} onLogout={()=>{ setUser(null); }} view={view} setView={setView} title={title} crumbs={crumbs}>
        {view==='dashboard' && <Dashboard data={data} reservas={reservas} user={user} db={db}/>}
        {view==='horario'   && <Horario data={data} reservas={reservas} onGoNueva={goNueva}/>}
        {view==='salas'     && <Salas data={data} user={user} toast={setToast} onCreate={createSala} onUpdate={updateSala} onDelete={deleteSala}/>}
        {view==='prog'      && <Programacion data={data}/>}
        {view==='reservas'  && <Reservas reservas={reservas} data={data} user={user} toast={setToast} onGoNueva={goNueva} onUpdateEstado={updateReservaEstado}/>}
        {view==='nueva'     && <NuevaReserva data={data} reservas={reservas} user={user} toast={setToast} goReservas={()=>setView('reservas')} prefill={prefillNueva} onCreate={createReserva}/>}
        {view==='importar'  && <ImportarSabana data={data} toast={setToast} onReplace={replaceProgramacionOp} onSeed={seedFromBundle} isCloud={db.isCloud}/>}
        {view==='usuarios'  && <Usuarios users={users} toast={setToast} onCreate={createUser} onUpdate={updateUser} onDelete={deleteUser}/>}
        {view==='reportes'  && <Reportes data={data} reservas={reservas}/>}
      </Shell>
      {toast && <div className="toast">{toast}</div>}
    </>
  );
}

/* ========= ERROR BOUNDARY =========
   Captura errores de render en cualquier componente y muestra una
   pantalla de fallback en vez de dejar la UI en blanco. */
class ErrorBoundary extends React.Component {
  constructor(props){ super(props); this.state = { error:null, info:null }; }
  static getDerivedStateFromError(error){ return { error }; }
  componentDidCatch(error, info){
    console.error('ErrorBoundary:', error, info);
    this.setState({ info });
  }
  reset = () => this.setState({ error:null, info:null });
  reload = () => window.location.reload();
  render(){
    if(!this.state.error) return this.props.children;
    const msg = this.state.error?.message || String(this.state.error);
    const stack = this.state.info?.componentStack || this.state.error?.stack || '';
    return (
      <div className="login-wrap" style={{gridTemplateColumns:'1fr'}}>
        <div className="login-form-wrap">
          <div className="login-card" style={{maxWidth:560}}>
            <h2>⚠ Algo salió mal</h2>
            <div className="sub" style={{marginBottom:14}}>
              La aplicación encontró un error y no pudo continuar. Tu información está a salvo.
            </div>
            <div className="chip danger" style={{display:'block',padding:'10px 12px',marginBottom:14,whiteSpace:'normal',textAlign:'left',fontFamily:'monospace',fontSize:12}}>
              {msg}
            </div>
            <details style={{marginBottom:14,fontSize:11,color:'var(--text-muted)'}}>
              <summary style={{cursor:'pointer'}}>Detalle técnico</summary>
              <pre style={{whiteSpace:'pre-wrap',marginTop:8,padding:10,background:'#FBFCFD',border:'1px solid var(--border-soft)',borderRadius:6,maxHeight:260,overflow:'auto'}}>{stack}</pre>
            </details>
            <div className="row" style={{gap:8}}>
              <button className="btn btn-primary" onClick={this.reload}>Recargar página</button>
              <button className="btn btn-ghost" onClick={this.reset}>Intentar continuar</button>
            </div>
          </div>
        </div>
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
  </script>
</body>
</html>

/* ========= QR MODAL · acceso al portal desde móvil =========
   Renderiza un QR del URL actual del portal en un canvas. Si la
   librería qrcode-generator (CDN) no cargó, fallback usando la API
   pública de qrserver.com como <img>. Botón "Copiar URL" + share API. */
function QrModal({ onClose }){
  const canvasRef = useRef(null);
  const url = (typeof window !== 'undefined') ? (window.location.origin + window.location.pathname) : '';
  const [copied, setCopied] = useState(false);
  const [fallbackImg, setFallbackImg] = useState(false);

  useEffect(()=>{
    if(!canvasRef.current) return;
    // Intenta usar qrcode-generator si está cargado
    if(typeof window.qrcode === 'function'){
      try {
        const qr = window.qrcode(0, 'M');
        qr.addData(url);
        qr.make();
        const size = 260, cells = qr.getModuleCount(), cell = Math.floor(size / cells);
        const ctx = canvasRef.current.getContext('2d');
        canvasRef.current.width = canvasRef.current.height = cell * cells;
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, canvasRef.current.width, canvasRef.current.height);
        ctx.fillStyle = '#0F1729';
        for(let r=0; r<cells; r++){
          for(let c=0; c<cells; c++){
            if(qr.isDark(r, c)) ctx.fillRect(c*cell, r*cell, cell, cell);
          }
        }
        return;
      } catch(e){ console.warn('qr render:', e); }
    }
    // Fallback: img desde API pública
    setFallbackImg(true);
  }, [url]);

  const copiar = async () => {
    try {
      await navigator.clipboard.writeText(url);
      setCopied(true);
      setTimeout(()=> setCopied(false), 2000);
    } catch(e){
      // Fallback
      const inp = document.createElement('input');
      inp.value = url; document.body.appendChild(inp);
      inp.select(); document.execCommand('copy');
      inp.remove();
      setCopied(true);
      setTimeout(()=> setCopied(false), 2000);
    }
  };
  const compartir = async () => {
    if(navigator.share){
      try { await navigator.share({ title:'Portal de Salas Duoc UC · Viña del Mar', url }); }
      catch(e){}
    } else {
      copiar();
    }
  };

  return (
    <div className="modal-back" onClick={onClose}>
      <div className="modal qr-modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-h" style={{padding:'8px 0 16px',border:'none'}}>
          <h3 style={{textAlign:'center',width:'100%'}}>📱 Acceder desde celular</h3>
        </div>
        <div className="muted" style={{fontSize:13,lineHeight:1.5}}>
          Escanea el código con la cámara de tu teléfono. El portal es responsive: lo abres con tu usuario y queda igual de funcional desde móvil.
        </div>
        {!fallbackImg ? (
          <canvas ref={canvasRef} className="qr-canvas" width="260" height="260"/>
        ) : (
          <img src={`https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=${encodeURIComponent(url)}`} alt="QR del portal" className="qr-canvas" style={{width:260,height:260}}/>
        )}
        <div className="qr-url">{url}</div>
        <div className="row" style={{gap:8,marginTop:14,justifyContent:'center'}}>
          <button className="btn btn-ghost" onClick={copiar}>{copied ? '✓ Copiado' : '📋 Copiar URL'}</button>
          {typeof navigator !== 'undefined' && navigator.share && (
            <button className="btn btn-primary" onClick={compartir}>📤 Compartir</button>
          )}
          <button className="btn btn-ghost" onClick={onClose}>Cerrar</button>
        </div>
      </div>
    </div>
  );
}

/* ========= DASHBOARD ========= */
function Dashboard({ data, reservas, user, db, onGoView, onGoNuevaPrefill }){
  // Reloj reactivo: refresca cada 60s para que el bloque "AHORA" se mantenga vivo.
  const [now, setNow] = useState(new Date());
  const [drawer, setDrawer] = useState(null); // 'enCurso' | 'proximas' | 'libres' | null
  useEffect(()=>{
    const t = setInterval(()=> setNow(new Date()), 60*1000);
    return ()=> clearInterval(t);
  },[]);
  const todayIso = now.toISOString().slice(0,10);
  const mañanaIso = (()=>{ const d = new Date(now); d.setDate(d.getDate()+1); return d.toISOString().slice(0,10); })();
  const dow = now.getDay()===0 ? 6 : now.getDay()-1;
  const hhmmNow = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const hhmmIn2h = (()=>{ const d = new Date(now.getTime() + 2*60*60*1000); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; })();

  // Estado de la BD compartida (solo admin + cloud)
  const [dbStats, setDbStats] = useState(null);
  useEffect(()=>{
    if(user.role !== 'admin' || !db?.isCloud) return;
    let cancelled = false;
    const fetch = async () => {
      try {
        const s = await db.getStats();
        if(!cancelled) setDbStats(s);
      } catch(e){ console.error('getStats:', e); }
    };
    fetch();
    const t = setInterval(fetch, 5*60*1000); // refresh cada 5 min
    return () => { cancelled = true; clearInterval(t); };
  },[db, user]);

  const bdUso = useMemo(()=>{
    if(!dbStats) return null;
    // Estimación de bytes por fila (incluye padding, indices, overhead Postgres)
    const SIZE_PER_ROW = { salas:200, modulos:80, programacion:280, eventos:180, reservas:400, app_users:220 };
    const FREE_LIMIT_BYTES = 500 * 1024 * 1024; // 500 MB free tier
    const FREE_EGRESS_GB   = 5;
    const FREE_REALTIME_MSG_M = 2;
    const FREE_REALTIME_CON   = 200;

    let rawBytes = 0;
    Object.entries(dbStats.rows).forEach(([t,n])=> { rawBytes += n * (SIZE_PER_ROW[t]||200); });
    const totalBytes = Math.round(rawBytes * 1.4); // overhead indices+sistema
    const pctUsado = (totalBytes / FREE_LIMIT_BYTES) * 100;
    const pctLibre = 100 - pctUsado;

    // Fecha de reseteo: 1er día del próximo mes
    const now = new Date();
    const nextReset = new Date(now.getFullYear(), now.getMonth()+1, 1);
    const diasParaReset = Math.ceil((nextReset - now) / 86400000);

    return {
      totalBytes, pctUsado, pctLibre, FREE_LIMIT_BYTES,
      nextReset, diasParaReset,
      FREE_EGRESS_GB, FREE_REALTIME_MSG_M, FREE_REALTIME_CON,
      rows: dbStats.rows,
    };
  },[dbStats]);

  // Link directo a la consola Supabase del proyecto (deriva ref desde la URL configurada)
  const supaProjectUrl = useMemo(()=>{
    const url = window.SUPABASE_CONFIG?.url || '';
    const m = url.match(/https:\/\/([a-z0-9]+)\.supabase\.co/);
    return m ? `https://supabase.com/dashboard/project/${m[1]}/settings/usage` : null;
  },[]);

  const stats = useMemo(()=>{
    const totalSalas = data.salas.length;
    const clasesHoy  = sesionesEnFecha(data, todayIso).length;
    const reservasHoy = reservas.filter(r => r.fi===todayIso).length;
    const pendientes  = reservas.filter(r => r.es==='pendiente').length;
    return { totalSalas, clasesHoy, reservasHoy, pendientes };
  },[data, reservas, dow, todayIso]);

  const fmtBytes = (b) => {
    if(b < 1024) return `${b} B`;
    if(b < 1024*1024) return `${(b/1024).toFixed(1)} KB`;
    if(b < 1024*1024*1024) return `${(b/(1024*1024)).toFixed(1)} MB`;
    return `${(b/(1024*1024*1024)).toFixed(2)} GB`;
  };

  const ocupacionPorTipo = useMemo(()=>{
    const m = {};
    data.salas.forEach(s => { m[s.tipo] = (m[s.tipo]||0)+1; });
    return Object.entries(m).sort((a,b)=>b[1]-a[1]);
  },[data]);

  const ocupacionPorEscuela = useMemo(()=>{
    const m = {};
    // Si hay eventos, los enriquecemos para obtener la escuela desde SABANA.
    const fuente = sesionesConsolidadas(data);
    fuente.forEach(p => {
      const k = ESCUELAS_FULL[p.es] || (p.es || 'Otros');
      m[k] = (m[k]||0)+1;
    });
    return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,7);
  },[data]);

  const maxEsc = Math.max(1, ...ocupacionPorEscuela.map(x=>x[1]));

  // === ESTADO DE LA SEDE AHORA ===
  // En curso: sesiones cuya hora actual cae entre hi y hf hoy.
  // Próximas 2h: sesiones cuyo hi cae entre ahora y ahora+2h hoy.
  // Salas libres ahora: total salas con clase=0 ahora.
  // Alumnos en sede: suma inscritos de sesiones en curso.
  const sesionesHoy = useMemo(()=> sesionesEnFecha(data, todayIso), [data, todayIso]);
  // Módulo actual (para preseleccionar al hacer click en "Reservar" desde
  // una sala libre): el módulo cuyo rango horario contiene la hora actual.
  const modActivo = useMemo(()=>{
    const n = now.getHours()*60 + now.getMinutes();
    return data.modulos.find(m => {
      const [h1,m1] = m.inicio.split(':').map(Number);
      const [h2,m2] = m.fin.split(':').map(Number);
      const a = h1*60+m1, b = h2*60+m2;
      return n >= a && n < b;
    }) || null;
  }, [data.modulos, now]);
  const ahora = useMemo(()=>{
    const dedup = new Set();
    const enCurso = [];
    const proximas = [];
    for(const s of sesionesHoy){
      const k = `${s.sc||''}|${s.s||''}|${s.hi}|${s.hf}`;
      if(dedup.has(k)) continue;
      dedup.add(k);
      if(s.hi <= hhmmNow && hhmmNow < s.hf) enCurso.push(s);
      else if(s.hi > hhmmNow && s.hi <= hhmmIn2h) proximas.push(s);
    }
    const salasOcupadas = new Set(enCurso.map(s => s.s));
    const alumnosEnSede = enCurso.reduce((a,s)=> a + (Number(s.i)||0), 0);
    // Lista de salas libres (no virtuales) con metadata de la sala
    const libresLista = data.salas
      .filter(s => !isSalaVirtual(s) && !salasOcupadas.has(s.codigo))
      .sort((a,b)=> (a.codigo||'').localeCompare(b.codigo||''));
    return {
      enCurso: enCurso.length,
      proximas: proximas.length,
      salasLibres: libresLista.length,
      alumnosEnSede,
      enCursoLista: enCurso.sort((a,b)=> (a.s||'').localeCompare(b.s||'')),
      proximasLista: proximas.sort((a,b)=> a.hi.localeCompare(b.hi)),
      libresLista,
    };
  }, [sesionesHoy, hhmmNow, hhmmIn2h, data.salas]);

  // === SLA: vencidas + en peligro ===
  // Solo admin/reservador. Vencidas: pendientes con > 1h desde creado_en.
  // En peligro: pendientes con > 30 min y ≤ 1h.
  const slaUrgentes = useMemo(()=>{
    if(user.role!=='admin' && user.role!=='reservador') return null;
    const nowMs = now.getTime();
    const SLA = 60 * 60 * 1000;
    const PELIGRO = 30 * 60 * 1000;
    const pendientes = reservas.filter(r => r.es === 'pendiente' && r.creado_en);
    const vencidas = [], peligro = [], frescas = [];
    for(const r of pendientes){
      const cAt = new Date(r.creado_en).getTime();
      if(isNaN(cAt)){ frescas.push(r); continue; }
      const elapsed = nowMs - cAt;
      if(elapsed >= SLA) vencidas.push(r);
      else if(elapsed >= PELIGRO) peligro.push(r);
      else frescas.push(r);
    }
    return {
      vencidas: vencidas.sort((a,b)=> new Date(a.creado_en) - new Date(b.creado_en)),
      peligro:  peligro.sort((a,b)=> new Date(a.creado_en) - new Date(b.creado_en)),
      frescas:  frescas.length,
    };
  }, [reservas, user, now]);

  // === SOLICITUDES QUE PARTEN EN ≤1 DÍA ===
  const solicitudesProximas = useMemo(()=> reservas
    .filter(r => (r.fi === todayIso || r.fi === mañanaIso) && r.es !== 'rechazada')
    .sort((a,b)=> (a.fi||'').localeCompare(b.fi||'') || (a.hi||'').localeCompare(b.hi||''))
    .slice(0, 8)
  ,[reservas, todayIso, mañanaIso]);

  // === MINI MAPA DE CALOR (hoy + mañana) ===
  // Para cada (módulo, día) hoy/mañana: suma de inscritos.
  const miniHeatmap = useMemo(()=>{
    const calc = (iso) => {
      const arr = new Array(data.modulos.length).fill(0);
      const seen = new Set();
      const sesionesDia = sesionesEnFecha(data, iso);
      for(const s of sesionesDia){
        const k = `${s.sc||''}|${s.s||''}|${s.hi}|${s.hf}`;
        if(seen.has(k)) continue;
        seen.add(k);
        const ins = Number(s.i) || 0;
        if(!ins) continue;
        data.modulos.forEach((mod, mi) => {
          if(moduleInTimeRange(mod.num, s.hi, s.hf, data.modulos)) arr[mi] += ins;
        });
      }
      return arr;
    };
    const hoy = calc(todayIso), man = calc(mañanaIso);
    const max = Math.max(1, ...hoy, ...man);
    return { hoy, man, max };
  }, [data, todayIso, mañanaIso]);

  // === SALAS SATURADAS vs SUBUTILIZADAS ===
  // Para cada sala con capacidad, calcular promedio (inscritos / capacidad)
  // en sesiones de hoy y mañana. Top 5 saturadas (alta utilización) y
  // top 5 subutilizadas (baja utilización con capacidad ≥ 20).
  const salasUtilizacion = useMemo(()=>{
    const salaInfoMap = new Map(data.salas.map(s => [s.codigo, s]));
    const capBySala = new Map(data.salas.map(s => [s.codigo, s.capacidad||0]));
    const ratioBySala = new Map();   // codigo → [ratio, ratio, ...]
    const seen = new Set();
    for(const iso of [todayIso, mañanaIso]){
      const sess = sesionesEnFecha(data, iso);
      for(const s of sess){
        const sInfo = salaInfoMap.get(s.s);
        if(sInfo && isSalaVirtual(sInfo)) continue;  // ← excluye virtuales
        const k = `${s.sc||''}|${s.s||''}|${s.hi}|${s.hf}|${iso}`;
        if(seen.has(k)) continue;
        seen.add(k);
        const cap = capBySala.get(s.s);
        const ins = Number(s.i) || 0;
        if(!cap || !ins) continue;
        const ratio = ins / cap;
        if(!ratioBySala.has(s.s)) ratioBySala.set(s.s, []);
        ratioBySala.get(s.s).push(ratio);
      }
    }
    const stats = [];
    for(const [codigo, ratios] of ratioBySala){
      const avg = ratios.reduce((a,b)=>a+b, 0) / ratios.length;
      stats.push({
        codigo,
        cap: capBySala.get(codigo) || 0,
        avgUso: avg,
        sesiones: ratios.length,
        nombre: data.salas.find(x => x.codigo===codigo)?.nombre || codigo,
      });
    }
    const saturadas = [...stats].sort((a,b)=> b.avgUso - a.avgUso).slice(0, 5);
    const subutilizadas = stats.filter(x => x.cap >= 20).sort((a,b)=> a.avgUso - b.avgUso).slice(0, 5);
    return { saturadas, subutilizadas };
  }, [data, todayIso, mañanaIso]);

  // Métricas de gestión: visibles para admin (visión equipo) y reservador (visión personal + equipo)
  const metricas = useMemo(()=>{
    if(user.role !== 'admin' && user.role !== 'reservador') return null;
    const decididas = reservas.filter(r => r.decidido_por && r.creado_en && r.decidido_en && r.es !== 'pendiente');
    const byUser = {};
    let totalMs = 0, dentroSla = 0;
    let decididas7d = 0; const cutoff7d = Date.now() - 7*86400*1000;
    for(const r of decididas){
      const cAt = new Date(r.creado_en).getTime();
      const dAt = new Date(r.decidido_en).getTime();
      if(isNaN(cAt) || isNaN(dAt)) continue;
      const elapsed = dAt - cAt;
      if(elapsed < 0) continue;
      totalMs += elapsed;
      if(elapsed <= SLA_MS) dentroSla++;
      if(dAt >= cutoff7d) decididas7d++;
      const u = r.decidido_por;
      if(!byUser[u]) byUser[u] = { count:0, totalMs:0, dentroSla:0, ultima:0, aprobadas:0, rechazadas:0, count7d:0, fastest:Infinity };
      byUser[u].count++;
      byUser[u].totalMs += elapsed;
      if(elapsed <= SLA_MS) byUser[u].dentroSla++;
      if(dAt > byUser[u].ultima) byUser[u].ultima = dAt;
      if(r.es==='aprobada') byUser[u].aprobadas++;
      if(r.es==='rechazada') byUser[u].rechazadas++;
      if(dAt >= cutoff7d) byUser[u].count7d++;
      if(elapsed < byUser[u].fastest) byUser[u].fastest = elapsed;
    }
    const avgMs = decididas.length ? totalMs / decididas.length : 0;
    const slaPct = decididas.length ? (dentroSla / decididas.length) * 100 : 0;
    const ranking = Object.entries(byUser).map(([username, m]) => ({
      username, ...m, avgMs: m.totalMs / m.count,
      slaPct: (m.dentroSla / m.count) * 100,
    })).sort((a,b)=> b.count - a.count);

    // Datos personales del usuario actual (para framing motivacional).
    // Tomamos la fila desde `ranking` (no `byUser`) porque ahí ya está calculado
    // avgMs y slaPct — byUser solo guarda los acumuladores crudos.
    const my = ranking.find(r => r.username === user.username) || null;
    const myRankByVolume = my ? ranking.findIndex(r => r.username === user.username) + 1 : 0;
    const rankingByAvg = [...ranking].sort((a,b)=> a.avgMs - b.avgMs);
    const myRankBySpeed = my ? rankingByAvg.findIndex(r => r.username === user.username) + 1 : 0;
    const rankingBySla = [...ranking].sort((a,b)=> b.slaPct - a.slaPct);
    const myRankBySla = my ? rankingBySla.findIndex(r => r.username === user.username) + 1 : 0;

    // Líderes del equipo
    const lider = {
      volumen:  ranking[0] || null,
      rapidez:  rankingByAvg[0] || null,
      sla:      rankingBySla[0] || null,
    };

    return {
      decididas: decididas.length, decididas7d, avgMs, slaPct, ranking,
      my, myRankByVolume, myRankBySpeed, myRankBySla,
      totalReservadores: ranking.length, lider,
    };
  },[reservas, user]);

  return (
    <div className="stack">

        <div className="kpi kpi-amber">
          <span className="label">Reservas para hoy</span>

      {/* === ESTADO DE LA SEDE AHORA === */}
      <div className="card">
        <div className="card-header">
          <div>
            <h3>📡 Estado de la sede AHORA</h3>

          <button type="button" className="kpi kpi-blue kpi-click" onClick={()=>ahora.proximas>0 && setDrawer('proximas')} title={ahora.proximas>0?'Ver detalle de próximas clases':'Sin próximas clases'}>

            <span className="value">{ahora.proximas}</span>

          <button type="button" className="kpi kpi-green kpi-click" onClick={()=>ahora.salasLibres>0 && setDrawer('libres')} title={ahora.salasLibres>0?'Ver salas libres y reservar':'Sin salas libres'}>

      {/* Drawer / modal con detalle al hacer click en una KPI */}
      {drawer && (
        <Modal

            drawer==='enCurso' ? `🎓 Clases en curso · ${ahora.enCurso}` :

            `🏫 Salas libres ahora · ${ahora.salasLibres}${modActivo?` · Mód.${modActivo.num} (${modActivo.inicio}–${modActivo.fin})`:''}`
          }

            <div className="tbl-scroll" style={{maxHeight:'60vh'}}>

                <thead><tr><th>Sala</th><th>Asignatura</th><th>Sección</th><th>Docente</th><th style={{textAlign:'right'}}>Alumnos</th><th>Hasta</th></tr></thead>
                <tbody>
                  {ahora.enCursoLista.map((s,i)=>(
                    <tr key={i}>

                      <td style={{maxWidth:280}}>{s.a||s.de||'—'}</td>

                </tbody>
              </table>
            </div>

          {drawer==='proximas' && (
            <div className="tbl-scroll" style={{maxHeight:'60vh'}}>
              <table className="tbl">
                <thead><tr><th>Inicia</th><th>Sala</th><th>Asignatura</th><th>Sección</th><th>Docente</th><th style={{textAlign:'right'}}>Alumnos</th></tr></thead>
                <tbody>
                  {ahora.proximasLista.map((s,i)=>(
                    <tr key={i}>
                      <td><b className="chip info">{s.hi}</b></td>
                      <td><b style={{color:'var(--primary)'}}>{s.s}</b></td>
                      <td style={{maxWidth:280}}>{s.a||s.de||'—'}</td>
                      <td><span className="chip">{s.sc||'—'}</span></td>

                  </tbody>

      {/* === SLA: vencidas + en peligro === */}
      {slaUrgentes && (slaUrgentes.vencidas.length>0 || slaUrgentes.peligro.length>0) && (

            {onGoView && <button className="btn btn-ghost" style={{fontSize:12,padding:'6px 12px'}} onClick={()=>onGoView('reservas')}>Ver todas →</button>}

              <span className="label">⏰ Vencidas (&gt;1h)</span>

              <div className="icon">🚨</div>
            </div>

              <span className="delta">resolver pronto</span>
              <div className="icon">⏳</div>

              <span className="label">✓ Frescas (&lt;30 min)</span>

              <span className="delta">dentro de SLA</span>
              <div className="icon">✓</div>

          {slaUrgentes.vencidas.length > 0 && (
            <div style={{marginTop:14}}>

              <div className="tbl-scroll" style={{maxHeight:200,border:'1px solid var(--border-soft)',borderRadius:8}}>
                <table className="tbl">
                  <thead><tr><th>Sala</th><th>Motivo</th><th>Fecha</th><th>Horario</th><th style={{textAlign:'right'}}>Esperando</th></tr></thead>
                  <tbody>
                    {slaUrgentes.vencidas.slice(0,8).map(r => {
                      const mins = Math.floor((now.getTime() - new Date(r.creado_en).getTime()) / 60000);
                      const h = Math.floor(mins/60), m = mins % 60;
                      return (
                        <tr key={r.id}>
                          <td><b>{r.r}</b></td>
                          <td style={{maxWidth:240}}>{r.mo || r.observacion || '—'}</td>
                          <td>{fmtFecha(r.fi)}</td>
                          <td>{r.hi}–{r.hf}</td>
                          <td style={{textAlign:'right'}}><span className="chip danger" style={{fontSize:11}}>{h>0?`${h}h `:''}{m}m</span></td>

                      );

                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      )}

      {/* === MINI MAPA DE CALOR (hoy / mañana) === */}
      <div className="card">
        <div className="card-header">
          <div>
            <h3>🌡 Mini mapa de calor · hoy y mañana</h3>
            <div className="sub">Alumnos por módulo. Hoy ({now.toLocaleDateString('es-CL',{weekday:'short',day:'2-digit',month:'short'})}) vs mañana. Click "Ver mapa completo" para filtros.</div>
          </div>
          {onGoView && <button className="btn btn-ghost" style={{fontSize:12,padding:'6px 12px'}} onClick={()=>onGoView('mapa')}>Ver mapa completo →</button>}
        </div>
        <div className="grid grid-2" style={{gap:14}}>
          {[
            { titulo:'Hoy', data: miniHeatmap.hoy },
            { titulo:'Mañana', data: miniHeatmap.man },
          ].map(({ titulo, data: arr }, dayIdx) => (
            <div key={dayIdx} style={{padding:12,background:'var(--surface-2)',border:'1px solid var(--border-soft)',borderRadius:8}}>
              <div style={{fontWeight:700,fontSize:13,marginBottom:8}}>{titulo}</div>
              <div style={{display:'grid',gridTemplateColumns:'40px 1fr 40px',gap:4,alignItems:'center'}}>
                {data.modulos.map((mod, mi) => {
                  const v = arr[mi];
                  const pct = v / miniHeatmap.max;
                  const lerp = (a,b,t)=> Math.round(a+(b-a)*t);
                  let r,g,b;
                  if(v === 0){ r=240;g=253;b=244; }
                  else if(pct < 0.5){ const t = pct/0.5; r=lerp(34,251,t); g=lerp(197,191,t); b=lerp(94,36,t); }
                  else { const t = (pct-0.5)/0.5; r=lerp(251,220,t); g=lerp(191,38,t); b=lerp(36,38,t); }
                  return (
                    <React.Fragment key={mod.num}>
                      <div style={{fontSize:10,color:'var(--text-muted)',textAlign:'right',fontWeight:600}}>M{mod.num}</div>
                      <div style={{height:18,background:`rgb(${r},${g},${b})`,borderRadius:3,position:'relative'}}>
                        {v > 0 && (
                          <span style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',fontSize:10,fontWeight:700,color:pct>0.45?'#fff':'#1A1A1A'}}>
                            {v.toLocaleString('es-CL')}
                          </span>
                        )}
                      </div>
                      <div style={{fontSize:9,color:'var(--text-muted)',textAlign:'left'}}>{mod.inicio}</div>
                    </React.Fragment>
                  );

              </div>
            </div>
          ))}
        </div>
      </div>

      {/* === SALAS SATURADAS vs SUBUTILIZADAS === */}
      {(salasUtilizacion.saturadas.length>0 || salasUtilizacion.subutilizadas.length>0) && (
        <div className="grid grid-2">
          <div className="card">
            <div className="card-header">

            {salasUtilizacion.saturadas.length === 0 ? (
              <div className="empty"><span className="emoji">📊</span>Sin datos de saturación.</div>

              <div key={s.codigo} style={{marginBottom:8}}>
                <div className="row between" style={{marginBottom:4}}>
                  <span style={{fontSize:13}}><b style={{color:'var(--primary)'}}>{s.codigo}</b> <span className="muted" style={{fontSize:11}}>· cap {s.cap}</span></span>
                  <span style={{fontWeight:700,fontSize:13,color: s.avgUso >= 0.9 ? 'var(--danger)' : 'var(--warning)'}}>{Math.round(s.avgUso*100)}%</span>

                <div style={{height:8,background:'var(--border-soft)',borderRadius:6,overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${Math.min(100,Math.round(s.avgUso*100))}%`,background: s.avgUso >= 0.9 ? 'var(--danger)' : 'var(--warning)'}}/>
                </div>
              </div>
            ))}
          </div>
          <div className="card">
            <div className="card-header">
              <div><h3>💧 Salas subutilizadas</h3><div className="sub">Capacidad ≥ 20 con baja ocupación promedio</div></div>
            </div>
            {salasUtilizacion.subutilizadas.length === 0 ? (
              <div className="empty"><span className="emoji">📊</span>Sin datos suficientes.</div>
            ) : salasUtilizacion.subutilizadas.map(s => (
              <div key={s.codigo} style={{marginBottom:8}}>
                <div className="row between" style={{marginBottom:4}}>
                  <span style={{fontSize:13}}><b style={{color:'var(--primary)'}}>{s.codigo}</b> <span className="muted" style={{fontSize:11}}>· cap {s.cap}</span></span>
                  <span style={{fontWeight:700,fontSize:13,color:'var(--success)'}}>{Math.round(s.avgUso*100)}%</span>
                </div>
                <div style={{height:8,background:'var(--border-soft)',borderRadius:6,overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${Math.max(2,Math.round(s.avgUso*100))}%`,background:'var(--success)'}}/>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {user.role==='admin' && db?.isCloud && bdUso && (() => {
        const pct = bdUso.pctUsado;
        const cls  = pct < 50 ? 'success' : pct < 80 ? 'warn' : 'danger';
        const barCol = pct < 50 ? 'var(--success)' : pct < 80 ? 'var(--warning)' : 'var(--danger)';
        const fechaReset = bdUso.nextReset.toLocaleDateString('es-CL', {day:'numeric', month:'long', year:'numeric'});
        return (
          <div className="card">
            <div className="card-header">
              <div>
                <h3>☁️ Estado de la base de datos compartida</h3>
                <div className="sub">Supabase Free tier · resetea recursos mensuales el <b>1 de cada mes</b> ({fechaReset} · faltan {bdUso.diasParaReset} días)</div>
              </div>
              {supaProjectUrl && (
                <a href={supaProjectUrl} target="_blank" rel="noopener noreferrer" className="btn btn-sm btn-ghost">Ver consumo real en Supabase →</a>
              )}
            </div>

            {/* Almacenamiento - permanente */}
            <div style={{marginBottom:18,padding:14,background:'var(--surface-2)',borderRadius:8,border:'1px solid var(--border-soft)'}}>
              <div className="row between" style={{marginBottom:8}}>
                <div>
                  <b>💾 Almacenamiento de la base</b>
                  <div className="muted" style={{fontSize:11}}>Persistente · no se resetea</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontWeight:800,fontSize:16,color:barCol}}>{pct.toFixed(2)}% usado</div>
                  <div className="muted" style={{fontSize:11}}>te queda {bdUso.pctLibre.toFixed(2)}% libre</div>
                </div>
              </div>
              <div style={{height:14,background:'var(--border-soft)',borderRadius:7,overflow:'hidden',position:'relative'}}>
                <div style={{height:'100%',width:`${Math.min(100,pct)}%`,background:barCol,transition:'width .3s'}}/>
              </div>
              <div className="row between" style={{marginTop:6,fontSize:11}}>
                <span className="muted">{fmtBytes(bdUso.totalBytes)} de {fmtBytes(bdUso.FREE_LIMIT_BYTES)}</span>
                <span className="muted">
                  Filas: {bdUso.rows.salas} salas · {bdUso.rows.programacion.toLocaleString('es-CL')} SABANA · {(bdUso.rows.eventos||0).toLocaleString('es-CL')} eventos · {bdUso.rows.reservas.toLocaleString('es-CL')} reservas · {bdUso.rows.app_users} usuarios
                </span>
              </div>
              {pct >= 80 && (
                <div className="chip danger" style={{marginTop:10,padding:'8px 12px',fontSize:12}}>
                  ⚠ Te quedan menos del 20% de almacenamiento. Considera depurar reservas antiguas o subir al plan Pro de Supabase.
                </div>
              )}
            </div>

            {/* Recursos mensuales - resetean */}
            <div style={{padding:14,background:'var(--surface-2)',borderRadius:8,border:'1px solid var(--border-soft)'}}>
              <div className="row between" style={{marginBottom:10}}>
                <div>
                  <b>🔄 Recursos mensuales</b>
                  <div className="muted" style={{fontSize:11}}>Se reinician el <b>{fechaReset}</b> (en {bdUso.diasParaReset} días)</div>
                </div>
                <span className="chip muted" style={{fontSize:11}}>Consulta tu uso real en Supabase</span>
              </div>
              <div className="grid grid-3" style={{gap:10}}>
                <div style={{padding:'10px 12px',background:'var(--surface)',border:'1px solid var(--border-soft)',borderRadius:6}}>
                  <div className="muted" style={{fontSize:10.5,fontWeight:700,textTransform:'uppercase',letterSpacing:.4}}>Egress (descarga)</div>
                  <div style={{fontSize:18,fontWeight:800}}>{bdUso.FREE_EGRESS_GB} GB/mes</div>
                  <div className="muted" style={{fontSize:11}}>~10k cargas del portal</div>
                </div>
                <div style={{padding:'10px 12px',background:'var(--surface)',border:'1px solid var(--border-soft)',borderRadius:6}}>
                  <div className="muted" style={{fontSize:10.5,fontWeight:700,textTransform:'uppercase',letterSpacing:.4}}>Mensajes realtime</div>
                  <div style={{fontSize:18,fontWeight:800}}>{bdUso.FREE_REALTIME_MSG_M}M/mes</div>
                  <div className="muted" style={{fontSize:11}}>~660k cambios sincronizados</div>
                </div>
                <div style={{padding:'10px 12px',background:'var(--surface)',border:'1px solid var(--border-soft)',borderRadius:6}}>
                  <div className="muted" style={{fontSize:10.5,fontWeight:700,textTransform:'uppercase',letterSpacing:.4}}>Conexiones realtime</div>
                  <div style={{fontSize:18,fontWeight:800}}>{bdUso.FREE_REALTIME_CON}</div>
                  <div className="muted" style={{fontSize:11}}>simultáneas en vivo</div>
                </div>
              </div>
            </div>

            <div className="login-hint" style={{marginTop:12,fontSize:11.5}}>
              Para alertas por correo cuando llegues al 80% de cualquier recurso: <b>Supabase Dashboard → Project Settings → Billing → Usage alerts</b>. La estimación de almacenamiento es un cálculo en base al conteo de filas (margen ±15%).
            </div>
          </div>
        );
      })()}

      {metricas && (() => {
        const isReservador = user.role === 'reservador';
        const my = metricas.my;
        const rankBadge = (rank, total) => {
          if(!rank) return null;
          const medal = rank===1 ? '🥇' : rank===2 ? '🥈' : rank===3 ? '🥉' : `#${rank}`;
          return <span style={{fontWeight:800}}>{medal}<span className="muted" style={{fontWeight:500,fontSize:11,marginLeft:4}}>de {total}</span></span>;

          <div className="card-header">
            <div>
              <h3>{isReservador ? '⭐ Tu desempeño · Equipo de reservadores' : '⏱ Control de gestión · Reservadores'}</h3>

/* ========= HORARIO (físico Lun-Dom × módulos) ========= */
function Horario({ data, reservas, onGoNueva }){
  const today = isoDate(new Date());
  const [fecha, setFecha] = useState(today);
  const [sala, setSala] = useState(data.salas[0]?.codigo || '');
  const now = useNowMinutes();

  const monday = useMemo(()=> getMonday(fecha), [fecha]);
  const week = useMemo(()=> [0,1,2,3,4,5,6].map(i => addDays(monday, i)), [monday]);

  const sabanaIdx = useMemo(()=> buildSabanaIndex(data.programacion), [data.programacion]);

  const grid = useMemo(()=>{
    return data.modulos.map(mod => {
      return week.map((d, dw) => {
        const dIso = isoDate(d);
        const acads = sesionesEnFecha(data, dIso, sala, sabanaIdx).filter(p =>
          moduleInTimeRange(mod.num, p.hi, p.hf, data.modulos)
        );
        const ress = reservas.filter(r =>
          r.r === sala && r.fi === dIso && r.es !== 'rechazada' &&
          mod.num >= Number(r.mi||0) && mod.num <= Number(r.mf||0)
        );
        return { acads, ress };
      });
    });
  },[data, reservas, sala, week]);

  const salaInfo = data.salas.find(s => s.codigo===sala);
  const todayIso = isoDate(new Date());
  const modActivo = useMemo(()=> data.modulos.find(m => moduleRunningNow(m, now)), [data.modulos, now]);
  const nowStr = `${String(Math.floor(now/60)).padStart(2,'0')}:${String(now%60).padStart(2,'0')}`;

  return (
    <div className="stack">
      <div className="filters">
        <div className="field" style={{maxWidth:260}}>
          <label>Sala / Recinto</label>
          <select value={sala} onChange={e=>setSala(e.target.value)}>
            {data.salas.map(s=> <option key={s.codigo} value={s.codigo}>{s.codigo} — {(s.nombre||'').slice(0,40)}</option>)}
          </select>
        </div>
        <div className="field" style={{maxWidth:180}}>
          <label>Fecha</label>
          <input type="date" value={fecha} onChange={e=>setFecha(e.target.value)}/>
        </div>
        <div className="week-nav">
          <button className="btn-icon" title="Semana anterior" onClick={()=>setFecha(isoDate(addDays(new Date(fecha+'T00:00:00'), -7)))}>‹</button>
          <span className="label">
            {monday.toLocaleDateString('es-CL',{day:'2-digit',month:'short'})} – {addDays(monday,6).toLocaleDateString('es-CL',{day:'2-digit',month:'short',year:'numeric'})}
          </span>
          <button className="btn-icon" title="Semana siguiente" onClick={()=>setFecha(isoDate(addDays(new Date(fecha+'T00:00:00'), 7)))}>›</button>
          <button className="btn btn-sm btn-ghost" onClick={()=>setFecha(todayIso)}>Hoy</button>
        </div>
        <div style={{marginLeft:'auto'}} className="legend">
          <span><i style={{background:'#3B5998'}}/>Clase</span>
          <span><i style={{background:'#D9941A'}}/>Reserva</span>
          <span><i style={{background:'#FBFEFB',border:'1px solid #C7E0CC'}}/>Libre</span>
        </div>
      </div>

      {salaInfo && (
        <div className="card" style={{padding:'14px 18px'}}>
          <div className="row" style={{gap:18,flexWrap:'wrap',alignItems:'center'}}>
            <div><div className="muted" style={{fontSize:11,textTransform:'uppercase',letterSpacing:.5}}>Código</div><b style={{color:'var(--primary)',fontSize:16}}>{salaInfo.codigo}</b></div>
            <div><div className="muted" style={{fontSize:11,textTransform:'uppercase',letterSpacing:.5}}>Denominación</div><div style={{fontSize:13}}>{salaInfo.nombre}</div></div>
            <div><div className="muted" style={{fontSize:11,textTransform:'uppercase',letterSpacing:.5}}>Tipo</div><span className="chip info">{salaInfo.tipo}</span></div>
            <div><div className="muted" style={{fontSize:11,textTransform:'uppercase',letterSpacing:.5}}>Capacidad</div><b>{salaInfo.capacidad}</b></div>
            <div><div className="muted" style={{fontSize:11,textTransform:'uppercase',letterSpacing:.5}}>Responsable</div><div style={{fontSize:13}}>{salaInfo.responsable}</div></div>
            <div style={{marginLeft:'auto'}}>
              {modActivo ? (
                <div className="now-banner" title={`Son las ${nowStr}`}>
                  <span className="dot"/>AHORA · Mód.{modActivo.num} · {modActivo.inicio}–{modActivo.fin}
                </div>
              ) : (
                <div className="now-banner off" title={`Son las ${nowStr}`}>
                  <span className="dot"/>{nowStr} · sin módulo en curso
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      <div className="card" style={{padding:0,overflow:'auto'}}>
        <div className="hgrid" style={{minWidth:980}}>
          <div className="hh">Módulo</div>
          {week.map((d, i) => {
            const isToday = isoDate(d)===todayIso;
            return (
              <div key={i} className={`hh ${isToday?'today':''}`}>
                {DIA_CORTO[i]}<small>{d.toLocaleDateString('es-CL',{day:'2-digit',month:'2-digit'})}</small>
              </div>
            );
          })}
          {data.modulos.map((mod, mi) => {
            const modIsNow = moduleRunningNow(mod, now);
            return (
            <React.Fragment key={mod.num}>
              <div className={`mod ${modIsNow?'now':''}`}><b>Mód. {mod.num}</b>{mod.inicio}<br/>{mod.fin}</div>
              {grid[mi].map((cell, di) => {
                const isWeekend = di>=5;
                const dIso = isoDate(week[di]);
                const cellIsNow = isTodayIso(dIso) && modIsNow;
                if(cell.acads.length===0 && cell.ress.length===0){
                  return (
                    <div key={di} className={`cl libre ${isWeekend?'weekend':''} ${cellIsNow?'now-cell':''}`} title="Espacio disponible">
                      <div className="blk-libre">LIBRE</div>
                    </div>
                  );
                }
                return (
                  <div key={di} className={`cl ${isWeekend?'weekend':''} ${cellIsNow?'now-cell':''}`}>
                    {cell.acads.map((p,i)=>{
                      const enCurso = isTodayIso(dIso) && inRangeNow(p.hi, p.hf, now);
                      return (
                        <div key={'a'+i} className={`blk blk-ac ${enCurso?'now':''}`} title={`${p.a} · ${p.d||''} · ${p.hi}-${p.hf}${enCurso?' · EN CURSO':''}`}>
                          <b>{p.sc}</b><div style={{opacity:.85}}>{(p.a||'').slice(0,26)}</div>
                        </div>
                      );
                    })}
                    {cell.ress.map((r,i)=>{
                      const mIni = moduloInfo(data.modulos, r.mi);
                      const mFin = moduloInfo(data.modulos, r.mf);
                      const enCurso = isTodayIso(dIso) && mIni && mFin && inRangeNow(mIni.inicio, mFin.fin, now);
                      return (
                        <div key={'r'+i} className={`blk ${r.es==='pendiente'?'blk-pen':'blk-rs'} ${enCurso?'now':''}`} title={`${r.mo} · ${r.do||''} · Mód.${r.mi}-${r.mf}${enCurso?' · EN CURSO':''}`}>
                          <b>{r.es==='pendiente'?'⏳ ':'📌 '}{(r.mo||'').slice(0,24)}</b>
                          <div style={{opacity:.85}}>{r.do||r.co||''}</div>
                        </div>
                      );
                    })}
                  </div>
                );
              })}
            </React.Fragment>
          );})}
        </div>
      </div>
    </div>
  );
}

/* ========= HORARIO DOCENTE =========
   Selecciona un docente y muestra su agenda semanal (Lun-Sáb × módulos)
   con cada bloque = sala · asignatura · sección · inscritos. Usa LISTA DE
   RECURSOS (fecha exacta) si está cargada; sino el patrón semanal SABANA.
   Si hay jefatura cargada para el docente, la muestra en el header. */
function HorarioDocente({ data }){
  const [docente, setDocente] = useState('');
  const [q, setQ] = useState('');
  const [fecha, setFecha] = useState(isoDate(new Date()));
  const now = useNowMinutes();

  const usaEventos = hasEventos(data);
  const sesiones = useMemo(()=> sesionesConsolidadas(data), [data]);
  const docentes = useMemo(()=> [...new Set(sesiones.map(s=>s.d).filter(Boolean))].sort(), [sesiones]);
  const docentesFiltrados = useMemo(()=>{
    if(!q) return docentes;
    const qn = q.toLowerCase();
    return docentes.filter(d => d.toLowerCase().includes(qn));
  }, [docentes, q]);

  // Jefatura del docente seleccionado
  const jefatura = useMemo(()=>{
    if(!docente || !data.docente_jefes) return null;
    return data.docente_jefes.find(j => (j.docente||'').trim().toLowerCase() === docente.trim().toLowerCase()) || null;
  }, [docente, data.docente_jefes]);

  const monday = useMemo(()=> getMonday(fecha), [fecha]);
  const week = useMemo(()=> [0,1,2,3,4,5,6].map(i => addDays(monday, i)), [monday]);

  const modActivo = useMemo(()=> data.modulos.find(m => moduleRunningNow(m, now)), [data.modulos, now]);
  const nowStr = `${String(Math.floor(now/60)).padStart(2,'0')}:${String(now%60).padStart(2,'0')}`;

  // Sesiones del docente
  const misSesiones = useMemo(()=>{
    if(!docente) return [];
    return sesiones.filter(s => s.d === docente);
  }, [sesiones, docente]);

  // Grid 20 módulos × 6 días con bloques del docente
  const grid = useMemo(()=>{
    return data.modulos.map(mod => {
      return [0,1,2,3,4,5].map(dw => {
        const d = week[dw];
        const dIso = isoDate(d);
        return misSesiones.filter(s => {
          if(!moduleInTimeRange(mod.num, s.hi, s.hf, data.modulos)) return false;
          if(s.fi) return s.fi === dIso;
          return s.dw && s.dw[dw] === '1';
        });
      });
    });
  }, [misSesiones, week, data.modulos]);

  // Resumen de la semana
  const stats = useMemo(()=>{
    const sesionesUnicas = new Map();
    for(const dw of [0,1,2,3,4,5]){
      const dIso = isoDate(week[dw]);
      for(const s of misSesiones){
        const enFecha = s.fi ? s.fi === dIso : (s.dw && s.dw[dw]==='1');
        if(!enFecha) continue;
        const k = `${s.sc||''}|${s.s||''}|${s.hi}|${s.hf}|${dIso}`;
        if(!sesionesUnicas.has(k)){
          sesionesUnicas.set(k, { ins:Number(s.i)||0, sala:s.s, asig:s.a, sec:s.sc });
        }
      }
    }
    const seccionesUnicas = new Set([...sesionesUnicas.values()].map(x => x.sec));
    const salasUnicas = new Set([...sesionesUnicas.values()].map(x => x.sala));
    const alumnos = [...sesionesUnicas.values()].reduce((a,x)=>a+(x.ins||0), 0);
    return {
      sesiones: sesionesUnicas.size,
      secciones: [...seccionesUnicas].filter(Boolean).length,
      salas: [...salasUnicas].filter(Boolean).length,
      alumnos,
    };
  }, [misSesiones, week]);

  return (
    <div className="stack">
      {!data._eventosLoaded && (
        <div className="card" style={{padding:'10px 14px',background:'#EAF2FE',borderColor:'#C4D2EA'}}>
          <div className="row" style={{gap:10,alignItems:'center'}}>
            <span style={{fontSize:16}}>🔄</span>
            <div style={{fontSize:12.5,lineHeight:1.4,flex:1}}>
              <b>Cargando LISTA DE RECURSOS en segundo plano</b> · mientras tanto se usa el patrón semanal de SABANA. La agenda se actualiza con fechas exactas apenas terminen de bajar las sesiones.

/* ========= GESTIONES — AUDITORÍAS EN TERRENO =========
   Pestaña privada (admin + password). Sortea N clases del día desde el
   módulo X al Y para que un auditor las visite presencialmente y registre
   si el docente llegó/se fue a la hora. Persistencia en Supabase tabla
   'auditorias'. Incluye dashboard agregado de cumplimiento.

   Decisiones:
   - Sorteo estable por (fecha + auditor + sede) usando hash mulberry32.
   - Universo: clases con docente asignado, en sala presencial (no
     virtual/cancha/piscina/gimnasio externo), futuras o en curso del día.
   - Config persistida en localStorage: modIni, modFin, n (cantidad).
*/
const GESTIONES_PASSWORD = '010203';
const GESTIONES_CFG_KEY = 'sr_gestiones_cfg_v1';
const GESTIONES_AUTH_KEY = 'sr_gestiones_auth_v1'; // sessionStorage

// PRNG determinístico para que dos cargas del mismo día con el mismo
// auditor produzcan exactamente la misma muestra. mulberry32 de tomas-vergara.
const seedFromString = (s) => {
  let h = 1779033703 ^ s.length;
  for(let i=0; i<s.length; i++){
    h = Math.imul(h ^ s.charCodeAt(i), 3432918353);
    h = (h << 13) | (h >>> 19);
  }
  return () => {
    h = Math.imul(h ^ (h >>> 16), 2246822507);
    h = Math.imul(h ^ (h >>> 13), 3266489909);
    h ^= h >>> 16;
    return (h >>> 0) / 4294967296;
  };
};
const shuffleSeeded = (arr, rng) => {
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
};

// Tipos de sala considerados "no presenciales / no auditables a pie"
const TIPOS_NO_AUDITABLES = new Set(['Piscina','Cancha']);
const esSalaAuditable = (sala) => {
  if(!sala) return false;
  if(isSalaVirtual(sala)) return false;
  if(TIPOS_NO_AUDITABLES.has(sala.tipo)) return false;
  if((sala.ubicacion||'Sede') === 'Fuera de Sede') return false;
  return true;
};

function Gestiones({ data, user, db, toast }){
  // === 1) Bloqueo por contraseña (memorizado en sessionStorage) ===
  const [unlocked, setUnlocked] = useState(()=> sessionStorage.getItem(GESTIONES_AUTH_KEY)==='1');
  const [pw, setPw] = useState('');
  const [pwErr, setPwErr] = useState(false);
  const tryUnlock = (e) => {
    if(e) e.preventDefault();
    if(pw === GESTIONES_PASSWORD){
      sessionStorage.setItem(GESTIONES_AUTH_KEY, '1');
      setUnlocked(true);
      setPw(''); setPwErr(false);
    } else {
      setPwErr(true);
    }
  };
  const lock = () => { sessionStorage.removeItem(GESTIONES_AUTH_KEY); setUnlocked(false); };

  // === 2) Configuración persistida ===
  const [cfg, setCfg] = useState(()=>{
    try {
      const raw = localStorage.getItem(GESTIONES_CFG_KEY);
      if(raw) return { ...{ modIni:3, modFin:13, n:10 }, ...JSON.parse(raw) };
    } catch {}
    return { modIni:3, modFin:13, n:10 };
  });
  const guardarCfg = (patch) => {
    setCfg(prev => {
      const next = { ...prev, ...patch };
      localStorage.setItem(GESTIONES_CFG_KEY, JSON.stringify(next));
      return next;
    });
  };

  // === 3) Auditorías cargadas desde DB ===
  const [auditorias, setAuditorias] = useState([]);
  const [loadingA, setLoadingA] = useState(false);
  const recargar = async () => {
    if(!db) return;
    setLoadingA(true);
    try {
      const data = await db.loadAuditorias();
      setAuditorias(data);
    } catch(e){ console.error('loadAuditorias:', e); toast(`Error cargando auditorías: ${e.message}`); }
    finally { setLoadingA(false); }
  };
  useEffect(()=>{ if(unlocked) recargar(); }, [unlocked, db]);

  // === 4) Reloj reactivo (cuenta regresiva por clase) ===
  const [now, setNow] = useState(new Date());
  useEffect(()=>{
    if(!unlocked) return;
    const t = setInterval(()=> setNow(new Date()), 30000);
    return ()=> clearInterval(t);
  }, [unlocked]);

  // === 5) Fecha del recorrido (default hoy, editable) ===
  const [fecha, setFecha] = useState(isoDate(new Date()));
  // Bump para re-sortear cuando el admin hace click en "Re-sortear"
  const [reroll, setReroll] = useState(0);

  // === 6) Sub-pestaña: 'recorrido' | 'panel' ===
  const [tab, setTab] = useState('recorrido');

  // === 7) Sorteo de N clases ===
  const candidatas = useMemo(()=>{
    if(!unlocked) return [];
    const salaInfoMap = new Map(data.salas.map(s => [s.codigo, s]));
    const modIni = Number(cfg.modIni)||3;
    const modFin = Number(cfg.modFin)||13;
    const modIniInfo = data.modulos.find(m => m.num === modIni);
    const modFinInfo = data.modulos.find(m => m.num === modFin);
    if(!modIniInfo || !modFinInfo) return [];
    const hLimIni = modIniInfo.inicio;
    const hLimFin = modFinInfo.fin;
    const sess = sesionesEnFecha(data, fecha);
    const dedup = new Set();
    const esHoy = fecha === isoDate(new Date());
    const ahoraHM = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    const out = [];
    for(const s of sess){
      if(!s.d) continue; // sin docente identificado
      const sala = salaInfoMap.get(s.s);
      if(!esSalaAuditable(sala)) continue;
      if(s.hi < hLimIni || s.hf > hLimFin) continue;
      // Si es hoy, solo clases que aún no terminaron
      if(esHoy && s.hf <= ahoraHM) continue;
      const k = `${s.sc||''}|${s.s||''}|${s.hi}|${s.hf}|${fecha}`;
      if(dedup.has(k)) continue;
      dedup.add(k);
      out.push(s);
    }
    return out;
  }, [unlocked, data, fecha, cfg.modIni, cfg.modFin, now, reroll]);

  // Sorteo determinístico: misma muestra para mismo (fecha + auditor)
  const muestra = useMemo(()=>{
    if(!candidatas.length) return [];
    const seedKey = `${fecha}|${user.username}|${reroll}`;
    const rng = seedFromString(seedKey);
    return shuffleSeeded(candidatas, rng).slice(0, Number(cfg.n)||10);
  }, [candidatas, fecha, user.username, cfg.n, reroll]);

  // === 8) Índice de auditorías existentes para esta fecha + auditor ===
  // Clave única por (fecha, sección, sala, hora_inicio, hora_fin) — sólo
  // del auditor actual (cada auditor lleva su propio recorrido).
  const auditIdx = useMemo(()=>{
    const idx = new Map();
    for(const a of auditorias){
      if(a.fecha !== fecha) continue;
      if(a.auditor !== user.username) continue;
      const k = `${a.seccion||''}|${a.sala||''}|${a.hora_inicio||''}|${a.hora_fin||''}`;
      idx.set(k, a);
    }
    return idx;
  }, [auditorias, fecha, user.username]);

  // === 9) Guardar parcial / completo ===
  const guardarItem = async (sess, patch) => {
    const mods = (()=>{
      const a = data.modulos.find(m => m.inicio <= sess.hi);
      const b = data.modulos.find(m => m.fin >= sess.hf);
      let mi = null, mf = null;
      // El módulo de inicio = el módulo cuyo rango contiene s.hi
      for(const m of data.modulos){
        if(m.inicio <= sess.hi && sess.hi < m.fin){ mi = m.num; break; }
      }
      for(let i=data.modulos.length-1; i>=0; i--){
        const m = data.modulos[i];
        if(m.inicio < sess.hf && sess.hf <= m.fin){ mf = m.num; break; }
      }
      return { mi, mf };
    })();
    const k = `${sess.sc||''}|${sess.s||''}|${sess.hi}|${sess.hf}`;
    const prev = auditIdx.get(k);
    const row = {
      ...(prev || {}),
      auditor: user.username,
      fecha,
      sala: sess.s||null,
      seccion: sess.sc||null,
      asignatura: sess.a || sess.de || null,
      docente: sess.d || null,
      escuela: sess.es || null,
      modulo_ini: mods.mi,
      modulo_fin: mods.mf,
      hora_inicio: sess.hi,
      hora_fin: sess.hf,
      ...patch,
    };
    try {
      const saved = await db.saveAuditoria(row);
      // refrescar lista local sin recargar todo
      setAuditorias(list => {
        const i = list.findIndex(x => x.id === saved.id);
        if(i >= 0){ const next = list.slice(); next[i] = saved; return next; }
        return [...list, saved];
      });
      toast('Auditoría guardada.');
    } catch(e){ console.error('saveAuditoria:', e); toast(`Error: ${e.message}`); }
  };

  if(!unlocked){
    return (
      <div className="stack">
        <div className="card" style={{maxWidth:520,margin:'40px auto',padding:'30px 28px'}}>
          <div style={{textAlign:'center',marginBottom:16}}>
            <div style={{fontSize:42,marginBottom:6}}>🔒</div>
            <h3 style={{fontSize:18}}>Acceso restringido</h3>
            <div className="sub" style={{marginTop:6}}>Pestaña <b>Gestiones</b> · auditorías en terreno.<br/>Solo administradores con la contraseña asignada.</div>
          </div>
          <form onSubmit={tryUnlock} className="stack" style={{gap:12}}>
            <div className="field">
              <label>Contraseña de Gestiones</label>
              <input
                type="password" value={pw}
                onChange={e=>{ setPw(e.target.value); setPwErr(false); }}
                placeholder="●●●●●●"
                autoFocus
                style={pwErr?{borderColor:'var(--danger)'}:{}}
              />
              {pwErr && <div style={{color:'var(--danger)',fontSize:12,marginTop:4}}>Contraseña incorrecta.</div>}
            </div>
            <button type="submit" className="btn btn-primary btn-block">Ingresar</button>
          </form>
        </div>
      </div>
    );
  }

  return (
    <div className="stack">
      {/* Header con sub-tabs y botón lock */}
      <div className="card">
        <div className="card-header">
          <div>
            <h3>🔒 Gestiones · Auditorías en terreno</h3>
            <div className="sub">Auditor: <b>{user.nombre || user.username}</b> · Las auditorías quedan registradas con tu cuenta.</div>
          </div>
          <div className="row" style={{gap:8}}>
            <button className="btn btn-ghost" style={{fontSize:12,padding:'6px 12px'}} onClick={lock}>🔒 Bloquear</button>
          </div>
        </div>
        <div className="seg" style={{marginTop:4}}>
          <button className={tab==='recorrido'?'active':''} onClick={()=>setTab('recorrido')}>🚶 Recorrido</button>
          <button className={tab==='panel'?'active':''} onClick={()=>setTab('panel')}>📊 Panel de análisis</button>
        </div>
      </div>

      {tab==='recorrido' && (
        <GestionesRecorrido
          data={data} user={user} fecha={fecha} setFecha={setFecha}
          cfg={cfg} guardarCfg={guardarCfg}
          muestra={muestra} candidatas={candidatas}
          auditIdx={auditIdx} now={now}
          onSave={guardarItem}
          onReroll={()=> setReroll(r => r+1)}
          loading={loadingA}
        />
      )}
      {tab==='panel' && (
        <GestionesPanel
          data={data}
          auditorias={auditorias}
          loading={loadingA}
          onReload={recargar}
        />
      )}
    </div>
  );
}

/* ----- SUB-COMPONENTE: Recorrido (lista de auditorías por hacer) ----- */
function GestionesRecorrido({ data, user, fecha, setFecha, cfg, guardarCfg, muestra, candidatas, auditIdx, now, onSave, onReroll, loading }){
  const todayIso = isoDate(new Date());
  const ahoraMin = now.getHours()*60 + now.getMinutes();
  const esHoy = fecha === todayIso;

  // Estado del módulo actual (para destacar)
  const modActivo = data.modulos.find(m => {
    const a = toMin(m.inicio), b = toMin(m.fin);
    return ahoraMin >= a && ahoraMin < b;
  });

  return (
    <>
      {/* Configuración del sorteo */}
      <div className="card">
        <div className="card-header">
          <div>
            <h3>⚙ Configuración del recorrido</h3>
            <div className="sub">Edita los parámetros del sorteo. El sorteo es estable por <b>fecha + auditor</b> (no cambia al recargar).</div>
          </div>
          <button className="btn btn-ghost" style={{fontSize:12,padding:'6px 12px'}} onClick={onReroll}>🔀 Re-sortear</button>
        </div>
        <div className="filters">
          <div className="field" style={{maxWidth:170}}>
            <label>Fecha del recorrido</label>
            <input type="date" value={fecha} onChange={e=>setFecha(e.target.value)}/>
          </div>
          <div className="field" style={{maxWidth:120}}>
            <label>Módulo desde</label>
            <select value={cfg.modIni} onChange={e=>guardarCfg({modIni:Number(e.target.value)})}>
              {data.modulos.map(m => <option key={m.num} value={m.num}>Mód. {m.num} ({m.inicio})</option>)}
            </select>
          </div>
          <div className="field" style={{maxWidth:120}}>
            <label>Módulo hasta</label>
            <select value={cfg.modFin} onChange={e=>guardarCfg({modFin:Number(e.target.value)})}>
              {data.modulos.map(m => <option key={m.num} value={m.num}>Mód. {m.num} ({m.fin})</option>)}
            </select>
          </div>
          <div className="field" style={{maxWidth:120}}>
            <label>Cantidad</label>
            <input type="number" min="1" max="50" value={cfg.n} onChange={e=>guardarCfg({n:Math.max(1, Math.min(50, Number(e.target.value)||10))})}/>
          </div>
          <div className="field" style={{justifyContent:'flex-end'}}>
            <label>&nbsp;</label>
            <div className="muted" style={{fontSize:12.5}}>
              Universo: <b>{candidatas.length.toLocaleString('es-CL')}</b> clases candidatas{esHoy?' · de hoy':''}{modActivo?` · estás en Mód.${modActivo.num}`:''}
            </div>
          </div>
        </div>
      </div>

      {/* Lista de clases sorteadas */}
      {loading ? (
        <div className="card"><div className="loader"><div className="spinner"/><div>Cargando auditorías…</div></div></div>
      ) : muestra.length === 0 ? (
        <div className="card"><div className="empty"><span className="emoji">🔍</span>Sin clases candidatas con esta configuración. Prueba ampliar el rango de módulos o cambiar la fecha.</div></div>
      ) : (
        <div className="stack" style={{gap:10}}>
          {muestra.map((s, i) => (
            <ItemAuditoria
              key={`${s.sc||''}|${s.s||''}|${s.hi}|${s.hf}`}
              idx={i+1}
              sess={s}
              auditoria={auditIdx.get(`${s.sc||''}|${s.s||''}|${s.hi}|${s.hf}`)}
              now={now}
              esHoy={esHoy}
              onSave={onSave}
            />
          ))}
        </div>
      )}
    </>
  );
}

/* ----- Ítem individual de auditoría ----- */
function ItemAuditoria({ idx, sess, auditoria, now, esHoy, onSave }){
  const a = auditoria || {};
  const ahoraMin = now.getHours()*60 + now.getMinutes();
  const hiMin = toMin(sess.hi), hfMin = toMin(sess.hf);
  // Estado temporal del módulo de inicio
  const estado = !esHoy ? 'plan'
    : ahoraMin < hiMin ? 'porIniciar'
    : ahoraMin < hfMin ? 'enCurso'
    : 'finalizada';
  // Contador
  const minFalta = hiMin - ahoraMin;
  const minRestan = hfMin - ahoraMin;
  const fmtMin = (m) => {
    if(m < 0) return '—';
    if(m < 60) return `${m} min`;
    const h = Math.floor(m/60), mm = m%60;
    return mm > 0 ? `${h}h ${mm}m` : `${h}h`;
  };

  // Estado local del formulario (sin guardar todavía)
  const [llego, setLlego] = useState(a.llego_a_hora || '');
  const [horaLleg, setHoraLleg] = useState(a.hora_llegada || '');
  const [obsIni, setObsIni] = useState(a.obs_inicio || '');
  const [termino, setTermino] = useState(a.termino_a_hora || '');
  const [horaSal, setHoraSal] = useState(a.hora_salida || '');
  const [obsFin, setObsFin] = useState(a.obs_fin || '');
  useEffect(()=>{
    setLlego(a.llego_a_hora||''); setHoraLleg(a.hora_llegada||''); setObsIni(a.obs_inicio||'');
    setTermino(a.termino_a_hora||''); setHoraSal(a.hora_salida||''); setObsFin(a.obs_fin||'');
  // eslint-disable-next-line
  }, [a.id]);

  const nowHHMM = () => `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const marcarLlegadaAhora = () => { setHoraLleg(nowHHMM()); setLlego(sess.hi >= nowHHMM() ? 'si' : 'no'); };
  const marcarSalidaAhora  = () => { setHoraSal(nowHHMM()); setTermino(nowHHMM() >= sess.hf ? 'si' : 'no'); };

  const guardarInicio = () => onSave(sess, {
    llego_a_hora: llego || null,
    hora_llegada: horaLleg || null,
    obs_inicio: obsIni || null,
  });
  const guardarFin = () => onSave(sess, {
    termino_a_hora: termino || null,
    hora_salida: horaSal || null,
    obs_fin: obsFin || null,
  });

  // Indicadores visuales
  const inicioCompleto = !!a.llego_a_hora;
  const finCompleto = !!a.termino_a_hora;
  const cardCls = estado==='enCurso' ? 'card now-card' : 'card';

  return (
    <div className={cardCls} style={{padding:0,overflow:'hidden'}}>
      <div className="card-header" style={{padding:'14px 18px',background:estado==='enCurso'?'rgba(10,132,255,.06)':'transparent'}}>
        <div style={{flex:1}}>
          <div className="row" style={{gap:10,alignItems:'center',flexWrap:'wrap'}}>
            <span className="chip info" style={{fontSize:12}}>#{idx}</span>
            <b style={{fontSize:15,color:'var(--primary)'}}>{sess.s}</b>
            <span style={{fontSize:14,fontWeight:600}}>{(sess.a || sess.de || '').slice(0,60)}</span>
            <span className="chip">{sess.sc||'—'}</span>
            {estado==='porIniciar' && <span className="chip warn">⏳ Inicia en {fmtMin(minFalta)}</span>}
            {estado==='enCurso' && <span className="chip success" style={{background:'var(--primary)',color:'#fff'}}>● EN CURSO · {fmtMin(minRestan)} restantes</span>}
            {estado==='finalizada' && <span className="chip">Finalizada</span>}
            {estado==='plan' && <span className="chip">Planificación</span>}
          </div>
          <div style={{marginTop:6,fontSize:12.5,color:'var(--text-muted)'}}>
            👨‍🏫 <b>{sess.d || '—'}</b> · {sess.hi}–{sess.hf} · {(sess.i||0)} alumnos {sess.es?`· ${ESCUELAS_FULL[sess.es]||sess.es}`:''}
          </div>
        </div>
        <div className="row" style={{gap:6,alignItems:'center'}}>
          <span style={{fontSize:11,color:'var(--text-muted)'}}>
            {inicioCompleto?'✅':'⬜'} Inicio · {finCompleto?'✅':'⬜'} Fin
          </span>
        </div>
      </div>

      <div className="grid grid-2" style={{padding:'14px 18px',gap:16,borderTop:'1px solid var(--border-soft)'}}>
        {/* Bloque INICIO */}
        <div>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:.4,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:8}}>🚪 Inicio · Programado {sess.hi}</div>
          <div className="row" style={{gap:8,flexWrap:'wrap',marginBottom:8}}>
            <button type="button" className={`btn btn-sm ${llego==='si'?'btn-primary':'btn-ghost'}`} onClick={()=>setLlego('si')}>✓ Llegó a la hora</button>
            <button type="button" className={`btn btn-sm ${llego==='no'?'btn-danger':'btn-ghost'}`} onClick={()=>setLlego('no')}>✗ No llegó a la hora</button>
          </div>
          <div className="row" style={{gap:8,alignItems:'flex-end'}}>
            <div className="field" style={{flex:1}}>
              <label>Hora real de llegada</label>
              <input type="time" value={horaLleg} onChange={e=>setHoraLleg(e.target.value)}/>
            </div>
            <button type="button" className="btn btn-sm btn-ghost" onClick={marcarLlegadaAhora}>Ahora</button>
          </div>
          <div className="field" style={{marginTop:8}}>
            <label>Observación de inicio</label>
            <textarea rows="2" value={obsIni} onChange={e=>setObsIni(e.target.value)} placeholder="Notas sobre el inicio…"/>
          </div>
          <button type="button" className="btn btn-sm btn-primary" style={{marginTop:8}} onClick={guardarInicio}>💾 Guardar inicio</button>
        </div>
        {/* Bloque FIN */}
        <div>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:.4,textTransform:'uppercase',color:'var(--text-muted)',marginBottom:8}}>🏁 Término · Programado {sess.hf}</div>
          <div className="row" style={{gap:8,flexWrap:'wrap',marginBottom:8}}>
            <button type="button" className={`btn btn-sm ${termino==='si'?'btn-primary':'btn-ghost'}`} onClick={()=>setTermino('si')}>✓ Terminó a la hora</button>
            <button type="button" className={`btn btn-sm ${termino==='no'?'btn-danger':'btn-ghost'}`} onClick={()=>setTermino('no')}>✗ Se fue antes / después</button>
          </div>
          <div className="row" style={{gap:8,alignItems:'flex-end'}}>
            <div className="field" style={{flex:1}}>
              <label>Hora real de salida</label>
              <input type="time" value={horaSal} onChange={e=>setHoraSal(e.target.value)}/>
            </div>
            <button type="button" className="btn btn-sm btn-ghost" onClick={marcarSalidaAhora}>Ahora</button>
          </div>
          <div className="field" style={{marginTop:8}}>
            <label>Observación de término</label>
            <textarea rows="2" value={obsFin} onChange={e=>setObsFin(e.target.value)} placeholder="Notas sobre el término…"/>
          </div>
          <button type="button" className="btn btn-sm btn-primary" style={{marginTop:8}} onClick={guardarFin}>💾 Guardar fin</button>
        </div>
      </div>
    </div>
  );
}

/* ----- Panel de análisis de auditorías ----- */
function GestionesPanel({ data, auditorias, loading, onReload }){
  const [escuela, setEscuela] = useState('');
  const [auditor, setAuditor] = useState('');
  const [desde, setDesde] = useState(()=> isoDate(addDays(new Date(), -30)));
  const [hasta, setHasta] = useState(()=> isoDate(new Date()));

  const filtradas = useMemo(()=> auditorias.filter(a => {
    if(escuela && a.escuela !== escuela) return false;
    if(auditor && a.auditor !== auditor) return false;
    if(desde && a.fecha < desde) return false;
    if(hasta && a.fecha > hasta) return false;
    return true;
  }), [auditorias, escuela, auditor, desde, hasta]);

  const kpis = useMemo(()=>{
    const total = filtradas.length;
    const llegoSi = filtradas.filter(a => a.llego_a_hora === 'si').length;
    const llegoNo = filtradas.filter(a => a.llego_a_hora === 'no').length;
    const termSi = filtradas.filter(a => a.termino_a_hora === 'si').length;
    const termNo = filtradas.filter(a => a.termino_a_hora === 'no').length;
    const pctInicio = (llegoSi+llegoNo) > 0 ? Math.round((llegoSi / (llegoSi+llegoNo))*100) : null;
    const pctFin = (termSi+termNo) > 0 ? Math.round((termSi / (termSi+termNo))*100) : null;
    return { total, llegoSi, llegoNo, termSi, termNo, pctInicio, pctFin };
  }, [filtradas]);

  // Ranking docentes con incumplimientos
  const rankingDocentes = useMemo(()=>{
    const m = new Map();
    for(const a of filtradas){
      if(!a.docente) continue;
      if(!m.has(a.docente)) m.set(a.docente, { docente:a.docente, escuela:a.escuela, visitas:0, incInicio:0, incFin:0 });
      const x = m.get(a.docente);
      x.visitas++;
      if(a.llego_a_hora === 'no') x.incInicio++;
      if(a.termino_a_hora === 'no') x.incFin++;
    }
    return [...m.values()].map(x => ({ ...x, total:x.incInicio+x.incFin })).sort((a,b)=> b.total - a.total).slice(0, 20);
  }, [filtradas]);

  // Por escuela
  const porEscuela = useMemo(()=>{
    const m = new Map();
    for(const a of filtradas){
      const es = a.escuela || 'Sin escuela';
      if(!m.has(es)) m.set(es, { escuela:es, visitas:0, llegoSi:0, llegoNo:0, termSi:0, termNo:0 });
      const x = m.get(es);
      x.visitas++;
      if(a.llego_a_hora === 'si') x.llegoSi++;
      if(a.llego_a_hora === 'no') x.llegoNo++;
      if(a.termino_a_hora === 'si') x.termSi++;
      if(a.termino_a_hora === 'no') x.termNo++;
    }
    return [...m.values()].sort((a,b)=> b.visitas - a.visitas);
  }, [filtradas]);

  // Por auditor
  const porAuditor = useMemo(()=>{
    const m = new Map();
    for(const a of filtradas){
      if(!m.has(a.auditor)) m.set(a.auditor, { auditor:a.auditor, visitas:0, completas:0 });
      const x = m.get(a.auditor);
      x.visitas++;
      if(a.llego_a_hora && a.termino_a_hora) x.completas++;
    }
    return [...m.values()].sort((a,b)=> b.visitas - a.visitas);
  }, [filtradas]);

  const escuelas = useMemo(()=> [...new Set(auditorias.map(a=>a.escuela).filter(Boolean))].sort(), [auditorias]);
  const auditores = useMemo(()=> [...new Set(auditorias.map(a=>a.auditor).filter(Boolean))].sort(), [auditorias]);

  const exportarCSV = () => {
    const esc = (s) => {
      const str = String(s ?? '');
      return /[",\n;]/.test(str) ? `"${str.replace(/"/g, '""')}"` : str;
    };
    const headers = ['fecha','auditor','sala','seccion','asignatura','docente','escuela','hora_inicio','hora_fin','llego_a_hora','hora_llegada','obs_inicio','termino_a_hora','hora_salida','obs_fin'];
    const lines = [headers.join(';'), ...filtradas.map(a => headers.map(h => esc(a[h])).join(';'))];
    const blob = new Blob(['﻿'+lines.join('\n')], { type:'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url; link.download = `auditorias_${new Date().toISOString().slice(0,10)}.csv`;
    document.body.appendChild(link); link.click(); link.remove();
    URL.revokeObjectURL(url);
  };

  return (
    <>
      <div className="card">
        <div className="card-header">
          <div>
            <h3>📊 Panel · Análisis de auditorías</h3>
            <div className="sub">{filtradas.length.toLocaleString('es-CL')} auditorías en el período · {auditorias.length.toLocaleString('es-CL')} totales en sistema</div>
          </div>
          <div className="row" style={{gap:6}}>
            <button className="btn btn-ghost" style={{fontSize:12,padding:'6px 12px'}} onClick={onReload}>🔄 Recargar</button>
            <button className="btn btn-ghost" style={{fontSize:12,padding:'6px 12px'}} onClick={exportarCSV}>📥 CSV</button>
          </div>
        </div>
        <div className="filters">
          <div className="field" style={{maxWidth:160}}>
            <label>Desde</label>
            <input type="date" value={desde} onChange={e=>setDesde(e.target.value)}/>
          </div>
          <div className="field" style={{maxWidth:160}}>
            <label>Hasta</label>
            <input type="date" value={hasta} onChange={e=>setHasta(e.target.value)}/>
          </div>
          <div className="field">
            <label>Escuela</label>
            <select value={escuela} onChange={e=>setEscuela(e.target.value)}>
              <option value="">Todas</option>
              {escuelas.map(es => <option key={es} value={es}>{ESCUELAS_FULL[es]||es}</option>)}
            </select>
          </div>
          <div className="field">
            <label>Auditor</label>
            <select value={auditor} onChange={e=>setAuditor(e.target.value)}>
              <option value="">Todos</option>
              {auditores.map(au => <option key={au} value={au}>{au}</option>)}
            </select>
          </div>
        </div>
      </div>

      <div className="grid grid-4">
        <div className="kpi kpi-blue">
          <span className="label">Auditorías totales</span>
          <span className="value">{kpis.total.toLocaleString('es-CL')}</span>
          <span className="delta">en el período filtrado</span>
          <div className="icon">📋</div>
        </div>
        <div className="kpi kpi-green">
          <span className="label">% llegan a la hora</span>
          <span className="value">{kpis.pctInicio!=null ? `${kpis.pctInicio}%` : '—'}</span>
          <span className="delta">{kpis.llegoSi}/{kpis.llegoSi+kpis.llegoNo} registros</span>
          <div className="icon">✓</div>
        </div>
        <div className="kpi kpi-amber">
          <span className="label">% terminan a la hora</span>
          <span className="value">{kpis.pctFin!=null ? `${kpis.pctFin}%` : '—'}</span>
          <span className="delta">{kpis.termSi}/{kpis.termSi+kpis.termNo} registros</span>
          <div className="icon">🏁</div>
        </div>
        <div className="kpi kpi-red">
          <span className="label">Incumplimientos</span>
          <span className="value">{(kpis.llegoNo + kpis.termNo).toLocaleString('es-CL')}</span>
          <span className="delta">{kpis.llegoNo} inicio · {kpis.termNo} término</span>
          <div className="icon">⚠</div>
        </div>
      </div>

      {/* Ranking docentes con más incumplimientos */}
      <div className="card" style={{padding:0}}>
        <div className="card-header" style={{padding:'14px 18px'}}>
          <div>
            <h3>🚩 Docentes con más incumplimientos</h3>
            <div className="sub">Top 20 docentes con mayor cantidad de incumplimientos (inicio + término) en el período</div>
          </div>
        </div>
        <div className="tbl-scroll" style={{maxHeight:400}}>
          <table className="tbl">
            <thead><tr><th>Docente</th><th>Escuela</th><th style={{textAlign:'right'}}>Visitas</th><th style={{textAlign:'right'}}>No inicio</th><th style={{textAlign:'right'}}>No fin</th><th style={{textAlign:'right'}}>Total</th></tr></thead>
            <tbody>
              {rankingDocentes.map((r,i)=>(
                <tr key={i}>
                  <td><b>{r.docente}</b></td>
                  <td className="muted">{ESCUELAS_FULL[r.escuela]||r.escuela||'—'}</td>
                  <td style={{textAlign:'right'}}>{r.visitas}</td>
                  <td style={{textAlign:'right'}}>{r.incInicio>0 ? <span className="chip danger">{r.incInicio}</span> : 0}</td>
                  <td style={{textAlign:'right'}}>{r.incFin>0 ? <span className="chip danger">{r.incFin}</span> : 0}</td>
                  <td style={{textAlign:'right',fontWeight:700,color:r.total>0?'var(--danger)':'inherit'}}>{r.total}</td>
                </tr>
              ))}
              {rankingDocentes.length===0 && <tr><td colSpan="6"><div className="empty"><span className="emoji">📭</span>Sin auditorías registradas en el período.</div></td></tr>}
            </tbody>
          </table>
        </div>
      </div>

      {/* Por escuela */}
      <div className="card" style={{padding:0}}>
        <div className="card-header" style={{padding:'14px 18px'}}>
          <div><h3>🏛 Cumplimiento por escuela</h3></div>
        </div>
        <div className="tbl-scroll">
          <table className="tbl">
            <thead><tr><th>Escuela</th><th style={{textAlign:'right'}}>Visitas</th><th style={{textAlign:'right'}}>Llegan</th><th style={{textAlign:'right'}}>No llegan</th><th style={{textAlign:'right'}}>% Cumplimiento</th></tr></thead>
            <tbody>
              {porEscuela.map((r,i)=>{
                const tot = r.llegoSi + r.llegoNo;
                const pct = tot>0 ? Math.round((r.llegoSi/tot)*100) : null;
                return (
                  <tr key={i}>
                    <td><b>{ESCUELAS_FULL[r.escuela]||r.escuela}</b></td>
                    <td style={{textAlign:'right'}}>{r.visitas}</td>
                    <td style={{textAlign:'right'}}>{r.llegoSi}</td>
                    <td style={{textAlign:'right'}}>{r.llegoNo>0 ? <span className="chip danger">{r.llegoNo}</span> : 0}</td>
                    <td style={{textAlign:'right',fontWeight:700,color:pct!=null ? (pct>=80?'var(--success)':pct>=60?'var(--warn)':'var(--danger)') : 'inherit'}}>{pct!=null ? `${pct}%` : '—'}</td>
                  </tr>
                );
              })}
              {porEscuela.length===0 && <tr><td colSpan="5"><div className="empty"><span className="emoji">📭</span>Sin datos.</div></td></tr>}
            </tbody>
          </table>
        </div>
      </div>

      {/* Por auditor */}
      <div className="card" style={{padding:0}}>
        <div className="card-header" style={{padding:'14px 18px'}}>
          <div><h3>👤 Auditorías por recorredor</h3></div>
        </div>
        <div className="tbl-scroll">
          <table className="tbl">
            <thead><tr><th>Auditor</th><th style={{textAlign:'right'}}>Visitas</th><th style={{textAlign:'right'}}>Completas (inicio+fin)</th></tr></thead>
            <tbody>
              {porAuditor.map((r,i)=>(
                <tr key={i}>
                  <td><b>{r.auditor}</b></td>
                  <td style={{textAlign:'right'}}>{r.visitas}</td>
                  <td style={{textAlign:'right',fontWeight:700}}>{r.completas} / {r.visitas}</td>
                </tr>
              ))}
              {porAuditor.length===0 && <tr><td colSpan="3"><div className="empty"><span className="emoji">📭</span>Sin datos.</div></td></tr>}
            </tbody>
          </table>
        </div>
      </div>
    </>
  );
}

/* ========= SALAS ========= */
const TIPOS_RECINTO_BASE = ['Sala','Laboratorio','Taller','Auditorio','Gimnasio','Estudio','Reunion','Cancha','Piscina'];
const UBICACIONES = ['Sede','Fuera de Sede'];
// Catálogo inicial de edificios sugeridos (Sede Viña del Mar) — el usuario
// puede crear más mediante "＋ Crear nuevo edificio…" en el modal.
const EDIFICIOS_BASE = ['Arlegui','Fortín','Aromos','Saint Dominic','Seminario San Rafael','Stadio Italiano'];

function Salas({ data, user, toast, onCreate, onUpdate, onDelete }){
  const [q, setQ] = useState('');
  const [tipo, setTipo] = useState('');
  const [edificioF, setEdificioF] = useState('');
  const [ubicacionF, setUbicacionF] = useState('');
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({codigo:'',nombre:'',capacidad:'',tipo:'Sala',responsable:'',edificio:'',ubicacion:'Sede'});
  const [busy, setBusy] = useState(false);
  const [tipoCustom, setTipoCustom] = useState('');
  const [creandoTipo, setCreandoTipo] = useState(false);
  const [edifCustom, setEdifCustom] = useState('');
  const [creandoEdif, setCreandoEdif] = useState(false);
  const canEdit = user.role==='admin';

  const tipos = useMemo(()=> [...new Set(data.salas.map(s=>s.tipo))].sort(), [data]);
  const tiposCatalogo = useMemo(()=> {
    const set = new Set([...TIPOS_RECINTO_BASE, ...tipos.filter(Boolean)]);
    return [...set].sort();
  }, [tipos]);
  // Catálogo de edificios = base + los que ya existan en el catálogo
  const edificiosCatalogo = useMemo(()=> {
    const set = new Set([...EDIFICIOS_BASE, ...data.salas.map(s=>s.edificio).filter(Boolean)]);
    return [...set].sort();
  }, [data.salas]);

  const filtered = useMemo(()=> data.salas.filter(s =>
    (!q || s.codigo.toLowerCase().includes(q.toLowerCase()) || (s.nombre||'').toLowerCase().includes(q.toLowerCase())) &&
    (!tipo || s.tipo===tipo) &&
    (!edificioF || (s.edificio||'') === edificioF) &&
    (!ubicacionF || (s.ubicacion||'Sede') === ubicacionF)
  ), [data, q, tipo, edificioF, ubicacionF]);

  const resetForm = () => {
    setForm({codigo:'',nombre:'',capacidad:'',tipo:'Sala',responsable:'',edificio:'',ubicacion:'Sede'});
    setTipoCustom(''); setCreandoTipo(false);
    setEdifCustom(''); setCreandoEdif(false);
  };

  const handleTipoSelect = (v) => {
    if(v === '__nuevo__'){ setCreandoTipo(true); setTipoCustom(''); }
    else { setCreandoTipo(false); setForm(f => ({...f, tipo:v})); }
  };
  const confirmarNuevoTipo = () => {
    const nuevo = (tipoCustom||'').trim();
    if(!nuevo){ toast('Escribe el nombre del nuevo tipo de recinto.'); return; }
    if(nuevo.length > 40){ toast('Máximo 40 caracteres.'); return; }
    const yaExiste = tiposCatalogo.some(t => t.toLowerCase() === nuevo.toLowerCase());
    if(yaExiste){
      const canonico = tiposCatalogo.find(t => t.toLowerCase() === nuevo.toLowerCase());
      setForm(f => ({...f, tipo:canonico}));
      setCreandoTipo(false); setTipoCustom('');
      toast(`"${canonico}" ya existe — se selecciona el existente.`);
      return;
    }
    setForm(f => ({...f, tipo:nuevo}));
    setCreandoTipo(false); setTipoCustom('');
    toast(`Tipo "${nuevo}" listo. Se guardará al confirmar la sala.`);
  };

  const handleEdifSelect = (v) => {
    if(v === '__nuevo__'){ setCreandoEdif(true); setEdifCustom(''); }
    else { setCreandoEdif(false); setForm(f => ({...f, edificio:v})); }
  };
  const confirmarNuevoEdif = () => {
    const nuevo = (edifCustom||'').trim();
    if(!nuevo){ toast('Escribe el nombre del edificio.'); return; }
    if(nuevo.length > 60){ toast('Máximo 60 caracteres.'); return; }
    const yaExiste = edificiosCatalogo.some(t => t.toLowerCase() === nuevo.toLowerCase());
    if(yaExiste){
      const canonico = edificiosCatalogo.find(t => t.toLowerCase() === nuevo.toLowerCase());
      setForm(f => ({...f, edificio:canonico}));
      setCreandoEdif(false); setEdifCustom('');
      toast(`"${canonico}" ya existe — se selecciona el existente.`);
      return;
    }
    setForm(f => ({...f, edificio:nuevo}));
    setCreandoEdif(false); setEdifCustom('');
    toast(`Edificio "${nuevo}" listo.`);
  };

  const add = async () => {
    if(!form.codigo || !form.nombre){ toast('Completa código y nombre.'); return; }
    if(data.salas.some(s => s.codigo===form.codigo)){ toast('Ya existe una sala con ese código.'); return; }
    setBusy(true);
    try {
      await onCreate({...form, capacidad:Number(form.capacidad)||0});
      resetForm(); setModal(null); toast('Sala creada correctamente.');
    } finally { setBusy(false); }
  };
  const startEdit = (sala) => {
    setForm({
      codigo:sala.codigo, nombre:sala.nombre||'',
      capacidad:String(sala.capacidad||''), tipo:sala.tipo||'Sala',
      responsable:sala.responsable||'',
      edificio:sala.edificio||'', ubicacion:sala.ubicacion||'Sede',

    if(!form.nombre){ toast('La denominación es obligatoria.'); return; }
    setBusy(true);
    try {
      await onUpdate(form.codigo, {
        nombre:form.nombre, capacidad:Number(form.capacidad)||0,
        tipo:form.tipo, responsable:form.responsable,
        edificio:form.edificio||null, ubicacion:form.ubicacion||'Sede',
      });
      resetForm(); setModal(null); toast('Sala actualizada.');
    } finally { setBusy(false); }
  };
  const del = async (codigo) => {
    if(!window.confirm(`¿Eliminar la sala ${codigo}? No se puede deshacer.`)) return;

        <div className="field">
          <label>Edificio</label>
          <select value={edificioF} onChange={e=>setEdificioF(e.target.value)}>
            <option value="">Todos</option>
            {edificiosCatalogo.map(t=> <option key={t}>{t}</option>)}
          </select>
        </div>
        <div className="field">
          <label>Ubicación</label>
          <select value={ubicacionF} onChange={e=>setUbicacionF(e.target.value)}>
            <option value="">Todas</option>
            {UBICACIONES.map(u=> <option key={u}>{u}</option>)}
          </select>
        </div>
        <div style={{marginLeft:'auto'}}>
          {canEdit && <button className="btn btn-primary" onClick={()=>setModal('add')}>{I.plus}Nueva sala</button>}
        </div>
      </div>

      <div className="card" style={{padding:0}}>
        <div className="tbl-scroll">
          <table className="tbl">
            <thead><tr>
              <th>Código</th><th>Denominación</th><th>Tipo</th><th>Edificio</th><th>Ubicación</th><th>Cap.</th><th>Responsable</th><th></th>
            </tr></thead>
            <tbody>
              {filtered.map(s => (
                <tr key={s.codigo}>
                  <td><b style={{color:'var(--primary)'}}>{s.codigo}</b></td>
                  <td style={{maxWidth:340}}>{s.nombre}</td>
                  <td><span className="chip">{s.tipo}</span></td>

                  <td>{s.capacidad}</td>

                  <td className="nowrap" style={{textAlign:'right'}}>
                    {canEdit && <>
                      <button className="btn-icon" onClick={()=>startEdit(s)} title="Editar">{I.edit}</button>
                      <button className="btn-icon" onClick={()=>del(s.codigo)} title="Eliminar">{I.trash}</button>

              ))}
              {filtered.length===0 && <tr><td colSpan="8"><div className="empty"><span className="emoji">📭</span>Sin resultados con esos filtros.</div></td></tr>}
            </tbody>
          </table>
        </div>
      </div>

      {(modal==='add' || modal==='edit') && (
        <Modal title={modal==='add'?'Crear nueva sala':`Editar sala ${form.codigo}`} onClose={()=>setModal(null)} onSave={modal==='add'?add:update}>
          <div className="col-2">

            <div className="field"><label>Capacidad</label><input type="number" value={form.capacidad} onChange={e=>setForm({...form,capacidad:e.target.value})}/></div>
          </div>
          <div className="field"><label>Denominación</label><input value={form.nombre} onChange={e=>setForm({...form,nombre:e.target.value})}/></div>
          <div className="col-2">
            <div className="field">
              <label>Tipo de recinto</label>

              <label>Edificio</label>
              {creandoEdif ? (
                <div className="row" style={{gap:6}}>
                  <input autoFocus value={edifCustom} onChange={e=>setEdifCustom(e.target.value)}
                    onKeyDown={e=>{ if(e.key==='Enter'){ e.preventDefault(); confirmarNuevoEdif(); } if(e.key==='Escape'){ setCreandoEdif(false); setEdifCustom(''); } }}
                    placeholder="Ej. Torre A, Anexo Norte…" style={{flex:1}}/>
                  <button type="button" className="btn btn-sm btn-primary" onClick={confirmarNuevoEdif}>OK</button>
                  <button type="button" className="btn btn-sm btn-ghost" onClick={()=>{ setCreandoEdif(false); setEdifCustom(''); }}>✕</button>

              ) : (
                <select value={form.edificio} onChange={e=>handleEdifSelect(e.target.value)}>

            <div className="field">

    </div>
  );

/* ========= VERIFICADOR SABANA =========
   Panel que valida la importación SABANA / LISTA DE RECURSOS mostrando
   conteo de clases por día de la semana. Se usa dentro de
   "Importar datos → SABANA" como sanity check post-importación. */
function VerificadorSabana({ data }){
  const sesiones = useMemo(()=> sesionesConsolidadas(data), [data]);
  const usaEventos = hasEventos(data);
  const diaCount = useMemo(()=>{
    const c = [0,0,0,0,0,0,0];
    sesiones.forEach(p => {
      if(p.fi) c[dowFromIso(p.fi)]++;
      else if(p.dw) for(let i=0;i<7;i++) if(p.dw[i]==='1') c[i]++;
    });
    return c;
  },[sesiones]);
  const maxDiaCount = Math.max(1, ...diaCount);
  const [verifOpen, setVerifOpen] = useState(false);

  return (
    <div className="card" style={{padding:'14px 18px'}}>
      <div className="row between" style={{cursor:'pointer'}} onClick={()=>setVerifOpen(v=>!v)}>
        <div>
          <h3 style={{fontSize:14}}>📘 Verificador · cómo se leen las clases <span style={{color:'var(--text-soft)',fontWeight:500,fontSize:12}}>· Click para {verifOpen?'ocultar':'ver'} detalle</span></h3>
        </div>
        <div className="row" style={{gap:6}}>
          {DIA_CORTO.map((d,i) => (
            <div key={i} style={{textAlign:'center'}}>
              <div style={{fontSize:10,color:'var(--text-muted)',fontWeight:700}}>{d}</div>
              <div style={{fontSize:13,fontWeight:700,color:i>=5?'var(--text-soft)':'var(--primary)'}}>{diaCount[i]}</div>
            </div>
          ))}
        </div>
      </div>
      {verifOpen && (
        <div style={{marginTop:14,paddingTop:14,borderTop:'1px solid var(--border-soft)',fontSize:13,lineHeight:1.55,color:'var(--text-muted)'}}>
          {usaEventos ? (
            <>
              <p>Fuente: <b>LISTA DE RECURSOS</b> ({(data.eventos||[]).length.toLocaleString('es-CL')} sesiones por fecha) enriquecida con metadata del SABANA ({data.programacion.length.toLocaleString('es-CL')} filas con escuela/asignatura/docente). Cada sesión tiene fecha exacta y horario.</p>
              <p style={{marginTop:8}}>El día de semana se deriva de la fecha de cada evento. Las barras muestran cuántas sesiones reales caen en cada día.</p>
            </>
          ) : (
            <>
              <p>Fuente: <b>SABANA</b> ({data.programacion.length.toLocaleString('es-CL')} filas, patrón semanal). Cada fila marca con <b>X</b> los días en que se imparte la clase (Lun…Dom), convertidos a 7 bits <code>dw</code>.</p>
              <p style={{marginTop:8}}>Al elegir una fecha en <b>Horario semanal</b>, se calcula su día de semana y se buscan todas las clases con ese bit en 1. Importa una <b>LISTA DE RECURSOS</b> para tener fechas exactas en vez de patrones.</p>
            </>
          )}
          <div style={{marginTop:10,padding:10,background:'var(--surface-2)',borderRadius:8,border:'1px solid var(--border-soft)'}}>
            <div className="row" style={{gap:14,flexWrap:'wrap'}}>
              {DIA_NOMBRES.map((nm,i) => (
                <div key={i} style={{flex:1,minWidth:90}}>
                  <div style={{fontSize:11,color:'var(--text-muted)',fontWeight:700,marginBottom:3}}>{nm}</div>
                  <div style={{height:6,background:'var(--border-soft)',borderRadius:4,overflow:'hidden'}}>
                    <div style={{height:'100%',width:`${(diaCount[i]/maxDiaCount)*100}%`,background:i>=5?'var(--text-soft)':'var(--primary-2)'}}/>
                  </div>
                  <div style={{fontSize:11,marginTop:3}}>{diaCount[i].toLocaleString('es-CL')} clases</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ========= SLA · CRONÓMETRO Y HELPERS ========= */
const SLA_MS = 60 * 60 * 1000; // 1 hora

const fmtDuration = (ms) => {
  if(ms < 0) return '0m';
  const min = Math.floor(ms / 60000);
  if(min < 1) return `${Math.floor(ms/1000)}s`;
  if(min < 60) return `${min}m`;
  const h = Math.floor(min/60), m = min % 60;
  return m > 0 ? `${h}h ${m}m` : `${h}h`;
};

function Countdown({ creadoEn, sla = SLA_MS, compact = false }){
  const [now, setNow] = useState(Date.now());
  useEffect(()=>{
    const t = setInterval(()=> setNow(Date.now()), 1000);
    return ()=> clearInterval(t);
  },[]);
  if(!creadoEn) return <span className="muted" style={{fontSize:11}}>—</span>;
  const start = new Date(creadoEn).getTime();
  if(isNaN(start)) return <span className="muted" style={{fontSize:11}}>—</span>;
  const deadline = start + sla;
  const remaining = deadline - now;
  const expired = remaining <= 0;
  const absMs = Math.abs(remaining);
  const mins = Math.floor(absMs / 60000);
  const secs = Math.floor((absMs / 1000) % 60);
  const display = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
  const cls = expired ? 'expired' : (mins < 10 ? 'critical' : (mins < 30 ? 'warning' : 'ok'));
  const label = expired
    ? `Vencida hace ${fmtDuration(absMs)}`
    : `Tiempo restante para decidir (SLA 1 h)`;
  return (
    <span className={`countdown ${cls}`} title={label}>
      {expired ? '⏰ Vencida' : `⏳ ${display}`}
    </span>
  );
}

/* ========= RESERVAS ========= */
function Reservas({ reservas, data, user, toast, onGoNueva, onUpdateEstado }){
  const [tab, setTab] = useState('lista');
  const [q, setQ] = useState('');
  const canApprove = user.role==='admin' || user.role==='reservador';
  // Aprobadores arrancan en pendientes (las accionables); usuario ve todas las suyas
  const [estado, setEstado] = useState(canApprove ? 'pendiente' : '');

  // Subconjunto base: si es usuario, solo sus propias reservas
  const ownArr = useMemo(()=>{
    if(user.role==='usuario') return reservas.filter(r => r.co===user.email || r.creado_por===user.username);
    return reservas;
  },[reservas, user]);

  // Contadores por estado para los chips
  const counts = useMemo(()=>({
    pendiente: ownArr.filter(r=>r.es==='pendiente').length,
    aprobada:  ownArr.filter(r=>r.es==='aprobada').length,
    rechazada: ownArr.filter(r=>r.es==='rechazada').length,
    total:     ownArr.length,
  }),[ownArr]);

  const filtered = useMemo(()=>{
    return ownArr.filter(r =>
      (!q || (r.r||'').toLowerCase().includes(q.toLowerCase()) || (r.mo||'').toLowerCase().includes(q.toLowerCase()) || (r.do||'').toLowerCase().includes(q.toLowerCase())) &&
      (!estado || r.es===estado)
    ).sort((a,b)=>{
      // pendientes primero, luego por fecha desc
      if(a.es==='pendiente' && b.es!=='pendiente') return -1;
      if(b.es==='pendiente' && a.es!=='pendiente') return 1;
      return (b.fi||'').localeCompare(a.fi||'');
    });
  },[ownArr, q, estado]);

  const setEstadoReserva = async (id, nuevo) => {
    try {
      await onUpdateEstado(id, { es:nuevo, decidido_por:user.username, decidido_en:new Date().toISOString() });
      toast(`Reserva ${nuevo==='aprobada'?'aprobada':'rechazada'}.`);
    } catch(e){}
  };

  const fmtRel = (iso) => {
    if(!iso) return '';
    const d = new Date(iso);
    const diff = (Date.now() - d.getTime())/1000;
    if(diff < 60) return 'hace un instante';
    if(diff < 3600) return `hace ${Math.floor(diff/60)} min`;
    if(diff < 86400) return `hace ${Math.floor(diff/3600)} h`;
    if(diff < 86400*7) return `hace ${Math.floor(diff/86400)} d`;
    return d.toLocaleDateString('es-CL', {day:'2-digit',month:'short',year:'numeric'});
  };

  const stateChip = (v, count, label, cls) => (
    <button
      onClick={()=>setEstado(v)}
      className={`state-chip ${estado===v?'sel':''} ${cls}`}>
      <span>{label}</span><b>{count}</b>
    </button>
  );

  return (
    <div className="stack">
      <div className="row" style={{justifyContent:'space-between'}}>
        <div className="seg">
          <button className={tab==='lista'?'on':''} onClick={()=>setTab('lista')}>Listado de reservas</button>
          <button className={tab==='libres'?'on':''} onClick={()=>setTab('libres')}>{I.search}&nbsp;Buscar espacios libres</button>
        </div>
        {tab==='lista' && (
          <div className="chip info">{filtered.length} de {counts.total} {user.role==='usuario'?'(tuyas)':'totales'}</div>
        )}
      </div>

      {tab==='lista' && <>
        {/* Filtros chip-style por estado con contadores */}
        <div className="state-chips">
          {stateChip('pendiente', counts.pendiente, '⏳ Pendientes', 'warn')}
          {stateChip('aprobada',  counts.aprobada,  '✓ Aprobadas',  'success')}
          {stateChip('rechazada', counts.rechazada, '✗ Rechazadas', 'danger')}
          {stateChip('',          counts.total,     '📋 Todas',      'neutral')}
          <div style={{flex:1}}/>
          <div className="field" style={{margin:0,minWidth:240,maxWidth:320}}>
            <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar sala, motivo o docente…" style={{padding:'8px 12px'}}/>
          </div>
        </div>

        {/* Aviso para aprobadores cuando ya no hay pendientes */}
        {canApprove && estado==='pendiente' && counts.pendiente===0 && (
          <div className="card" style={{borderColor:'#C7E0CC',background:'#F6FCF8',padding:'16px 20px'}}>
            <div className="row" style={{gap:12}}>
              <span style={{fontSize:22}}>✓</span>
              <div>
                <b style={{color:'var(--success)'}}>No hay solicitudes pendientes</b>
                <div className="muted" style={{fontSize:12}}>Todo al día. Cambia el filtro para ver el historial de reservas decididas.</div>
              </div>
            </div>
          </div>
        )}

        <div className="card" style={{padding:0}}>
          <div className="tbl-scroll">
            <table className="tbl">
              <thead><tr>
                <th>Fecha</th><th>Horario</th><th>Sala</th><th>Motivo</th><th>Solicitante</th>
                <th title="SLA: tiempo para decidir / tiempo que tardó la decisión">⏱ SLA</th>
                <th>Estado</th><th style={{textAlign:'right'}}>Acciones</th>
              </tr></thead>
              <tbody>
                {filtered.map(r => {
                  const decidedMs = (r.decidido_en && r.creado_en) ? (new Date(r.decidido_en) - new Date(r.creado_en)) : null;
                  const timeCls = decidedMs==null ? '' : (decidedMs <= SLA_MS/2 ? 'fast' : (decidedMs <= SLA_MS ? 'slow' : 'over'));
                  return (
                  <tr key={r.id} className={r.es==='pendiente' ? 'row-pending' : ''}>
                    <td className="nowrap">{fmtFecha(r.fi)}{r.ff && r.ff!==r.fi ? ' → '+fmtFecha(r.ff) : ''}</td>
                    <td className="nowrap">{r.hi}–{r.hf}<div className="muted" style={{fontSize:11}}>Mód. {r.mi}–{r.mf}</div></td>
                    <td><b style={{color:'var(--primary)'}}>{r.r}</b></td>
                    <td style={{maxWidth:340}}>{r.mo}</td>
                    <td><div style={{fontSize:13}}>{r.do||'—'}</div><div className="muted" style={{fontSize:11}}>{r.co||r.ru}</div></td>
                    <td className="nowrap">
                      {r.es==='pendiente' && <Countdown creadoEn={r.creado_en}/>}
                      {r.es!=='pendiente' && decidedMs!=null && (
                        <span className={`time-pill ${timeCls}`} title={`Tardó ${fmtDuration(decidedMs)} en ${r.es==='aprobada'?'aprobarse':'rechazarse'}`}>
                          ⏱ {fmtDuration(decidedMs)}
                        </span>
                      )}
                      {r.es!=='pendiente' && decidedMs==null && <span className="muted" style={{fontSize:11}}>—</span>}
                    </td>
                    <td>
                      {r.es==='aprobada' && <span className="chip success">Aprobada</span>}
                      {r.es==='pendiente' && <span className="chip warn">Pendiente</span>}
                      {r.es==='rechazada' && <span className="chip danger">Rechazada</span>}
                      {r.es!=='pendiente' && r.decidido_por && (
                        <div className="muted" style={{fontSize:10.5,marginTop:4,lineHeight:1.3}}>
                          por <b>{r.decidido_por}</b>{r.decidido_en && <> · {fmtRel(r.decidido_en)}</>}
                        </div>
                      )}
                    </td>
                    <td className="nowrap" style={{textAlign:'right'}}>
                      {canApprove && r.es==='pendiente' && <>
                        <button className="btn btn-sm btn-success" onClick={()=>setEstadoReserva(r.id,'aprobada')}>{I.check}Aprobar</button>{' '}
                        <button className="btn btn-sm btn-danger" onClick={()=>setEstadoReserva(r.id,'rechazada')}>{I.x}Rechazar</button>
                      </>}
                      {!canApprove && r.es==='pendiente' && (r.creado_por===user.username || r.co===user.email) && (
                        <button className="btn btn-sm btn-ghost" onClick={()=>{
                          if(window.confirm('¿Cancelar tu solicitud? El recurso quedará libre nuevamente.')) setEstadoReserva(r.id,'rechazada');
                        }}>{I.x}Cancelar</button>
                      )}
                    </td>
                  </tr>
                  );
                })}
                {filtered.length===0 && counts.pendiente!==0 && <tr><td colSpan="8"><div className="empty"><span className="emoji">🗂</span>Sin reservas en este filtro.</div></td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      </>}

      {tab==='libres' && <BuscarLibres data={data} reservas={reservas} onGoNueva={onGoNueva}/>}
    </div>
  );
}

/* ========= BUSCAR ESPACIOS LIBRES ========= */
function BuscarLibres({ data, reservas, onGoNueva }){
  const [fecha, setFecha] = useState(isoDate(new Date()));
  const [mi, setMi] = useState(1);
  const [mf, setMf] = useState(2);
  const [tipo, setTipo] = useState('');
  const [capMin, setCapMin] = useState('');
  const [busqueda, setBusqueda] = useState(false);

  const tipos = useMemo(()=> [...new Set(data.salas.map(s=>s.tipo))].sort(), [data]);
  const dow = fechaToDow(fecha);
  const modIni = moduloInfo(data.modulos, mi);
  const modFin = moduloInfo(data.modulos, mf);

  const libres = useMemo(()=>{
    if(!busqueda) return null;
    const miN = Number(mi), mfN = Number(mf);
    const capN = Number(capMin)||0;
    return data.salas
      .filter(s => !tipo || s.tipo===tipo)
      .filter(s => !capN || (s.capacidad||0) >= capN)
      .map(s => {
        const acadConflict = sesionesEnFecha(data, fecha, s.codigo).some(p =>
          rangeOverlapsModules(p.hi, p.hf, miN, mfN, data.modulos)
        );
        if(acadConflict) return null;
        const resConflict = reservas.some(r =>
          r.r===s.codigo && r.fi===fecha && r.es!=='rechazada' &&
          miN <= Number(r.mf||0) && Number(r.mi||0) <= mfN
        );
        return resConflict ? null : s;
      })
      .filter(Boolean);
  },[busqueda, fecha, mi, mf, tipo, capMin, data, reservas, dow]);

  const buscar = () => {
    if(Number(mi) > Number(mf)){ alert('El módulo inicio debe ser ≤ módulo fin.'); return; }
    setBusqueda(true);
  };

  return (
    <>
      <div className="filters">
        <div className="field" style={{maxWidth:170}}>
          <label>Fecha</label>
          <input type="date" value={fecha} onChange={e=>{setFecha(e.target.value);setBusqueda(false)}}/>
        </div>
        <div className="field" style={{maxWidth:160}}>
          <label>Mód. inicio</label>
          <select value={mi} onChange={e=>{setMi(e.target.value);setBusqueda(false)}}>
            {data.modulos.map(m=> <option key={m.num} value={m.num}>Mód. {m.num} ({m.inicio})</option>)}
          </select>
        </div>
        <div className="field" style={{maxWidth:160}}>
          <label>Mód. fin</label>
          <select value={mf} onChange={e=>{setMf(e.target.value);setBusqueda(false)}}>
            {data.modulos.map(m=> <option key={m.num} value={m.num}>Mód. {m.num} ({m.fin})</option>)}
          </select>
        </div>
        <div className="field" style={{maxWidth:160}}>
          <label>Tipo</label>
          <select value={tipo} onChange={e=>{setTipo(e.target.value);setBusqueda(false)}}>
            <option value="">Cualquiera</option>
            {tipos.map(t=> <option key={t}>{t}</option>)}
          </select>
        </div>
        <div className="field" style={{maxWidth:140}}>
          <label>Capacidad mín.</label>
          <input type="number" value={capMin} onChange={e=>{setCapMin(e.target.value);setBusqueda(false)}} placeholder="0"/>
        </div>
        <div style={{alignSelf:'flex-end'}}>
          <button className="btn btn-primary" onClick={buscar}>{I.search}Buscar</button>
        </div>
      </div>

      <div className="card" style={{padding:'10px 16px'}}>
        <div className="row" style={{gap:14,flexWrap:'wrap',fontSize:13}}>
          <span className="muted">Consulta:</span>
          <b>{DIA_NOMBRES[dow]}</b>
          <b>{fmtFecha(fecha)}</b>
          <span className="muted">·</span>
          <span>{modIni?`Mód.${modIni.num} (${modIni.inicio})`:''} → {modFin?`Mód.${modFin.num} (${modFin.fin})`:''}</span>
          {tipo && <><span className="muted">·</span><span className="chip">{tipo}</span></>}
          {capMin && <><span className="muted">·</span><span className="chip">≥ {capMin} personas</span></>}
        </div>
      </div>

      {busqueda && libres && (
        libres.length===0 ? (
          <div className="empty"><span className="emoji">🚫</span>No hay salas disponibles para esos criterios.<br/>Prueba con otro horario, día o tipo.</div>
        ) : (
          <>
            <div className="row between"><div className="chip success" style={{fontSize:13,padding:'7px 14px'}}>{libres.length} sala(s) disponibles</div></div>
            <div className="grid" style={{gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:12}}>
              {libres.map(s => (
                <div key={s.codigo} className="free-card" onClick={()=> onGoNueva?.({sala:s.codigo,fecha,mi:Number(mi),mf:Number(mf)})}>
                  <div className="top">
                    <div>
                      <div className="code">{s.codigo}</div>
                      <div className="name">{s.nombre}</div>
                    </div>
                    <span className="chip success">Libre</span>
                  </div>
                  <div className="meta">
                    <span className="chip">{s.tipo}</span>
                    <span className="chip">Cap. {s.capacidad}</span>
                  </div>
                  <div className="muted" style={{fontSize:11.5}}>Resp.: {s.responsable}</div>
                </div>
              ))}
            </div>
          </>
        )
      )}
      {!busqueda && <div className="empty"><span className="emoji">🔎</span>Define los criterios y presiona <b>Buscar</b> para listar las salas libres.</div>}
    </>
  );
}

/* ========= NUEVA RESERVA ========= */
function NuevaReserva({ data, reservas, user, toast, goReservas, prefill, onCreate }){
  const [f, setF] = useState({
    fi: prefill?.fecha || isoDate(new Date()),
    ff: '',
    sala: prefill?.sala || '',
    mi: prefill?.mi || 1, mf: prefill?.mf || 2,
    motivo:'', todoSemestre:'NO', observacion:'',
    docente:user.nombre, correo:user.email, rut:''
  });
  const [filtros, setFiltros] = useState({ tipo:'', capMin:'', mostrarTodas:false });

  const tipos = useMemo(()=> [...new Set(data.salas.map(s=>s.tipo))].sort(), [data]);

  // Cálculo en vivo de salas libres / ocupadas para la fecha + módulos
  const evaluacion = useMemo(()=>{
    const libres = []; const ocupadas = [];
    if(!f.fi){ return { libres, ocupadas }; }
    const dow = fechaToDow(f.fi);
    const miN = Number(f.mi), mfN = Number(f.mf);
    const capN = Number(filtros.capMin)||0;
    for(const s of data.salas){
      if(filtros.tipo && s.tipo!==filtros.tipo) continue;
      if(capN && (s.capacidad||0) < capN) continue;
      const acad = sesionesEnFecha(data, f.fi, s.codigo).find(p =>
        rangeOverlapsModules(p.hi, p.hf, miN, mfN, data.modulos)
      );
      const res = reservas.find(r =>
        r.r===s.codigo && r.fi===f.fi && r.es!=='rechazada' &&
        miN <= Number(r.mf||0) && Number(r.mi||0) <= mfN
      );
      if(acad || res){
        const esPendiente = !!res && res.es==='pendiente';
        ocupadas.push({
          sala: s,
          motivo: acad
            ? `Clase regular: ${(acad.a||'').slice(0,40)} (${acad.hi}–${acad.hf})`
            : `Reserva ${esPendiente?'PENDIENTE de autorización':'aprobada'}: ${(res.mo||'').slice(0,40)} (Mód.${res.mi}–${res.mf})`,
          tipo: acad ? 'académica' : (esPendiente ? 'pendiente' : 'reserva'),
          esPendiente,
          esPropia: !!res && (res.creado_por===user.username || res.co===user.email),
          reservaId: res?.id,
        });
      } else {
        libres.push(s);
      }
    }
    return { libres, ocupadas };
  },[f.fi, f.mi, f.mf, filtros, data, reservas, user]);

  const dow = f.fi ? fechaToDow(f.fi) : 0;
  const modIni = moduloInfo(data.modulos, f.mi);
  const modFin = moduloInfo(data.modulos, f.mf);
  const salaSel = f.sala ? data.salas.find(s => s.codigo===f.sala) : null;
  const conflictoSel = useMemo(()=>{
    if(!f.sala) return null;
    return evaluacion.ocupadas.find(o => o.sala.codigo===f.sala) || null;
  },[f.sala, evaluacion]);

  const submit = () => {
    if(!f.sala) return toast('Selecciona una sala disponible.');
    if(!f.motivo) return toast('Indica el motivo de la reserva.');
    if(Number(f.mi) > Number(f.mf)) return toast('El módulo inicio debe ser ≤ módulo fin.');
    if(conflictoSel){
      // Hard-block para usuario; pendientes bloquean a TODOS los roles para evitar topes
      if(conflictoSel.esPendiente){
        if(conflictoSel.esPropia){
          return toast('Ya tienes una solicitud PENDIENTE para esa sala/horario. Cancélala primero desde Reservas.');
        }
        return toast(`No se puede reservar: existe una solicitud PENDIENTE de autorización para esa sala/horario. Resuélvela primero (aprobar o rechazar) antes de crear otra.`);
      }
      if(user.role==='usuario'){
        return toast(`No se puede reservar: la sala ya tiene un compromiso (${conflictoSel.motivo}).`);
      }
      // admin/reservador: solo conflictos con clase regular o reserva aprobada pueden forzarse
      if(!window.confirm(`⚠ Conflicto detectado: ${conflictoSel.motivo}\n\n¿Deseas forzar la reserva de todas formas? (acción excepcional)`)) return;
    }
    const nuevo = {
      fi: f.fi, ff: f.ff || f.fi,
      hi: modIni?.inicio || '',
      hf: modFin?.fin || '',
      mi: Number(f.mi), mf: Number(f.mf),
      r: f.sala, ts: f.todoSemestre,
      mo: f.motivo, do: f.docente, ru: f.rut, co: f.correo,
      observacion: f.observacion,
      es: user.role==='admin' || user.role==='reservador' ? 'aprobada' : 'pendiente',
      creado_por: user.username, creado_en: new Date().toISOString(),
    };
    (async () => {
      try {
        await onCreate(nuevo);
        toast(nuevo.es==='aprobada' ? 'Reserva creada y aprobada.' : 'Solicitud enviada. Pendiente de autorización.');
        goReservas?.();
      } catch(e){}
    })();
  };

  return (
    <div className="stack">
      {/* PASO 1 — Cuándo */}
      <div className="card">
        <div className="card-header">
          <div>
            <h3><span className="step-num">1</span>¿Cuándo necesitas la sala?</h3>
            <div className="sub">Elige fecha y rango de módulos. El sistema buscará automáticamente los recintos disponibles.</div>
          </div>
        </div>
        <div className="grid" style={{gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:12}}>
          <div className="field"><label>Fecha</label><input type="date" value={f.fi} onChange={e=>setF({...f,fi:e.target.value,sala:''})}/></div>
          <div className="field"><label>Hasta (opcional)</label><input type="date" value={f.ff} onChange={e=>setF({...f,ff:e.target.value})}/></div>
          <div className="field"><label>Módulo inicio</label>
            <select value={f.mi} onChange={e=>setF({...f,mi:Number(e.target.value),sala:''})}>
              {data.modulos.map(m=> <option key={m.num} value={m.num}>Mód. {m.num} ({m.inicio})</option>)}
            </select>
          </div>
          <div className="field"><label>Módulo fin</label>
            <select value={f.mf} onChange={e=>setF({...f,mf:Number(e.target.value),sala:''})}>
              {data.modulos.map(m=> <option key={m.num} value={m.num}>Mód. {m.num} ({m.fin})</option>)}
            </select>
          </div>
          <div className="field"><label>Tipo de recinto</label>
            <select value={filtros.tipo} onChange={e=>setFiltros({...filtros,tipo:e.target.value})}>
              <option value="">Cualquiera</option>
              {tipos.map(t=> <option key={t}>{t}</option>)}
            </select>
          </div>
          <div className="field"><label>Capacidad mínima</label><input type="number" value={filtros.capMin} onChange={e=>setFiltros({...filtros,capMin:e.target.value})} placeholder="Ej: 30"/></div>
        </div>
        <div className="row" style={{gap:12,fontSize:13,marginTop:14,paddingTop:14,borderTop:'1px solid var(--border-soft)',flexWrap:'wrap'}}>
          <span className="muted">Disponibilidad para</span>
          <b>{DIA_NOMBRES[dow]}, {fmtFecha(f.fi)}</b>
          <span className="muted">·</span>
          <b>{modIni?.inicio} – {modFin?.fin}</b>
          <span style={{flex:1}}/>
          <span className="chip success">{evaluacion.libres.length} libres</span>
          <span className="chip danger">{evaluacion.ocupadas.length} ocupadas</span>
        </div>
      </div>

      {/* PASO 2 — Elegir sala */}
      <div className="card">
        <div className="card-header">
          <div>
            <h3><span className="step-num">2</span>Elige una sala disponible</h3>
            <div className="sub">Cards en verde = libres en ese horario. Click para seleccionar.</div>
          </div>
          <div className="seg">
            <button className={!filtros.mostrarTodas?'on':''} onClick={()=>setFiltros({...filtros,mostrarTodas:false})}>Solo libres</button>
            <button className={filtros.mostrarTodas?'on':''} onClick={()=>setFiltros({...filtros,mostrarTodas:true})}>Mostrar ocupadas</button>
          </div>
        </div>

        {evaluacion.libres.length===0 && !filtros.mostrarTodas && (
          <div className="empty"><span className="emoji">🚫</span>No hay salas libres con esos criterios.<br/>Cambia el horario, día o filtros, o activa "Mostrar ocupadas" para ver por qué.</div>
        )}

        {(evaluacion.libres.length>0 || filtros.mostrarTodas) && (
          <div className="grid" style={{gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:10}}>
            {evaluacion.libres.map(s => (
              <div key={s.codigo}
                className={`sala-pick ${f.sala===s.codigo?'sel':''}`}
                onClick={()=>setF({...f,sala:s.codigo})}>
                <div className="top">
                  <div className="code">{s.codigo}</div>
                  <span className="chip success">Libre</span>
                </div>
                <div className="name">{(s.nombre||'').slice(0,60)}</div>
                <div className="meta">
                  <span className="chip">{s.tipo}</span>
                  <span className="chip">Cap. {s.capacidad}</span>
                </div>
              </div>
            ))}
            {filtros.mostrarTodas && evaluacion.ocupadas.map(({sala:s, motivo, tipo, esPendiente, esPropia}) => (
              <div key={s.codigo} className={`sala-pick ocupada ${esPendiente?'pendiente':''}`} title={motivo}>
                <div className="top">
                  <div className="code" style={{color:'var(--text-muted)'}}>{s.codigo}</div>
                  <span className={`chip ${esPendiente?'warn':'danger'}`}>
                    {tipo==='académica' ? 'Clase' : (esPendiente ? '⏳ Pendiente' : '📌 Reserva')}
                  </span>
                </div>
                <div className="name">{(s.nombre||'').slice(0,60)}</div>
                <div className="meta" style={{fontSize:10.5,color:'var(--text-soft)'}}>{motivo.slice(0,70)}{esPropia ? ' · tuya' : ''}</div>
              </div>
            ))}
          </div>
        )}

        <div className="field" style={{marginTop:14,maxWidth:520}}>
          <label>O elige por código (incluso si está ocupada — el admin/reservador podrá forzar)</label>
          <select value={f.sala} onChange={e=>setF({...f,sala:e.target.value})}>
            <option value="">— Selecciona una sala del listado superior o por código —</option>
            {data.salas.map(s=> <option key={s.codigo} value={s.codigo}>{s.codigo} — {(s.nombre||'').slice(0,46)} (cap. {s.capacidad})</option>)}
          </select>
        </div>
      </div>

      {/* PASO 3 — Detalles (solo si hay sala) */}
      {salaSel && (() => {
        const cf = conflictoSel;
        const isPend = cf?.esPendiente;
        const borderCol = !cf ? '#C7E0CC' : (isPend ? '#F5D680' : '#F4D2D2');
        const bgCol    = !cf ? '#F6FCF8' : (isPend ? '#FEFAEA' : '#FDF7F7');
        const textCol  = !cf ? 'var(--success)' : (isPend ? 'var(--warning)' : 'var(--danger)');
        const icon     = !cf ? '✓ ' : (isPend ? '⏳ ' : '⚠ ');
        const titleTxt = !cf ? 'Sala seleccionada' : (isPend ? 'Sala con reserva pendiente' : 'Sala con conflicto');
        return (<>
          <div className="card" style={{borderColor:borderCol, background:bgCol}}>
            <div className="card-header">
              <div>
                <h3 style={{color:textCol}}>
                  {icon}{titleTxt}: <b style={{color:'var(--primary)'}}>{salaSel.codigo}</b>
                </h3>
                <div className="sub">{salaSel.nombre}</div>
              </div>
              <button className="btn-icon" title="Quitar selección" onClick={()=>setF({...f,sala:''})}>{I.x}</button>
            </div>
            <div className="row" style={{gap:18,flexWrap:'wrap',fontSize:13}}>
              <div><div className="muted" style={{fontSize:11,textTransform:'uppercase',letterSpacing:.4}}>Tipo</div><span className="chip">{salaSel.tipo}</span></div>
              <div><div className="muted" style={{fontSize:11,textTransform:'uppercase',letterSpacing:.4}}>Capacidad</div><b>{salaSel.capacidad}</b></div>
              <div><div className="muted" style={{fontSize:11,textTransform:'uppercase',letterSpacing:.4}}>Responsable</div>{salaSel.responsable}</div>
              <div><div className="muted" style={{fontSize:11,textTransform:'uppercase',letterSpacing:.4}}>Horario</div><b>{modIni?.inicio} – {modFin?.fin}</b></div>
            </div>
            {cf && (
              <div className={`chip ${isPend?'warn':'danger'}`} style={{marginTop:12,padding:'10px 14px',fontSize:13}}>
                {cf.motivo}{isPend && cf.esPropia ? ' · Es tu propia solicitud' : ''}
              </div>
            )}
            {cf && isPend && (
              <div className="login-hint" style={{marginTop:10,fontSize:12}}>
                Las solicitudes pendientes <b>bloquean</b> el recurso hasta ser aprobadas o rechazadas para evitar topes.
                {cf.esPropia && ' Puedes cancelarla desde la pestaña Reservas.'}
              </div>
            )}
          </div>

          <div className="card">
            <div className="card-header">
              <div>
                <h3><span className="step-num">3</span>Datos de la solicitud</h3>
                <div className="sub">Información del responsable y motivo de la reserva</div>
              </div>
            </div>
            <div className="field"><label>Motivo *</label><input value={f.motivo} onChange={e=>setF({...f,motivo:e.target.value})} placeholder="Recuperación de clase, reunión, evento…"/></div>
            <div className="field"><label>Observación</label><textarea value={f.observacion} onChange={e=>setF({...f,observacion:e.target.value})}/></div>
            <div className="col-2">
              <div className="field"><label>Docente / Colaborador</label><input value={f.docente} onChange={e=>setF({...f,docente:e.target.value})}/></div>
              <div className="field"><label>RUT / ID</label><input value={f.rut} onChange={e=>setF({...f,rut:e.target.value})}/></div>
            </div>
            <div className="col-2">
              <div className="field"><label>Correo</label><input value={f.correo} onChange={e=>setF({...f,correo:e.target.value})}/></div>
              <div className="field"><label>¿Todo el semestre?</label>
                <select value={f.todoSemestre} onChange={e=>setF({...f,todoSemestre:e.target.value})}>
                  <option>NO</option><option>SI</option>
                </select>
              </div>
            </div>
            <div className="row" style={{justifyContent:'flex-end',marginTop:14,gap:10}}>
              <button className="btn btn-ghost" onClick={()=>setF({...f,sala:''})}>Cambiar sala</button>
              <button className="btn btn-primary" onClick={submit}>{I.check}Enviar solicitud</button>
            </div>
          </div>
        </>);
      })()}
    </div>
  );
}

/* ========= USUARIOS ========= */
function Usuarios({ users, toast, onCreate, onUpdate, onDelete }){
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({id:null,username:'',nombre:'',email:'',password:'',role:'usuario',activo:true});
  const [pwdForm, setPwdForm] = useState({id:null, username:'', password:'', confirm:''});

  const resetForm = () => setForm({id:null,username:'',nombre:'',email:'',password:'',role:'usuario',activo:true});

  const add = async () => {
    if(!form.username||!form.password||!form.nombre) return toast('Completa los campos requeridos.');
    if(users.some(u=>u.username===form.username)) return toast('Ese usuario ya existe.');
    try {
      const { id, ...rest } = form;
      await onCreate(rest);
      resetForm(); setModal(null); toast('Usuario creado.');
    } catch(e){}
  };
  const update = async () => {
    if(!form.nombre) return toast('El nombre es obligatorio.');
    try {
      await onUpdate(form.id, { nombre:form.nombre, email:form.email, role:form.role, activo:form.activo });
      resetForm(); setModal(null); toast('Usuario actualizado.');
    } catch(e){}
  };
  const resetPassword = async () => {
    if(!pwdForm.password || pwdForm.password.length<4) return toast('La contraseña debe tener al menos 4 caracteres.');
    if(pwdForm.password!==pwdForm.confirm) return toast('Las contraseñas no coinciden.');
    try {
      await onUpdate(pwdForm.id, { password:pwdForm.password });
      setPwdForm({id:null,username:'',password:'',confirm:''}); setModal(null);
      toast('Contraseña actualizada.');
    } catch(e){}
  };
  const del = async (id) => {
    if(!window.confirm('¿Eliminar usuario?')) return;
    try { await onDelete(id); toast('Usuario eliminado.'); } catch(e){}
  };
  const toggle = async (id, current) => {
    try { await onUpdate(id, { activo: !current }); } catch(e){}
  };
  const startEdit = (u) => { setForm({...u, password:''}); setModal('edit'); };
  const startPwd = (u) => { setPwdForm({id:u.id, username:u.username, password:'', confirm:''}); setModal('pwd'); };

  return (
    <div className="stack">
      <div className="filters">
        <div className="muted" style={{fontSize:13}}>{users.length} usuarios en el sistema · El administrador puede asignar y resetear contraseñas</div>
        <div style={{marginLeft:'auto'}}>
          <button className="btn btn-primary" onClick={()=>{resetForm();setModal('add')}}>{I.plus}Nuevo usuario</button>
        </div>
      </div>
      <div className="card" style={{padding:0}}>
        <table className="tbl">
          <thead><tr><th>Usuario</th><th>Nombre</th><th>Correo</th><th>Rol</th><th>Estado</th><th style={{textAlign:'right'}}>Acciones</th></tr></thead>
          <tbody>
            {users.map(u=>(
              <tr key={u.id}>
                <td><b>{u.username}</b></td>
                <td>{u.nombre}</td>
                <td className="muted">{u.email}</td>
                <td><span className="chip info">{ROLES[u.role].label}</span></td>
                <td>{u.activo ? <span className="chip success">Activo</span> : <span className="chip danger">Inactivo</span>}</td>
                <td className="nowrap" style={{textAlign:'right'}}>
                  <button className="btn btn-sm btn-ghost" onClick={()=>toggle(u.id, u.activo)}>{u.activo?'Desactivar':'Activar'}</button>{' '}
                  <button className="btn-icon" onClick={()=>startEdit(u)} title="Editar">{I.edit}</button>
                  <button className="btn-icon" onClick={()=>startPwd(u)} title="Asignar contraseña">{I.key}</button>
                  <button className="btn-icon" onClick={()=>del(u.id)} title="Eliminar">{I.trash}</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {(modal==='add' || modal==='edit') && (
        <Modal title={modal==='add'?'Crear usuario':`Editar usuario ${form.username}`} onClose={()=>{setModal(null);resetForm()}} onSave={modal==='add'?add:update}>
          <div className="col-2">
            <div className="field"><label>Usuario</label><input value={form.username} onChange={e=>modal==='add' && setForm({...form,username:e.target.value})} disabled={modal==='edit'}/></div>
            {modal==='add' && <div className="field"><label>Contraseña</label><input type="password" value={form.password} onChange={e=>setForm({...form,password:e.target.value})} placeholder="Mínimo 4 caracteres"/></div>}
            {modal==='edit' && <div className="field"><label>Estado</label>
              <select value={form.activo?'1':'0'} onChange={e=>setForm({...form,activo:e.target.value==='1'})}>
                <option value="1">Activo</option><option value="0">Inactivo</option>
              </select>
            </div>}
          </div>
          <div className="field"><label>Nombre completo</label><input value={form.nombre} onChange={e=>setForm({...form,nombre:e.target.value})}/></div>
          <div className="col-2">
            <div className="field"><label>Correo</label><input value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/></div>
            <div className="field"><label>Rol</label>
              <select value={form.role} onChange={e=>setForm({...form,role:e.target.value})}>
                {Object.entries(ROLES).map(([k,v])=> <option key={k} value={k}>{v.label}</option>)}
              </select>

        )}
      </div>

      {preview && (
        <div className="card">
          <div className="card-header">
            <div><h3>Vista previa de la importación</h3><div className="sub">{preview.nombre}</div></div>
          </div>
          <div className="grid grid-4" style={{marginBottom:18}}>
            <div className="kpi kpi-blue"><span className="label">Sesiones</span><span className="value">{preview.sesiones.toLocaleString('es-CL')}</span><div className="icon">{I.prog}</div></div>
            <div className="kpi kpi-green"><span className="label">Salas únicas</span><span className="value">{preview.salasUnicas}</span><div className="icon">{I.salas}</div></div>
            <div className="kpi kpi-amber"><span className="label">Escuelas</span><span className="value">{preview.escuelas}</span><div className="icon">{I.reports}</div></div>
            <div className="kpi kpi-red"><span className="label">Salas nuevas</span><span className="value">{preview.salas.filter(s=>!data.salas.some(x=>x.codigo===s.codigo)).length}</span><div className="icon">{I.plus}</div></div>
          </div>

          <div className="field" style={{maxWidth:380}}>
            <label>Modo de carga</label>
            <select value={reemplazar?'1':'0'} onChange={e=>setReemplazar(e.target.value==='1')}>
              <option value="1">Reemplazar toda la programación actual (recomendado)</option>
              <option value="0">Agregar a la programación existente</option>
            </select>
          </div>

          <div className="card-header" style={{marginTop:10}}>
            <div><h3 style={{fontSize:14}}>Primeras 8 sesiones detectadas</h3></div>
          </div>
          <div className="tbl-scroll" style={{maxHeight:260}}>
            <table className="tbl">
              <thead><tr><th>Sala</th><th>Asignatura</th><th>Sección</th><th>Días</th><th>Horario</th><th>Docente</th></tr></thead>
              <tbody>
                {preview.prog.slice(0,8).map((p,i)=>(
                  <tr key={i}>
                    <td><b style={{color:'var(--primary)'}}>{p.s}</b></td>
                    <td style={{maxWidth:240}}>{p.a}</td>
                    <td className="muted">{p.sc}</td>
                    <td>{[...p.dw].map((b,j)=>b==='1'?DIA_CORTO[j]:null).filter(Boolean).join(' · ')}</td>
                    <td>{p.hi}–{p.hf}</td>
                    <td>{p.d}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <div className="row" style={{justifyContent:'flex-end',marginTop:16,gap:10}}>
            <button className="btn btn-ghost" onClick={()=>{setPreview(null);setArchivo(null)}}>Cancelar</button>
            <button className="btn btn-primary" onClick={aplicar}>{I.check}Aplicar importación</button>
          </div>
        </div>
      )}

      {/* Verificador post-importación: sanity check del mapeo SABANA → dw */}
      {(data.programacion||[]).length > 0 && <VerificadorSabana data={data}/>}
    </div>
  );
}

/* ========= IMPORTAR LISTA DE RECURSOS =========
   Lee un Excel de "recursos por eventos": una fila por clase real con fecha
   exacta. Columnas:
   A=sección, B=tipo recurso, D=código sala, E=denom sala, F=fecha (F=G),
   H=hora inicio, I=hora fin, K=denom evento, N=código evento, R='G' (sala). */
function ImportarRecursos({ data, toast, onReplace, isCloud }){
  const [parsing, setParsing] = useState(false);
  const [preview, setPreview] = useState(null);
  const [archivo, setArchivo] = useState(null);
  const [reemplazar, setReemplazar] = useState(true);

  const fmtHora = (v) => {
    if(v==null) return '';
    if(typeof v==='string') return v.slice(0,5);
    if(v instanceof Date){
      const h=String(v.getHours()).padStart(2,'0');
      const m=String(v.getMinutes()).padStart(2,'0');
      return `${h}:${m}`;
    }
    if(typeof v==='number'){
      const totalMin = Math.round(v*24*60);
      const h=String(Math.floor(totalMin/60)).padStart(2,'0');
      const m=String(totalMin%60).padStart(2,'0');
      return `${h}:${m}`;
    }
    return String(v).slice(0,5);
  };
  const fmtIso = (v) => {
    if(!v) return '';
    if(v instanceof Date) return isoDate(v);
    if(typeof v==='string') return v.slice(0,10);
    return '';
  };
  const tipoFromDen = (den) => {
    const d = (den||'').toUpperCase();
    if(d.includes('LABORATORIO') || d.includes('LAB')) return 'Laboratorio';
    if(d.includes('TALLER')) return 'Taller';
    if(d.includes('AUDIT')) return 'Auditorio';
    if(d.includes('GIMNASIO') || d.includes('GIM')) return 'Gimnasio';
    if(d.includes('PISC')) return 'Piscina';
    if(d.includes('CANCHA') || d.includes('COMPLEJO') || d.includes('FUT')) return 'Cancha';
    if(d.includes('ESTUDIO')) return 'Estudio';
    if(d.includes('REUNIONES') || d.includes('NEGOCIOS')) return 'Reunion';
    return 'Sala';
  };

  const onFile = async (e) => {
    const f = e.target.files?.[0];
    if(!f) return;
    setArchivo(f); setParsing(true); setPreview(null);
    try {
      const ab = await f.arrayBuffer();
      const wb = XLSX.read(ab, { type:'array', cellDates:true });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { header:1, defval:null, blankrows:false });
      if(rows.length < 2) throw new Error('La hoja está vacía o no tiene encabezados.');

      // La primera fila es header. Las restantes son datos.
      const dataRows = rows.slice(1);

      const nuevasSalas = new Map();
      const nuevosEventos = [];
      const seccionesSet = new Set();
      const fechas = new Set();
      let descartadasNoG = 0, descartadasIncompletas = 0;

      for(const row of dataRows){
        if(!row) continue;
        const tipoRec = row[17]; // col R
        if(tipoRec !== 'G'){ descartadasNoG++; continue; }
        const aula = row[3];    // col D
        const fechaCl = row[5]; // col F
        const hInic = row[7];   // col H
        const hFin  = row[8];   // col I
        if(!aula || !fechaCl || !hInic || !hFin){ descartadasIncompletas++; continue; }
        const fi = fmtIso(fechaCl);
        const hi = fmtHora(hInic);
        const hf = fmtHora(hFin);
        if(!fi || !hi || !hf){ descartadasIncompletas++; continue; }

        const den = row[4]; // col E (denom sala)
        if(!nuevasSalas.has(aula)){
          nuevasSalas.set(aula, {
            codigo: String(aula),
            nombre: den ? String(den) : String(aula),
            capacidad: 0,
            tipo: tipoFromDen(den),
            responsable: 'Por asignar',
          });
        }
        const sc = row[0] ? String(row[0]) : '';
        if(sc) seccionesSet.add(sc);
        fechas.add(fi);
        nuevosEventos.push({
          s:  String(aula),
          sc,
          tr: row[1] ? String(row[1]) : '',
          de: row[10] ? String(row[10]) : '',
          ev: row[13]!=null ? String(row[13]) : '',
          fi, hi, hf,
        });
      }

      if(!nuevosEventos.length) throw new Error('No se encontraron filas válidas con tipo de recurso "G" (sala).');

      // Rango de fechas
      const fechasArr = [...fechas].sort();
      const rango = fechasArr.length
        ? { desde: fechasArr[0], hasta: fechasArr[fechasArr.length-1] }
        : null;

      setPreview({
        nombre: f.name,
        sesiones: nuevosEventos.length,
        salasUnicas: nuevasSalas.size,
        secciones: seccionesSet.size,
        fechasUnicas: fechas.size,
        descartadasNoG, descartadasIncompletas,
        rango,
        salas: [...nuevasSalas.values()],
        eventos: nuevosEventos,
      });
    } catch(err){
      console.error(err);
      toast('Error al leer el archivo: '+err.message);
    } finally {
      setParsing(false);
    }
  };

  // Progreso de subida (para que el usuario vea avance en móvil).
  // autoAttempt / autoMax aparecen cuando el loop auto-resume está activo.
  const [progress, setProgress] = useState(null);
  const onProgress = (done, total) => setProgress(p => ({ ...(p||{}), done, total }));

  // Flag de cancelación para el botón "Detener" durante el auto-resume.
  const stopRef = useRef(false);

  // Loop que reintenta automáticamente una subida fallida hasta MAX veces.
  // Después del primer intento, los siguientes son siempre con resume=true.
  // Si el error es "recuperable" (red, fetch, chunk) sigue intentando.
  // Si el usuario apreta "Detener", aborta sin reintentar.
  const MAX_AUTO_RESUME = 15;
  const runWithAutoResume = async (uploadFn, { isResume = false } = {}) => {
    let auto = 0;
    let resume = isResume;
    while(true){
      if(stopRef.current) throw new Error('Subida detenida por el usuario.');
      try {
        await uploadFn(resume);
        return;
      } catch(e){
        if(stopRef.current) throw new Error('Subida detenida por el usuario.');
        const recoverable = /failed to fetch|networkerror|network|timeout|chunk/i.test(e.message || '');
        if(!recoverable || auto >= MAX_AUTO_RESUME){
          // No recuperable o se agotaron los reintentos
          throw new Error(`${e.message}${auto>0?` (después de ${auto} reintentos automáticos)`:''}`);
        }
        auto++;
        resume = true;
        setProgress(p => ({ ...(p||{}), autoAttempt: auto, autoMax: MAX_AUTO_RESUME }));
        // Espera 5 segundos antes del siguiente intento
        for(let s=0; s<5; s++){
          if(stopRef.current) throw new Error('Subida detenida por el usuario.');
          await new Promise(r => setTimeout(r, 1000));
        }
      }
    }
  };

  const aplicar = async () => {
    if(!preview) return;
    if(!window.confirm(`Se ${reemplazar?'REEMPLAZARÁ':'AGREGARÁ a'} la lista de eventos con ${preview.sesiones} sesiones. ¿Continuar?`)) return;
    const salasNuevas = preview.salas.filter(s => !data.salas.some(x=>x.codigo===s.codigo));
    const eventosFinal = reemplazar ? preview.eventos : [...(data.eventos||[]), ...preview.eventos];
    setProgress({ done:0, total:eventosFinal.length });
    stopRef.current = false;
    try {
      await runWithAutoResume(
        async (isResume) => { await onReplace(eventosFinal, salasNuevas, { onProgress, resume: isResume }); }
      );
      toast(`LISTA DE RECURSOS importada: ${preview.sesiones} sesiones cargadas.`);
      setPreview(null); setArchivo(null);
    } catch(e){
      toast('Error al importar: '+e.message);
    } finally { setProgress(null); stopRef.current = false; }
  };

  // Carga el snapshot empaquetado en /data/eventos.json (el archivo que
  // adjuntó el usuario, pre-parseado). Útil cuando se opera desde el móvil
  // y no se puede subir el Excel.
  const [seedingRepo, setSeedingRepo] = useState(false);
  const cargarDesdeRepo = async ({ resume = false } = {}) => {
    const yaCargado = (data.eventos||[]).length;
    const mensaje = resume
      ? `Se REANUDARÁ la subida desde la fila ${yaCargado+1} (ya hay ${yaCargado.toLocaleString('es-CL')} en BD). Total: 71.833 sesiones. Si falla un chunk, se reintentará automáticamente. ¿Continuar?`
      : `Se REEMPLAZARÁ la lista de eventos con el snapshot empaquetado en el repositorio (71.833 sesiones · semestre 2026·1). Si la red corta, se retomará automáticamente. ¿Continuar?`;
    if(!window.confirm(mensaje)) return;
    setSeedingRepo(true);
    stopRef.current = false;
    try {
      const r = await fetch('./data/eventos.json');
      if(!r.ok) throw new Error(`HTTP ${r.status}`);
      const eventos = await r.json();
      setProgress({ done: resume ? yaCargado : 0, total: eventos.length });
      await runWithAutoResume(
        async (isResume) => { await onReplace(eventos, [], { onProgress, resume: isResume }); },
        { isResume: resume }
      );
      toast(`Snapshot cargado: ${eventos.length.toLocaleString('es-CL')} sesiones.`);
    } catch(e){
      const cancelado = /detenida/.test(e.message);
      toast(cancelado ? 'Subida detenida.' : ('Error: '+e.message+' · Vuelve a tocar "Cargar snapshot" para reintentar.'));
    } finally { setSeedingRepo(false); setProgress(null); stopRef.current = false; }
  };

  return (
    <div className="stack">
      <div className="card">
        <div className="card-header">
          <div>
            <h3>Importar LISTA DE RECURSOS desde Excel</h3>
            <div className="sub">Archivo .xlsx/.xls con una fila por sesión real. Se leen las columnas: <b>A</b> sección · <b>B</b> tipo recurso · <b>D</b> sala · <b>E</b> denom. sala · <b>F</b> fecha · <b>H/I</b> hora inicio/fin · <b>K</b> denom. evento · <b>N</b> código evento. Se filtran solo filas con <b>R='G'</b> (recurso=sala).</div>
          </div>
          {data._recursosInfo && <span className="chip success">Última carga: {data._recursosInfo.archivo || `${data._recursosInfo.sesiones} sesiones`}</span>}
        </div>

        <div className="upload-zone" onClick={()=>document.getElementById('recursos-file').click()}>
          {I.upload}
          <h4>Selecciona el archivo Excel</h4>
          <p className="muted">Formato: "recursos por eventos" exportado del sistema académico</p>
          <input id="recursos-file" type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={onFile}/>
          {parsing && <div style={{marginTop:10}}>Procesando…</div>}
          {archivo && !parsing && <div style={{marginTop:10,fontSize:12}}>📄 {archivo.name}</div>}
        </div>

        <div style={{marginTop:14,padding:12,background:'#EAF2FE',borderRadius:8,border:'1px solid #C4D2EA'}}>
          <div className="row between" style={{gap:12,flexWrap:'wrap'}}>
            <div style={{flex:1,minWidth:240}}>
              <b style={{fontSize:13}}>📦 Snapshot empaquetado (semestre 2026·1)</b>
              <div className="muted" style={{fontSize:11.5,marginTop:2}}>
                Subimos al repo el archivo <code>recursos_2104.xlsx</code> pre-parseado (71.833 sesiones). Útil si estás en el celular y no puedes adjuntar Excel.
                {(data.eventos||[]).length > 0 && (data.eventos||[]).length < 71833 && (
                  <div style={{marginTop:6,color:'var(--warning)',fontWeight:600}}>
                    ⚠ Tienes {(data.eventos||[]).length.toLocaleString('es-CL')} sesiones en BD (subida incompleta). Usa <b>Continuar subida</b> para retomar desde la fila {(data.eventos||[]).length+1}.
                  </div>
                )}
              </div>
            </div>
            <div className="row" style={{gap:8,flexWrap:'wrap'}}>
              {(data.eventos||[]).length > 0 && (data.eventos||[]).length < 71833 && (
                <button className="btn btn-success" onClick={()=>cargarDesdeRepo({resume:true})} disabled={seedingRepo || !!progress}>
                  ▶ Continuar subida
                </button>
              )}
              <button className="btn btn-primary" onClick={()=>cargarDesdeRepo()} disabled={seedingRepo || !!progress}>
                {seedingRepo || progress ? 'Cargando…' : 'Cargar snapshot al portal'}
              </button>
            </div>
          </div>
        </div>

        {/* Barra de progreso de la subida (chunks reintentables + auto-resume) */}
        {progress && (
          <div style={{marginTop:14,padding:14,background:'var(--surface-2)',borderRadius:8,border:'1px solid var(--border-soft)'}}>
            <div className="row between" style={{marginBottom:8,flexWrap:'wrap',gap:8}}>
              <div>
                <b style={{fontSize:13}}>{progress.autoAttempt ? '🔄 Reanudando subida…' : 'Subiendo a la base de datos…'}</b>
                {progress.autoAttempt && (
                  <div style={{fontSize:11,color:'var(--warning)',marginTop:2}}>
                    Auto-reintento {progress.autoAttempt}/{progress.autoMax} · esperando 5s antes de retomar
                  </div>
                )}
              </div>
              <div className="row" style={{gap:10,alignItems:'center'}}>
                <span style={{fontWeight:700,fontSize:13,color:'var(--primary-2)'}}>
                  {progress.done.toLocaleString('es-CL')} / {progress.total.toLocaleString('es-CL')} ({Math.round(progress.done/progress.total*100)}%)
                </span>
                <button className="btn btn-ghost" style={{padding:'4px 10px',fontSize:11}} onClick={()=>{stopRef.current=true;}}>
                  ✕ Detener
                </button>
              </div>
            </div>
            <div style={{height:12,background:'var(--border-soft)',borderRadius:6,overflow:'hidden'}}>
              <div style={{height:'100%',width:`${Math.round(progress.done/progress.total*100)}%`,background:progress.autoAttempt?'linear-gradient(90deg,var(--warning),#F5D680)':'linear-gradient(90deg,var(--primary),var(--primary-2))',transition:'width .3s'}}/>
            </div>
            <div className="muted" style={{fontSize:11,marginTop:6}}>
              Chunks de 1.000 filas con 5 reintentos automáticos cada uno. Si la red corta entre chunks, se reanuda solo desde donde quedó (hasta {MAX_AUTO_RESUME} veces). No necesitas hacer nada, solo no cerrar la pestaña.
            </div>
          </div>
        )}

        <div className="login-hint" style={{marginTop:14}}>
          <b>Coexistencia con SABANA:</b> esta lista <b>no</b> reemplaza la programación SABANA — se complementan. Las sesiones por fecha (LISTA DE RECURSOS) se cruzan con la metadata semanal (SABANA: escuela, asignatura, docente, jornada) por código de sección.
        </div>
      </div>

      {preview && (
        <div className="card">
          <div className="card-header">
            <div><h3>Previsualización</h3><div className="sub">{preview.nombre}</div></div>
          </div>

          <div className="grid grid-4" style={{marginBottom:14}}>
            <div className="kpi kpi-blue"><span className="label">Sesiones</span><span className="value">{preview.sesiones.toLocaleString('es-CL')}</span><div className="icon">📅</div></div>
            <div className="kpi kpi-green"><span className="label">Salas únicas</span><span className="value">{preview.salasUnicas}</span><div className="icon">🏫</div></div>
            <div className="kpi kpi-amber"><span className="label">Secciones</span><span className="value">{preview.secciones}</span><div className="icon">📚</div></div>
            <div className="kpi kpi-blue"><span className="label">Fechas distintas</span><span className="value">{preview.fechasUnicas}</span><div className="icon">🗓</div></div>
          </div>

          {preview.rango && (
            <div className="chip info" style={{marginBottom:10}}>Rango: {fmtFecha(preview.rango.desde)} → {fmtFecha(preview.rango.hasta)}</div>
          )}
          {(preview.descartadasNoG>0 || preview.descartadasIncompletas>0) && (
            <div className="chip warn" style={{marginBottom:10,marginLeft:8}}>
              Descartadas: {preview.descartadasNoG} no-sala (R≠G), {preview.descartadasIncompletas} incompletas
            </div>
          )}

          <div className="field">
            <label className="row" style={{gap:8,cursor:'pointer'}}>
              <input type="checkbox" checked={reemplazar} onChange={e=>setReemplazar(e.target.checked)}/>
              <span>Reemplazar la lista existente ({(data.eventos||[]).length.toLocaleString('es-CL')} sesiones) por la nueva</span>
            </label>
          </div>

          <div className="row" style={{justifyContent:'flex-end',marginTop:12,gap:10}}>
            <button className="btn btn-ghost" onClick={()=>{setPreview(null);setArchivo(null)}}>Cancelar</button>
            <button className="btn btn-primary" onClick={aplicar}>{I.check}Aplicar importación</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ========= CARGAR JEFATURAS DOCENTES =========
   Excel masivo con mapeo docente → jefe directo. Auto-detecta columnas
   por encabezado (Docente, Jefe, Correo, Escuela). Reemplaza la tabla
   docente_jefes con la nueva carga. */
function ImportarJefes({ data, toast, onReplace, onCreate, onUpdate, onDelete }){
  const [parsing, setParsing] = useState(false);
  const [preview, setPreview] = useState(null);
  const [archivo, setArchivo] = useState(null);
  const [modal, setModal] = useState(null);  // 'add' | 'edit'
  const [edit, setEdit] = useState({ id:null, docente:'', jefe:'', jefe_correo:'', escuela:'' });
  const [q, setQ] = useState('');
  const [busy, setBusy] = useState(false);

  const findCol = (headers, candidatos) => {
    const norm = (s) => (s||'').toString().toLowerCase().replace(/\s+/g,'').replace(/\./g,'');
    for(const cand of candidatos){
      const c = norm(cand);
      const idx = headers.findIndex(h => {
        const hn = norm(h);
        return hn===c || hn.startsWith(c) || hn.includes(c);
      });
      if(idx>=0) return idx;
    }
    return -1;
  };

  const onFile = async (e) => {
    const f = e.target.files?.[0];
    if(!f) return;
    setArchivo(f); setParsing(true); setPreview(null);
    try {
      const ab = await f.arrayBuffer();
      const wb = XLSX.read(ab, { type:'array', cellDates:true });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { header:1, defval:null, blankrows:false });
      if(rows.length < 2) throw new Error('El archivo está vacío o no tiene encabezados.');

      // La fila de encabezados es la primera con texto
      let headerRow = 0;
      for(let i=0;i<Math.min(5,rows.length);i++){
        const h = (rows[i]||[]).map(x => (x||'').toString().toLowerCase());
        if(h.some(x => x.includes('docente') || x.includes('profesor') || x.includes('jefe'))){
          headerRow = i; break;
        }
      }
      const headers = rows[headerRow];
      const dataRows = rows.slice(headerRow+1);

      const cDoc = findCol(headers, ['Docente','Profesor','Nombre Docente','Instructor']);
      const cJefe = findCol(headers, ['Jefe','Jefatura','Jefe Directo','Coordinador','Director']);
      const cCorreo = findCol(headers, ['Correo Jefe','Email Jefe','Mail Jefe','Correo']);
      const cEsc = findCol(headers, ['Escuela','Esc']);

      if(cDoc<0 || cJefe<0){
        throw new Error('No se encontraron las columnas mínimas: "Docente" y "Jefe".');
      }

      const jefes = [];
      const docentesSet = new Set();
      const jefesSet = new Set();
      const dedup = new Set();
      let descartadas = 0;
      for(const row of dataRows){
        if(!row) continue;
        const docente = row[cDoc] ? String(row[cDoc]).trim() : '';
        const jefe = row[cJefe] ? String(row[cJefe]).trim() : '';
        if(!docente || !jefe){ descartadas++; continue; }
        const k = docente.toLowerCase();
        if(dedup.has(k)) continue;  // mismo docente repetido → toma el primero
        dedup.add(k);
        const jefe_correo = cCorreo>=0 && row[cCorreo] ? String(row[cCorreo]).trim() : null;
        const escuela = cEsc>=0 && row[cEsc] ? String(row[cEsc]).trim().slice(0,3) : null;
        jefes.push({ docente, jefe, jefe_correo, escuela });
        docentesSet.add(docente);
        jefesSet.add(jefe);
      }

      if(!jefes.length) throw new Error('No se encontraron filas válidas.');

      // Stats: cuántos docentes del archivo coinciden con los docentes de la SABANA
      const docentesSabana = new Set((data.programacion||[]).map(p=>p.d).filter(Boolean));
      let conMatch = 0, sinMatch = 0;
      for(const d of docentesSet){
        if(docentesSabana.has(d)) conMatch++; else sinMatch++;
      }

      setPreview({
        nombre: f.name,
        rows: jefes.length,
        docentes: docentesSet.size,
        jefes: jefesSet.size,
        conMatchSabana: conMatch,
        sinMatchSabana: sinMatch,
        totalSabana: docentesSabana.size,
        descartadas,
        cols: { cDoc, cJefe, cCorreo, cEsc },
        headerRow,
        items: jefes,
      });
    } catch(err){
      console.error(err);
      toast('Error al leer el archivo: '+err.message);
    } finally {
      setParsing(false);
    }
  };

  const aplicar = async () => {
    if(!preview) return;
    if(!window.confirm(`Se REEMPLAZARÁ la tabla de jefaturas con ${preview.rows} registros. ¿Continuar?`)) return;
    try {
      await onReplace(preview.items);
      toast(`Jefaturas cargadas: ${preview.rows} docentes mapeados a sus jefes.`);
      setPreview(null); setArchivo(null);
    } catch(e){}
  };

  // CRUD individual
  const startAdd = () => {
    setEdit({ id:null, docente:'', jefe:'', jefe_correo:'', escuela:'' });
    setModal('add');
  };
  const startEdit = (j) => {
    setEdit({ id:j.id, docente:j.docente||'', jefe:j.jefe||'', jefe_correo:j.jefe_correo||'', escuela:j.escuela||'' });
    setModal('edit');
  };
  const saveJefe = async () => {
    const { docente, jefe } = edit;
    if(!docente.trim() || !jefe.trim()){ toast('Docente y Jefe son obligatorios.'); return; }
    setBusy(true);
    try {
      const payload = {
        docente: edit.docente.trim(),
        jefe: edit.jefe.trim(),
        jefe_correo: edit.jefe_correo.trim() || null,
        escuela: (edit.escuela||'').trim().slice(0,3) || null,
      };
      if(modal === 'add'){
        await onCreate(payload);
        toast('Jefatura agregada.');
      } else {
        await onUpdate(edit.id, payload);
        toast('Jefatura actualizada.');
      }
      setModal(null);
    } catch(e){} finally { setBusy(false); }
  };
  const eliminar = async (j) => {
    if(!window.confirm(`¿Eliminar la jefatura de "${j.docente}"?`)) return;
    try { await onDelete(j.id); toast('Jefatura eliminada.'); } catch(e){}
  };

  // Lista filtrada
  const jefesFiltrados = useMemo(()=>{
    if(!q) return data.docente_jefes||[];
    const qn = q.toLowerCase();
    return (data.docente_jefes||[]).filter(j =>
      (j.docente||'').toLowerCase().includes(qn) ||
      (j.jefe||'').toLowerCase().includes(qn) ||
      (j.jefe_correo||'').toLowerCase().includes(qn) ||
      (j.escuela||'').toLowerCase().includes(qn)
    );
  }, [data.docente_jefes, q]);

  return (
    <div className="stack">
      <div className="card">
        <div className="card-header">
          <div>
            <h3>Cargar jefaturas docentes</h3>
            <div className="sub">Archivo .xlsx/.xls con columnas reconocibles: <b>Docente</b>, <b>Jefe</b> (mínimas), opcionalmente <b>Correo Jefe</b> y <b>Escuela</b>. El nombre del docente debe matchear con el de la SABANA.</div>
          </div>
          {(data.docente_jefes||[]).length>0 && <span className="chip success">Cargadas: {(data.docente_jefes||[]).length} jefaturas</span>}
        </div>

        <div className="upload-zone" onClick={()=>document.getElementById('jefes-file').click()}>
          {I.upload}
          <h4>Selecciona el archivo Excel</h4>
          <p className="muted">Columnas: Docente | Jefe | Correo Jefe (opc) | Escuela (opc)</p>
          <input id="jefes-file" type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={onFile}/>
          {parsing && <div style={{marginTop:10}}>Procesando…</div>}
          {archivo && !parsing && <div style={{marginTop:10,fontSize:12}}>📄 {archivo.name}</div>}
        </div>

        <div className="login-hint" style={{marginTop:14}}>
          <b>Uso:</b> una vez cargado, en <b>Horario docente</b> aparecerá la jefatura debajo del nombre del docente seleccionado. Útil para escalamientos y trazabilidad.
        </div>
      </div>

      {preview && (
        <div className="card">
          <div className="card-header">
            <div><h3>Previsualización</h3><div className="sub">{preview.nombre}</div></div>
          </div>

          <div className="grid grid-4" style={{marginBottom:14}}>
            <div className="kpi kpi-blue"><span className="label">Registros</span><span className="value">{preview.rows.toLocaleString('es-CL')}</span><div className="icon">📋</div></div>
            <div className="kpi kpi-green"><span className="label">Docentes únicos</span><span className="value">{preview.docentes.toLocaleString('es-CL')}</span><div className="icon">👨‍🏫</div></div>
            <div className="kpi kpi-amber"><span className="label">Jefes únicos</span><span className="value">{preview.jefes.toLocaleString('es-CL')}</span><div className="icon">⭐</div></div>
            <div className="kpi kpi-blue"><span className="label">Match con SABANA</span><span className="value">{preview.conMatchSabana}/{preview.totalSabana}</span><span className="delta">{preview.sinMatchSabana} sin match en archivo</span><div className="icon">🔗</div></div>
          </div>

          {preview.descartadas>0 && <div className="chip warn" style={{marginBottom:10}}>{preview.descartadas} filas descartadas (sin docente o sin jefe).</div>}
          {preview.sinMatchSabana>0 && <div className="chip warn" style={{marginBottom:10,marginLeft:8}}>{preview.sinMatchSabana} docentes del archivo no aparecen en SABANA (sus jefaturas no se mostrarán hasta que coincidan).</div>}

          <div className="tbl-scroll" style={{maxHeight:300}}>
            <table className="tbl">
              <thead><tr><th>Docente</th><th>Jefe</th><th>Correo</th><th>Escuela</th></tr></thead>
              <tbody>
                {preview.items.slice(0,50).map((j,i) => (
                  <tr key={i}><td>{j.docente}</td><td><b>{j.jefe}</b></td><td className="muted">{j.jefe_correo||'—'}</td><td>{j.escuela||'—'}</td></tr>
                ))}
              </tbody>
            </table>
          </div>
          {preview.items.length>50 && <div className="muted" style={{padding:10,textAlign:'center',fontSize:12}}>Mostrando primeras 50 de {preview.items.length}.</div>}

          <div className="row" style={{justifyContent:'flex-end',marginTop:12,gap:10}}>
            <button className="btn btn-ghost" onClick={()=>{setPreview(null);setArchivo(null)}}>Cancelar</button>
            <button className="btn btn-primary" onClick={aplicar}>{I.check}Aplicar carga</button>
          </div>
        </div>
      )}

      {/* Lista actual con CRUD individual */}
      {!preview && (
        <div className="card">
          <div className="card-header">
            <div>
              <h3>Jefaturas en BD</h3>
              <div className="sub">{(data.docente_jefes||[]).length} registros · puedes agregar, editar o eliminar manualmente</div>
            </div>
            <button className="btn btn-primary" onClick={startAdd}>{I.plus}Agregar jefatura</button>
          </div>

          {(data.docente_jefes||[]).length === 0 ? (
            <div className="empty"><span className="emoji">⭐</span>Aún no hay jefaturas cargadas. Sube un Excel arriba o agrega una manualmente.</div>
          ) : (
            <>
              <div className="filters" style={{marginBottom:8}}>
                <div className="field" style={{flex:'1 1 320px'}}>
                  <label>Buscar</label>
                  <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Docente, jefe, correo, escuela…"/>
                </div>
                <div style={{alignSelf:'flex-end'}} className="chip info">
                  {jefesFiltrados.length} / {(data.docente_jefes||[]).length}
                </div>
              </div>

              <div className="tbl-scroll" style={{maxHeight:500}}>
                <table className="tbl">
                  <thead><tr><th>Docente</th><th>Jefe</th><th>Correo</th><th>Escuela</th><th style={{width:100,textAlign:'right'}}>Acciones</th></tr></thead>
                  <tbody>
                    {jefesFiltrados.slice(0,300).map(j => (
                      <tr key={j.id}>
                        <td>{j.docente}</td>
                        <td><b>{j.jefe}</b></td>
                        <td className="muted">{j.jefe_correo||'—'}</td>
                        <td>{j.escuela||'—'}</td>
                        <td style={{textAlign:'right'}} className="nowrap">
                          <button className="btn-icon" title="Editar" onClick={()=>startEdit(j)}>{I.edit}</button>
                          <button className="btn-icon" title="Eliminar" onClick={()=>eliminar(j)}>{I.trash}</button>
                        </td>
                      </tr>
                    ))}
                    {jefesFiltrados.length === 0 && <tr><td colSpan="5"><div className="empty"><span className="emoji">🔍</span>Sin resultados con "{q}".</div></td></tr>}
                  </tbody>
                </table>
              </div>
              {jefesFiltrados.length>300 && <div className="muted" style={{padding:10,textAlign:'center',fontSize:12}}>Mostrando primeras 300 de {jefesFiltrados.length}. Refina la búsqueda.</div>}
            </>
          )}
        </div>
      )}

      {modal && (
        <Modal
          title={modal==='add' ? 'Agregar jefatura' : `Editar jefatura · ${edit.docente}`}
          onClose={()=>setModal(null)}
          onSave={saveJefe}
          saveLabel={busy ? 'Guardando…' : 'Guardar'}>
          <div className="field"><label>Docente *</label><input value={edit.docente} onChange={e=>setEdit({...edit,docente:e.target.value})} placeholder="Nombre completo (debe matchear con SABANA)"/></div>
          <div className="field"><label>Jefe directo *</label><input value={edit.jefe} onChange={e=>setEdit({...edit,jefe:e.target.value})} placeholder="Nombre del jefe"/></div>
          <div className="col-2">
            <div className="field"><label>Correo jefe</label><input type="email" value={edit.jefe_correo} onChange={e=>setEdit({...edit,jefe_correo:e.target.value})} placeholder="jefe@duoc.cl"/></div>
            <div className="field">
              <label>Escuela</label>
              <select value={edit.escuela} onChange={e=>setEdit({...edit,escuela:e.target.value})}>
                <option value="">— Sin asignar —</option>
                {Object.entries(ESCUELAS_FULL).map(([k,v]) => <option key={k} value={k}>{v} ({k})</option>)}
              </select>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ========= IMPORTAR DATOS (wrapper unificado) =========
   Una sola pestaña con 3 tabs internos: SABANA, LISTA DE RECURSOS y
   Jefaturas. Cada tab monta el componente importador correspondiente. */
function ImportarDatos({ data, toast, db, user, onReplaceSabana, onReplaceEventos, onReplaceJefes, onCreateJefe, onUpdateJefe, onDeleteJefe, onCreateSala, onUpdateSala, onDeleteSala, onSeed }){
  const [tab, setTab] = useState('recursos');

  // Lookup rápido del último import por tipo
  const logByTipo = useMemo(()=>{
    const m = {};
    for(const e of (data.import_log||[])) m[e.tipo] = e;
    return m;
  }, [data.import_log]);

  const fmtFechaHora = (iso) => {
    if(!iso) return '—';
    try {
      const d = new Date(iso);
      return d.toLocaleDateString('es-CL', { day:'2-digit', month:'short', year:'numeric' }) +
             ' · ' + d.toLocaleTimeString('es-CL', { hour:'2-digit', minute:'2-digit' });
    } catch(e){ return iso; }
  };

  const tabs = [
    { key:'sabana',   label:'📘 SABANA',            sub:'Programación académica (patrón semanal)', count:(data.programacion||[]).length, logKey:'sabana' },
    { key:'recursos', label:'📅 LISTA DE RECURSOS', sub:'Sesiones por fecha (eventos)',           count:(data.eventos||[]).length,     logKey:'recursos' },
    { key:'jefes',    label:'⭐ Jefaturas',          sub:'Docente → jefe directo',                 count:(data.docente_jefes||[]).length, logKey:'jefes' },
    { key:'salas',    label:'🏫 Salas',              sub:'Catálogo de salas y recintos',           count:(data.salas||[]).length },
  ];

  return (
    <div className="stack">
      {/* Tabs grandes con badge de fecha */}
      <div className="card" style={{padding:0,overflow:'hidden'}}>
        <div className="row" style={{borderBottom:'1px solid var(--border-soft)',flexWrap:'wrap'}}>
          {tabs.map(t => {
            const log = logByTipo[t.logKey];
            const cargado = !!log || t.count > 0;
            return (
              <button key={t.key} onClick={()=>setTab(t.key)}
                style={{
                  flex:'1 1 240px',padding:'14px 16px',background:tab===t.key?'#fff':'#FBFCFD',
                  borderRight:'1px solid var(--border-soft)',border:'none',cursor:'pointer',
                  borderBottom: tab===t.key?'3px solid var(--primary-2)':'3px solid transparent',
                  textAlign:'left'
                }}>
                <div style={{fontSize:14,fontWeight:700,color: tab===t.key?'var(--primary)':'var(--text)'}}>{t.label}</div>
                <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>{t.sub}</div>
                <div style={{marginTop:6,display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                  {cargado ? (
                    <>
                      <span className="chip success" style={{fontSize:10,padding:'2px 7px'}}>✓ Cargado</span>
                      <span style={{fontSize:10,color:'var(--text-muted)'}}>
                        <b style={{color:'var(--text)'}}>{t.count.toLocaleString('es-CL')}</b> {t.count===1?'fila':'filas'}
                      </span>
                    </>
                  ) : (
                    <span className="chip warn" style={{fontSize:10,padding:'2px 7px'}}>⚠ Sin subir</span>
                  )}
                </div>
                {log && (
                  <div style={{fontSize:10,color:'var(--text-muted)',marginTop:4}}>
                    Última subida: <b style={{color:'var(--text)'}}>{fmtFechaHora(log.importado_en)}</b>{log.importado_por && <> · por <b>{log.importado_por}</b></>}
                  </div>
                )}
              </button>
            );
          })}
        </div>
      </div>

      {/* Contenido del tab */}
      {tab==='sabana'   && <ImportarSabana   data={data} toast={toast} onReplace={onReplaceSabana} onSeed={onSeed} isCloud={db.isCloud}/>}
      {tab==='recursos' && <ImportarRecursos data={data} toast={toast} onReplace={onReplaceEventos} isCloud={db.isCloud}/>}
      {tab==='jefes'    && <ImportarJefes    data={data} toast={toast} onReplace={onReplaceJefes} onCreate={onCreateJefe} onUpdate={onUpdateJefe} onDelete={onDeleteJefe}/>}
      {tab==='salas'    && <Salas            data={data} user={user} toast={toast} onCreate={onCreateSala} onUpdate={onUpdateSala} onDelete={onDeleteSala}/>}
    </div>
  );
}

function Modal({ title, children, onClose, onSave, saveLabel='Guardar', wide=false }){
  return (
    <div className="modal-back" onClick={onClose}>
      <div className={`modal ${wide?'modal-wide':''}`} onClick={e=>e.stopPropagation()}>
        <div className="modal-h"><h3>{title}</h3><button className="btn-icon" onClick={onClose}>{I.x}</button></div>
        <div className="modal-b">{children}</div>
        <div className="modal-f">
          <button className="btn btn-ghost" onClick={onClose}>{onSave?'Cancelar':'Cerrar'}</button>
          {onSave && <button className="btn btn-primary" onClick={onSave}>{saveLabel}</button>}
        </div>
      </div>
    </div>
  );
}

/* ========= ROOT APP ========= */
function App(){
  // Migración legacy: rol 'subdireccion' → 'admin'
  const migrateUser = (u) => u && u.role==='subdireccion' ? {...u, role:'admin'} : u;
  const migrateUsers = (arr) => (arr||[])
    .filter(u => u.username!=='subdir')
    .map(u => u.role==='subdireccion' ? {...u, role:'admin'} : u);

  const stored = loadStore();
  const [mode, setModeState] = useState(getMode());        // 'cloud' | 'local' | null
  const [supabase, setSupabase] = useState(null);
  const [db, setDbState] = useState(null);
  const [user, setUser] = useState(migrateUser(stored.user) || null);
  const [view, setView] = useState('dashboard');
  const [data, setData] = useState(null);
  const [reservas, setReservas] = useState([]);
  const [users, setUsers] = useState(stored.users ? migrateUsers(stored.users) : DEFAULT_USERS);
  const [loading, setLoading] = useState(true);
  const [loadError, setLoadError] = useState(null);
  const [toast, setToast] = useToast();
  const [prefillNueva, setPrefillNueva] = useState(null);

  // Inicializar Supabase cuando el modo es cloud
  useEffect(()=>{
    if(mode !== 'cloud'){ return; }
    const cfg = loadCloudConfig();
    if(!cfg){ setModeState(null); return; }
    if(!window.supabase){ setLoadError('Cliente Supabase no disponible (revisa conexión).'); return; }
    const sb = window.supabase.createClient(cfg.url, cfg.key, { auth:{ persistSession:false } });
    setSupabase(sb);
  }, [mode]);

  // Construir db cuando hay modo y (si cloud) cliente listo
  useEffect(()=>{
    if(!mode) return;
    if(mode==='cloud' && !supabase) return;
    setDbState(createDb({ mode, supabase }));
  }, [mode, supabase]);

  // Cargar data inicial cuando hay db lista
  useEffect(()=>{
    if(!db) return;
    let cancelled = false;
    (async ()=>{
      setLoading(true); setLoadError(null);
      try {
        const out = await db.loadAll();
        if(cancelled) return;
        setData({
          salas: out.salas,
          programacion: out.programacion,
          modulos: out.modulos,
          eventos: out.eventos || [],                    // ← se llena después
          _eventosLoaded: out._eventosLoaded || false,
          docente_jefes: out.docente_jefes || [],
          import_log: out.import_log || [],
          _customSalas: out._local?.customSalas || [],
          _deletedSalas: out._local?.deletedSalas || [],
          _salaOverrides: out._local?.salaOverrides || {},
        });
        setReservas(out.reservas);
        setUsers(out.users || []);
      } catch(e){
        if(cancelled) return;
        console.error(e);
        setLoadError(e.message || 'Error al cargar datos');
      } finally {
        if(!cancelled) setLoading(false);
      }
    })();
    return () => { cancelled = true; };
  }, [db]);

  // Carga eventos (~13MB / 71K filas) en BACKGROUND después del primer render.
  // Evita que el navegador móvil colapse con "Aw snap" por meter todo en RAM
  // antes de mostrar la app. El resto de la app es usable mientras tanto.
  useEffect(()=>{
    if(!db || !db.isCloud || !data || data._eventosLoaded) return;
    let cancelled = false;
    (async ()=>{
      try {
        const eventos = await db.fetchAllSafe('eventos');
        if(cancelled) return;
        setData(d => d ? { ...d, eventos, _eventosLoaded:true } : d);
      } catch(e){ console.warn('background eventos:', e); }
    })();
    return () => { cancelled = true; };
  }, [db, data?._eventosLoaded]);

  // Realtime: refresca el slice afectado cuando cambian datos en cloud.
  // NO suscribimos a `eventos` porque cada cambio re-fetcharía ~13MB y
  // colapsaría el navegador. Si el admin sube eventos, el setData en
  // replaceEventosOp se encarga localmente.
  useEffect(()=>{
    if(!db || !db.isCloud) return;
    const unsubR = db.subscribe('reservas', async () => {
      const fresh = await db.fetchAll('reservas', { order:'id' });
      if(fresh) setReservas(fresh.slice().reverse());
    });
    const unsubS = db.subscribe('salas', async () => {
      const { data: fresh } = await supabase.from('salas').select('*').order('codigo');
      if(fresh) setData(d => d ? {...d, salas:fresh} : d);
    });
    const unsubU = db.subscribe('app_users', async () => {
      const { data: fresh } = await supabase.from('app_users').select('*').order('id');
      if(fresh) setUsers(fresh);
    });
    // OJO: NO suscribimos a `eventos`. Cada cambio re-fetchea ~13MB / 71K
    // filas y eso colapsa el navegador móvil. La subida local ya actualiza
    // data.eventos via setData(...). Otros usuarios verán los nuevos al
    // recargar (F5).
    const unsubJ = db.subscribe('docente_jefes', async () => {
      const fresh = await db.fetchAllSafe('docente_jefes');
      if(fresh) setData(d => d ? {...d, docente_jefes:fresh} : d);
    });
    const unsubIL = db.subscribe('import_log', async () => {
      const fresh = await db.fetchAllSafe('import_log');
      if(fresh) setData(d => d ? {...d, import_log:fresh} : d);
    });
    return () => { unsubR(); unsubS(); unsubU(); unsubJ(); unsubIL(); };
  }, [db, supabase]);

  // Persistencia en modo local (sesión + overrides)
  useEffect(()=>{
    if(!data || !mode) return;
    if(mode==='local'){
      // En modo local los eventos pueden ser ~70K filas (>10MB JSON) y
      // sobrepasar el cuota de localStorage. Si no caben, se persiste sin ellos
      // (siguen vivos en memoria hasta que se recargue).
      const payload = {
        user, users,
        customReservas: reservas.filter(r=>r.creado_por),
        reservaEstados: reservas.filter(r=>r.decidido_por).map(r=>({id:r.id,es:r.es,decidido_por:r.decidido_por,decidido_en:r.decidido_en})),
        customSalas: data._customSalas || [],
        deletedSalas: data._deletedSalas || [],
        salaOverrides: data._salaOverrides || {},
        eventos: data.eventos || [],
        docente_jefes: data.docente_jefes || [],
        import_log: data.import_log || [],
      };
      try {
        saveStore(payload);
      } catch(err){
        if(err?.name === 'QuotaExceededError' || /quota/i.test(err?.message||'')){
          console.warn('localStorage lleno; persistiendo sin eventos.');
          try { saveStore({ ...payload, eventos: [] }); } catch(_){}
        } else { throw err; }
      }
    } else {
      // En cloud solo persistimos el user logueado
      saveStore({ user });
    }
  }, [user, users, reservas, data, mode]);

  /* =========== OPERACIONES (wrappers async que llaman a db + actualizan state) =========== */
  const reconfigure = () => {
    setUser(null);
    // Si la BD está centralizada (config.js del repo), no se puede cambiar por navegador
    if(isGlobalConfig()) return;
    clearCloudConfig(); setModeState(null); setData(null); setSupabase(null); setDbState(null);
  };

  const createReserva = async (r) => {
    try {
      const saved = await db.createReserva(r);
      setReservas(prev => [saved, ...prev]);
      return saved;
    } catch(e){ setToast('Error al crear reserva: '+e.message); throw e; }
  };
  const updateReservaEstado = async (id, patch) => {
    try {
      const saved = await db.updateReservaEstado(id, patch);
      setReservas(prev => prev.map(r => r.id===id ? {...r, ...saved} : r));
      return saved;
    } catch(e){ setToast('Error al actualizar reserva: '+e.message); throw e; }
  };

  const createSala = async (s) => {
    try {
      const saved = await db.createSala(s);
      setData(d => ({...d, salas:[...d.salas, saved], _customSalas:[...(d._customSalas||[]), saved]}));
      return saved;
    } catch(e){ setToast('Error al crear sala: '+e.message); throw e; }
  };
  const updateSala = async (codigo, patch) => {
    try {
      const saved = await db.updateSala(codigo, patch);
      setData(d => {
        const eraCustom = (d._customSalas||[]).some(s=>s.codigo===codigo);
        return {
          ...d,
          salas: d.salas.map(s => s.codigo===codigo ? {...s, ...saved} : s),
          _customSalas: eraCustom ? (d._customSalas||[]).map(s=>s.codigo===codigo?{...s,...saved}:s) : (d._customSalas||[]),
          _salaOverrides: (eraCustom || db.isCloud) ? (d._salaOverrides||{}) : {...(d._salaOverrides||{}), [codigo]: patch},
        };
      });
      return saved;
    } catch(e){ setToast('Error al actualizar sala: '+e.message); throw e; }
  };
  const deleteSala = async (codigo) => {
    try {
      await db.deleteSala(codigo);
      setData(d => {
        const eraCustom = (d._customSalas||[]).some(s=>s.codigo===codigo);
        const overrides = {...(d._salaOverrides||{})}; delete overrides[codigo];
        return {
          ...d,
          salas: d.salas.filter(s => s.codigo!==codigo),
          _customSalas: (d._customSalas||[]).filter(s=>s.codigo!==codigo),
          _deletedSalas: (eraCustom || db.isCloud) ? (d._deletedSalas||[]) : [...(d._deletedSalas||[]), codigo],
          _salaOverrides: overrides,
        };
      });
    } catch(e){ setToast('Error al eliminar sala: '+e.message); throw e; }
  };

  const createUser = async (u) => {
    try {
      const saved = await db.createUser(u);
      setUsers(prev => [...prev, saved]);
      return saved;
    } catch(e){ setToast('Error al crear usuario: '+e.message); throw e; }
  };
  const updateUser = async (id, patch) => {
    try {
      const saved = await db.updateUser(id, patch);
      setUsers(prev => prev.map(u => u.id===id ? {...u, ...saved} : u));
      return saved;
    } catch(e){ setToast('Error al actualizar usuario: '+e.message); throw e; }
  };
  const deleteUser = async (id) => {
    try {
      await db.deleteUser(id);
      setUsers(prev => prev.filter(u => u.id!==id));
    } catch(e){ setToast('Error al eliminar usuario: '+e.message); throw e; }
  };

  const replaceProgramacionOp = async (prog, salasNuevas, opts) => {
    try {
      await db.replaceProgramacion(prog, salasNuevas, { ...opts, importado_por: user?.username });
      setData(d => {
        const mapSalas = new Map(d.salas.map(s => [s.codigo, s]));
        for(const ns of (salasNuevas||[])){
          if(!mapSalas.has(ns.codigo)) mapSalas.set(ns.codigo, ns);
        }
        const nuevoLog = [
          { tipo:'sabana', filas:prog.length, importado_en:new Date().toISOString(), importado_por:user?.username },
          ...((d.import_log||[]).filter(x=>x.tipo!=='sabana'))
        ];
        return { ...d,
          salas: [...mapSalas.values()].sort((a,b)=>a.codigo.localeCompare(b.codigo)),
          programacion: prog,
          import_log: nuevoLog,
        };
      });
    } catch(e){ setToast('Error al importar SABANA: '+e.message); throw e; }
  };

  const replaceEventosOp = async (eventos, salasNuevas, opts) => {
    try {
      await db.replaceEventos(eventos, salasNuevas, { ...opts, importado_por: user?.username });
      setData(d => {
        const mapSalas = new Map(d.salas.map(s => [s.codigo, s]));
        for(const ns of (salasNuevas||[])){
          if(!mapSalas.has(ns.codigo)) mapSalas.set(ns.codigo, ns);
        }
        const nuevoLog = [
          { tipo:'recursos', filas:eventos.length, importado_en:new Date().toISOString(), importado_por:user?.username },
          ...((d.import_log||[]).filter(x=>x.tipo!=='recursos'))
        ];
        return { ...d,
          salas: [...mapSalas.values()].sort((a,b)=>a.codigo.localeCompare(b.codigo)),
          eventos,
          import_log: nuevoLog,
        };
      });
    } catch(e){ setToast('Error al importar LISTA DE RECURSOS: '+e.message); throw e; }
  };

  const replaceJefesOp = async (jefes, opts) => {
    try {
      // pasar el usuario para que quede registrado en import_log
      await db.replaceJefes(jefes, { ...opts, importado_por: user?.username });
      setData(d => {
        const nuevoLog = [
          { tipo:'jefes', filas:jefes.length, importado_en:new Date().toISOString(), importado_por:user?.username },
          ...((d.import_log||[]).filter(x=>x.tipo!=='jefes'))
        ];
        return { ...d, docente_jefes: jefes, import_log: nuevoLog };
      });
    } catch(e){ setToast('Error al cargar jefaturas: '+e.message); throw e; }
  };

  // CRUD individual de jefaturas
  const createJefeOp = async (jefe) => {
    try {
      const saved = await db.createJefe(jefe);
      setData(d => ({ ...d, docente_jefes: [...(d.docente_jefes||[]), saved] }));
      return saved;
    } catch(e){ setToast('Error al crear jefatura: '+e.message); throw e; }
  };
  const updateJefeOp = async (id, patch) => {
    try {
      const saved = await db.updateJefe(id, patch);
      setData(d => ({ ...d, docente_jefes: (d.docente_jefes||[]).map(j => j.id===id ? {...j, ...saved} : j) }));
      return saved;
    } catch(e){ setToast('Error al actualizar jefatura: '+e.message); throw e; }
  };
  const deleteJefeOp = async (id) => {
    try {
      await db.deleteJefe(id);
      setData(d => ({ ...d, docente_jefes: (d.docente_jefes||[]).filter(j => j.id!==id) }));
    } catch(e){ setToast('Error al eliminar jefatura: '+e.message); throw e; }
  };

  const seedFromBundle = async () => {
    try {
      const counts = await db.seedFromBundle();
      const out = await db.loadAll();
      setData({ salas:out.salas, programacion:out.programacion, eventos:out.eventos||[], modulos:out.modulos });
      setReservas(out.reservas);
      setUsers(out.users);
      setToast(`Carga inicial: ${counts.salas} salas, ${counts.programacion} sesiones, ${counts.reservas} reservas.`);
    } catch(e){ setToast('Error en carga inicial: '+e.message); }
  };

  /* =========== ROUTING DE PANTALLAS =========== */
  if(!mode) return <SetupScreen onConfigured={m => { setModeState(m); }} />;
  if(loadError) return (
    <div className="login-wrap" style={{gridTemplateColumns:'1fr'}}>
      <div className="login-form-wrap">
        <div className="login-card">
          <h2>Error de conexión</h2>
          <div className="sub" style={{marginBottom:14}}>{loadError}</div>
          <button className="btn btn-ghost btn-block" onClick={reconfigure}>Reconfigurar base de datos</button>
        </div>
      </div>
    </div>
  );
  if(!db || loading) return (
    <div className="loader" style={{paddingTop:140}}><div className="spinner"/><div>Conectando…</div></div>
  );
  if(!user) return <Login db={db} mode={mode} onReconfigure={reconfigure} onLogin={u => { setUser(u); setView('dashboard'); }} />;
  if(!data) return (
    <div className="loader" style={{paddingTop:140}}><div className="spinner"/><div>Cargando datos del portal…</div></div>
  );

  const goNueva = (pre) => { setPrefillNueva(pre||null); setView('nueva'); };

  const titles = {
    dashboard:['Dashboard','Panel de control'],
    horario:['Horario Sala','Disponibilidad física Lun-Dom × Módulos por sala'],
    mapa:['Mapa de calor','Ocupación de la sede por módulo y día'],
    reservas: user.role==='usuario'
      ? ['Mis Reservas','Las reservas que has solicitado']
      : ['Solicitudes de Reservas','Gestión y búsqueda de disponibilidad'],
    nueva:['Solicitar reserva','Nueva solicitud'],
    importar:['Importar datos','SABANA · LISTA DE RECURSOS · Jefaturas'],
    repDoc:['Reporte Docente','Carga docente agrupada por director de carrera (jefatura)'],
    gestiones:['Gestiones','Auditorías en terreno · sólo administradores'],
    docente:['Horario docente','Agenda semanal del docente'],
    usuarios:['Usuarios','Administración de cuentas'],
    reportes:['Reportes','Ocupación y métricas'],
  };
  const [title, crumbs] = titles[view] || ['',''];

  return (
    <>
      <Shell user={user} mode={mode} onReconfigure={reconfigure} onLogout={()=>{ setUser(null); }} view={view} setView={setView} title={title} crumbs={crumbs}
        pendientes={(reservas||[]).filter(r => r.es==='pendiente').length}>
        {view==='dashboard' && <Dashboard data={data} reservas={reservas} user={user} db={db} onGoView={setView} onGoNuevaPrefill={goNueva}/>}
        {view==='horario'   && <Horario data={data} reservas={reservas} onGoNueva={goNueva}/>}
        {view==='reservas'  && <Reservas reservas={reservas} data={data} user={user} toast={setToast} onGoNueva={goNueva} onUpdateEstado={updateReservaEstado}/>}
        {view==='nueva'     && <NuevaReserva data={data} reservas={reservas} user={user} toast={setToast} goReservas={()=>setView('reservas')} prefill={prefillNueva} onCreate={createReserva}/>}
        {view==='importar'  && <ImportarDatos data={data} toast={setToast} db={db} user={user}
          onReplaceSabana={replaceProgramacionOp}
          onReplaceEventos={replaceEventosOp}
          onReplaceJefes={replaceJefesOp}
          onCreateJefe={createJefeOp}
          onUpdateJefe={updateJefeOp}
          onDeleteJefe={deleteJefeOp}
          onCreateSala={createSala}
          onUpdateSala={updateSala}
          onDeleteSala={deleteSala}
          onSeed={seedFromBundle}/>}
        {view==='docente'   && <HorarioDocente data={data}/>}
        {view==='usuarios'  && <Usuarios users={users} toast={setToast} onCreate={createUser} onUpdate={updateUser} onDelete={deleteUser}/>}
        {view==='reportes'  && <Reportes data={data} reservas={reservas}/>}
        {view==='repDoc'    && <ReporteDocente data={data}/>}
        {view==='gestiones' && <Gestiones data={data} user={user} db={db} toast={setToast}/>}
        {view==='mapa'      && <MapaCalor data={data} user={user}/>}
      </Shell>
      {toast && <div className="toast">{toast}</div>}
    </>
  );
}

/* ========= ERROR BOUNDARY =========
   Captura errores de render en cualquier componente y muestra una
   pantalla de fallback en vez de dejar la UI en blanco. */
class ErrorBoundary extends React.Component {
  constructor(props){ super(props); this.state = { error:null, info:null }; }
  static getDerivedStateFromError(error){ return { error }; }
  componentDidCatch(error, info){
    console.error('ErrorBoundary:', error, info);
    this.setState({ info });
  }
  reset = () => this.setState({ error:null, info:null });
  reload = () => window.location.reload();
  render(){
    if(!this.state.error) return this.props.children;
    const msg = this.state.error?.message || String(this.state.error);
    const stack = this.state.info?.componentStack || this.state.error?.stack || '';
    return (
      <div className="login-wrap" style={{gridTemplateColumns:'1fr'}}>
        <div className="login-form-wrap">
          <div className="login-card" style={{maxWidth:560}}>
            <h2>⚠ Algo salió mal</h2>
            <div className="sub" style={{marginBottom:14}}>
              La aplicación encontró un error y no pudo continuar. Tu información está a salvo.
            </div>
            <div className="chip danger" style={{display:'block',padding:'10px 12px',marginBottom:14,whiteSpace:'normal',textAlign:'left',fontFamily:'monospace',fontSize:12}}>
              {msg}
            </div>
            <details style={{marginBottom:14,fontSize:11,color:'var(--text-muted)'}}>
              <summary style={{cursor:'pointer'}}>Detalle técnico</summary>
              <pre style={{whiteSpace:'pre-wrap',marginTop:8,padding:10,background:'var(--surface-2)',border:'1px solid var(--border-soft)',borderRadius:6,maxHeight:260,overflow:'auto'}}>{stack}</pre>
            </details>
            <div className="row" style={{gap:8}}>
              <button className="btn btn-primary" onClick={this.reload}>Recargar página</button>
              <button className="btn btn-ghost" onClick={this.reset}>Intentar continuar</button>
            </div>
          </div>
        </div>
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
  </script>
</body>
</html>
